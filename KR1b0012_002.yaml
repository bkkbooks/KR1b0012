body:
  text: 禹貢說斷卷二宋傅寅撰海岱及淮惟徐州釋地曰濟東曰徐州郭氏注曰自濟東至海孔氏曰東至海北至岱南及淮杜氏曰或云因徐邱為名李氏曰淮海間其氣寬舒稟性安徐故曰徐徐舒也張氏曰李巡言淮海間其氣寬舒稟性安徐夫揚州北跨淮南距海何為其性反輕揚乎淮沂其乂蒙羽其藝孔氏曰二水已治二山已可種藝唐孔氏曰地理志云沂水出泰山蓋縣臨樂子山南至下邳入泗過郡五行六百里班氏曰沂水出泰山蓋縣臨樂子山南至下邳入泗考隋志已無蓋縣當是南北時并省通典沂州沂水縣當是漢蓋縣之地蒙山在泰山蒙隂縣西南按漢志顓㬰國在蒙隂縣蒙山之下通典言沂州費縣㬰城知費本漢蒙隂之地羽山在東海祝其縣南通典海州朐山縣有羽山殛鯀處後漢志引博物記云俗謂此山為懲父山祝其晉猶在當南北時廢其地當屬今朐山酈氏曰沂水出魯城東南尼邱山西北徑雩門門南隔水有雩壇高三丈曽點所謂風乎舞雩處也沂水又西徑圓邱北又西注泗水此曽點所謂浴乎沂之沂非此淮沂其乂之沂也魯即今兗州仙源縣大野既豬東原砥平孔氏曰大野澤名水所停曰豬東原致功而平言可耕唐孔氏曰地理志云大野澤在山陽巨野縣北巨即大也檀弓云汚其宫而豬焉又澤名孟豬停水處也故云水所停曰豬往前漫溢今得豬水為澤也東原即今之東平郡也致功而地平言其可耕也厥土赤埴墳草木漸包孔氏曰土黏曰埴漸進長包叢生唐孔氏曰職埴音義同考工記用土為瓦謂之摶埴之工是埴謂黏土故土黏曰埴易漸彖曰漸進也釋言云苞稙也孫炎曰物叢生曰苞齊人名曰稹郭璞曰今人呼叢緻者為稹漸包謂長進叢生言其美也林氏曰此州之土色而别之則赤性而别之則有墳埴之二種墳者土膏脈起也徐州之地受淮之下流其地墊溺已甚草木不得遂茂為日久矣今也洪水既平乃至於進長叢生故可書也葉氏曰包者其本固猶詩言如竹包矣吕氏曰漸包結實也張氏曰水患既平土色復其本性故赤黏而墳起草木復其本性故漸進而叢生土之性埴者不能墳墳不能埴故林氏以為二種其說甚當而張氏言赤黏而墳起或者其未之察歟包當如易苞桑之苞漸包言浸浸乎其苞也厥田惟上中厥賦中中厥貢惟土五色孔氏曰王者封五色土為社建諸侯則各割其方色土與之使立社燾以黃土苴以白茅茅取其潔黃取王者覆四方唐孔氏曰韓詩外𫝊云天子社廣五丈東方青南方赤西方白北方黑上冒以黃土將封諸侯各取其方色土苴以白茅以為社明有土敬謹潔清也蔡雍獨斷云天子大社以五色土為壇皇子封為王者授之大社之土以所封之方色苴以白茅使之歸國以立社謂之茅社是必古書有此說故先儒之言皆同也林氏曰天子之建社必用五色之土而徐州之土偹此五色故使貢之也前言赤埴墳此又兼五色者蓋此州之土大抵赤色者最多青黃白黑僅有之而巳羽畎夏翟孔氏曰夏翟雉名羽中旌旄羽山之谷有之唐孔氏曰釋鳥云翟山雉此言夏翟則夏翟共為雉名周禮立夏采之官取此名也周禮司帝云全羽為旞析羽為旌用此羽為之林氏曰羽即蒙羽其藝之羽羽畎羽山之畎猶之岱畎也嶧在今兗州鄒縣陽孤桐孔氏曰孤特也嶧山之陽特生桐中琴瑟班氏曰東海下邳縣西有葛嶧山魯國騶縣北有嶧山今下邳為淮陽軍之縣騶即兗州之鄒縣下邳在南鄒在北二縣蓋相連境則知葛嶧者嶧山之連延者也林氏曰嶧陽陽即詩所謂保有鳧繹是也孤桐者特生之桐可以中琴瑟也必以孤桐者猶言孤竹之管也泗出今兗州泗水縣濱浮磬孔氏曰泗濱水涯水中見石可以為磬班氏曰泗水出濟隂乘氏縣東南至臨淮睢陵縣入淮乘氏今隸曹州睢陵故城在下邳東陽唐孔氏曰泗水旁山而過石為泗水之涯石在水旁水中見石似石水上浮然此石可以為磬故謂之浮磬也林氏曰磬之為器必取其石之最輕者然後其聲清越以長但以其輕故謂之浮不云浮石而云浮磬者曽氏曰成磬而後貢之桑氏曰泗水出魯卞縣北山東南過下邳縣西又入於淮今兗州泗水縣即漢卞縣地也酈氏曰山海經曰泗水出魯東北余昔因公事沿厯徐沇路經洙泗因令尋其源流水出卞縣故城東南桃墟西北東南徑下邳縣故城又東徑角城北而東南流注於淮考諸地說或言於睢陵入淮亦云於下相入淮皆非實録也下相在淮陽宿遷縣界泗水實出兗之泗水縣而班氏言出乘氏者菏之分濟者也東與泗㑹故菏泗之稱遂亂淮夷地當在淮之口蠙珠暨魚孔氏曰蠙珠珠名淮夷二水出蠙珠及美魚鄭氏曰淮水之上夷民獻此珠與魚也唐孔氏曰蠙是蚌之别名此蠙出珠遂以蠙為珠名蘇氏曰詩有淮夷知古者淮有夷也林氏曰唐孔氏云淮夷蓋小水後竭涸不復有其處耳王肅亦同此說鄭氏謂淮水之上夷民獻珠與魚當從鄭氏之說按詩云憬彼淮夷來獻其琛則是淮夷不得為水名也蠙即蚌之别名謂淮上之夷民當此洪水既平之後獻蠙珠及魚之二物亦如詩所謂來獻其琛是也淮夷要服也在徐州之外商之末世蓋有西侵中國之地而居淮水之上者矣武王既定天下通道夷蠻封域之正當盡復古而周公攝政成王即辟雖嘗服輒叛要東伐之師不容其亂我華也其後周衰四夷交侵中國淮之南北不復周有故宣王中興命召公平淮夷以復境土則知大禹弼成之制其所以限中外而正封圻者甚嚴也古之興王其經綸之務莫先於此矣厥篚𤣥纖縞孔氏曰元黑繒縞白繒纖細也纖在中明二物皆當細唐孔氏曰篚之所盛例是衣服之用此單言元元必有質元是黑色之别名故知元是黑繒也史記稱高祖為義帝發喪諸侯皆縞素是縞為白繒也顔氏曰元黑繒也纖細繒也縞鮮支也即今所謂素者也言獻黑細繒及鮮支也曽氏曰縞亦為燕服記曰有虞氏縞衣而養老則知縞又所以為燕服徐州之篚元也纖也縞也凡三物釋者以為元縞為二物以纖為細誤矣張氏曰淮夷貢篚豈堯科别其民使之供上哉蓋水患既除物復有生淮中有珠有魚矣可以蠶桑而為元纖縞矣臣子之心戴上之德以為吾享此安居衣食此土地而遂其生者其誰之力也故其土地所出人力所極如珠如魚如元纖縞者皆貢篚於上以備服食器用以效其區區之誠焉土翟桐磬較之珠魚元纖縞縱不有輕重而夷與吾民之貢乃略相參配何也凡他州夷貢皆特寡於吾民而此獨相參配蓋其地西當淮口東據海曲所出之富適在於此故貢之以效來王之誠而非禹强其與吾民等輕重也序曰任土作貢經曰庶土交正砥慎財賦當於是焉求禹之用心浮于淮泗逹于河唐孔氏曰徐州北接青州既浮淮泗當浮汶入濟以逹于河也班氏曰禹貢浮於淮泗逹於河水在山陽湖陵南蘇氏曰渡二水而入於河汴河右自淮泗入河必道於汴世謂隋煬帝始通汴入泗禹時無此水道以疑禹貢之言此特學者考之不詳而已葉氏曰淮泗之通河久矣隋時浚汴而大之爾汴即水經所謂汳也程氏曰菏水南可接泗北可上濟於是經即江海淮泗菏濟河次比言之其序由南而北悉相灌受無復間斷而書法所及已言者不復申言截然一律此經書法所謂簡而能該者見矣許氏說文引徐貢本曰逹於菏誠為有理湖陵地屬今單州魚臺班氏言菏澤在定陶東泗水出乘氏縣定陶乘氏相去蓋數十里間耳泗水實出兗之泗州縣界安得西與菏澤比乎此蓋菏水分濟而東與泗㑹合故菏泗之稱遂亂而班氏所以為菏為泗也湖陵之水亦菏也班氏又名為河此皆於地理未核遂使後人難以稽據許氏以徐貢之河為菏亦據見水道實跡而於安國所𫝊之書有不盡信焉耳程氏深取許而於浮汶道汴之說皆黜棄之信乎其稽古之審也然於班氏猶有所假借云菏河二字古多轉借互用果如其說則徐貢之所謂逹於菏者豈不以一字之文而亂他州之所謂入河逹河者乎經書導濟云東至於菏書豫之治水云導菏澤皆為菏字而於此獨為河何哉此蓋古文傳寫之誤無疑學者徑宗許氏可也程氏此論甚詳余不必悉引淮海惟揚州孔氏曰北距淮南距海李氏曰江南其氣燥徑厥性輕揚故曰揚揚輕也荆州南境至衡山之陽故杜氏以南越為非九州之域是也南越非九州之域則閩越亦當非而杜氏猶以隸揚州何也考禹治水之迹止及震澤而史𫝊稱其巡狩止及㑹稽則㑹稽而南為要荒之地可知矣故言揚州之境者當曰東距海不當曰南距海彭蠡在今江州及南康界既豬陽鳥攸居孔氏曰彭蠡澤名隨陽之鳥鴻雁之屬冬月所居於此澤唐孔氏曰彭蠡是江漢合處下云導漾水南入於江東匯為彭蠡是也日之行也夏至漸南冬至漸北鴻雁之屬九月而南正月而北左思蜀郡賦所云木落南翔氷泮北徂是也日陽也此鳥南北與日進退隨陽之鳥故稱陽鳥冬月所居於此彭蠡之澤也班氏曰豫章彭澤縣禹貢彭蠡澤在西今彭蠡澤隸江州九域志云太平興國七年以江州星子縣罝南康軍又以江州都昌縣隸軍有彭澤湖按通典都昌漢彭蠡縣地也張氏曰鴻雁江南所在有之何獨止於彭蠡哉其意以為鴻雁來南至彭蠡而止故今極南如五嶺之外不復見鴻雁矣禹貢之意尚可考也向也洪水滔天彭蠡泛溢不復可辨故鴻雁亦無自而居處今水患既除水復故道彭蠡之水既停蓄而不泛溢故鴻雁至九月亦於此安處也林氏曰彭蠡之澤蓋是江漢所㑹之處既豬者水既豬積於此不復泛溢以為民害也陽鳥攸居謂雁來居於彭蠡之澤諸儒之說皆同而竊有疑於此觀此篇所序治水之詳見於九州之下或山或澤或川或陵或平陸或原隰莫非地名此州上既言彭蠡既豬下言三江既入震澤砥定皆是地名而獨於此三句之間言陽鳥攸居非惟文勢之不相稱然考之九州亦無此例也夫雁之南翔乃其天性有不得不然豈其洪水未平遂不南翔乎古之地名取諸鳥獸之名如虎牢犬邱之類多矣左氏昭公二十年公如死鳥杜元凱釋曰死鳥衛地以是觀之安知陽鳥之非地名乎鄭有鳴雁在陳留雍邱縣漢北邊有雁門人皆以雁之所居為名陽鳥意類此意雁之南翔所居地名故取以為名攸居者水退其地可居也然世代久逺地名之詳亦無所考雖實疑其如此然亦未敢以為必然也程氏曰彭蠡自湖口彭澤兩邑之間㑹於岷漢二江湖口隸江州三江既入震澤今浙西太湖也砥定孔氏曰震澤吳南太湖名言三江已入致定為震澤鄭氏曰三江分於彭蠡為三孔東入海其意言三江既入入海耳不入震澤也按其意言以下十五字乃孔穎逹疏此誤連引班氏曰南江在㑹稽吳縣南東入海今隸蘇州中江出丹陽蕪湖縣西南東至㑹稽陽羡縣入海今太平州蕪湖縣即漢蕪湖縣也通典云漢陽羡縣故城在常州義興縣南太平興國元年義興改為宜興北江在㑹稽毗陵縣北東入海今常州晉陵縣也韋氏曰謂吳松江錢塘江浦陽江也錢塘浦陽一江也安得為二江郭氏曰岷江浙江松江顔氏曰三江謂北江中江南江也此祖安國之說王氏曰一江自義興一江自毗陵一江自吳縣皆入海一江在震澤之上一江在震澤之下震澤水有所泄故砥定也上二江今中絶故震澤有水災於是見此書所記禹跡尚足用以治水也此祖孟堅之說蘇氏曰三江之解古今皆不明豫以所見考之自豫章而下入於彭蠡而東至海為南江自蜀岷山至於九江彭蠡以入於海為中江自嶓冡導漾東流為漢過三澨大别以入於江匯為彭蠡以入於海為北江此三江自彭蠡以上為二自夏口以為為三江漢合於夏口而與豫章之江皆匯於彭蠡則三江為一過秣陵京口以入於海不復三矣然禹貢猶有三江之名曰北曰中者以味别也蓋以三水性不相入江雖合而水則異故至今有三泠之說古今稱唐陸羽知水味三泠相雜而不能欺不可誣也按彭蠡以上為二夏口以上為三二三似互訛檢蘇氏書𫝊已如此姑仍之程氏曰蘇氏即中北二江之文以求三江遂以豫章彭蠡之江南出而北㑹者指為南江以足三江之數是說也於地則有考以經則相應最為愜當而其所以分三江者又求之經文之外故學者信矣而不堅也林氏曰逐州所序治水之曲折皆是列序其一州之水於其下非必以文勢相屬如下文導岍及岐導弱水而下也而先儒乃有此蔽如兗州言雷夏既澤然而考其源委之所注灉沮實未嘗㑹於雷夏三江實未嘗入於震澤也然而經言三江既入震澤砥定者蘇氏曰水之未治也東南皆海豈復有吳越哉及彭蠡既豬三江入海則吳越始有可宅之土而水之所鍾者獨震澤而巳此說是也為揚州之患者江也為江之患者彭蠡也夫以三江之水相注鬭激簜溢以致橫流之多者是勢之必然者也今也禹之導江必於是焉致其力大其容而使之安㑹而不競深岷漢所趨之地而使之緩來而不奔則三江之入海固不必用吾力而震澤亦蒙其賜矣經於此州治水首書彭蠡其規畫尚可想見於數千載之下也一江名三江考經於㑹彭蠡之後分辨中北江甚明當是堯禹時三江既㑹彭蠡而出則岷漢二江復分而為二至今下流每分合不常余以秣陵而下蓋嘗親考之矣經文豈欺我哉程氏以比西河南河隨方命名其為說非不工然以解經之導漾東為北江導江東為中江之文終為不安宜試思之篠簜既敷厥草惟夭厥木惟喬孔氏曰篠簜水去已布生少長曰夭喬高也李氏曰竹節相去一丈曰簜林氏曰兗徐揚三州皆言草木兗之繇條徐之漸包揚之夭喬皆言草木之茂盛特史官變其文耳雖王介甫之喜鑿亦不能曲為之說吕氏曰揚兗之水尤甚喬與條可知也夭喬盛於漸包漸包盛於繇條言之輕重如此也觀此足以見三州水患之退有遲速而禹之所記亦不容無淺深故也雖然孟子言堯洪水之時草木暢茂益焚山澤以驅禽獸而據此則言水患退而後草木始遂其生何也蓋此記下濕之地而孟子則言邱山之高民被害欲居之而禽獸逼人則益不得不焚之耳地有高下之不同故二書之所言各異苟非窮經未免致疑於此矣厥土惟塗泥厥田惟下下厥賦下上上錯張氏曰土惟塗泥謂卑濕也故田第九賦第七水患既退種植既稀地理增美故雜出第六之賦不計利害惟使民自貢不立定賦必其上貢此所以為堯耳厥貢惟金三品孔氏曰三品金銀銅也鄭氏曰金三品者銅三色也林氏曰三品者金銀銅也鄭氏為銅三色者非也瑶琨篠簜孔氏曰瑶琨皆美玉唐孔氏曰美石似玉者也玉石其質相類美惡别名也王氏曰美石次玉者也林氏曰曽氏曰周禮太宰之職享先王則贊玉爵內宰之職后祼獻則贊瑶爵禮記尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫公劉之詩曰何以舟之維玉及瑶則知瑶者玉之次也此說是也琨按說文石之美者似玉則琨次於瑶可見曽氏曰按儀禮樂人宿縣簜在建鼓之間說者以簜為笙簫之屬齒革羽毛惟木孔氏曰齒象牙革犀皮羽鳥羽毛旄牛尾木楩柟豫章唐孔氏曰詩云元龜象齒考工記犀甲七屬兕甲六屬宣二年左𫝊云犀兕尚多棄甲則那是甲之所用犀革為上說文云羽鳥長毛也南方之鳥孔雀翡翠之屬其羽可以為飾故貢之也說文云犛西南夷長旄毛也此犛牛之尾可為旌旗之飾經𫝊通謂之旄牧誓云右秉白旄詩云建旐設旄皆此牛之尾直言惟木不言木名故言楩柟豫章三者皆是揚州美木故𫝊舉以言之所貢之木不止於此林氏曰齒革羽毛皆是鳥獸之肉可以供器用之飾者木亦不必指是楩柟豫章謂凡木之貢皆出於此州也島夷卉服孔氏曰南海島夷草服葛越唐孔氏曰海曲謂之島卉服草服葛服也葛越南方布名用葛為之冀州云島夷皮服是夷自服皮皮非所貢也此言島夷卉服亦非所貢也此與萊夷作牧並在貢篚之間古史立文不次也鄭氏曰此州下濕故衣草服貢其服者以給天子之官張氏曰冀州島夷以皮為服揚州島夷以卉為服皆自其土地所出而用林氏曰按此文在於厥貢之下厥篚之上則其為島夷之貢卉服者明矣服既為貢則與冀州皮服從而可知也厥篚纖貝孔氏曰纖細紵貝水物唐孔氏曰貝纖異物纖是織而為之貝有居陸居水此物下濕故云水物鄭氏曰貝錦名張氏曰貝水名也至今南方採吉貝織為厚繒可以禦寒亦有冀州島夷以皮之制林氏曰按荆州云厥篚元纁璣組璣不圓之珠也故者以珠貝為貨珠既入篚則貝亦可以入篚矣然而以織為一物則織之一字無所屬經但曰織安知其為細紵乎鄭氏曰貝錦名凡為織者先染其絲乃織之則成文矣此說是也蘇氏曰南海島夷織草木為服如今吉貝木棉之類亦一說也而其下文又曰其文斑爛如貝亦以成是貝錦為證然今之吉貝木棉無有所謂斑斕如貝者此說亦未敢從厥包橘柚錫貢孔氏曰小曰橘大曰柚其所包裹而致者錫命乃貢言不常唐孔氏曰橘柚二果其種本别以實相比則柚大橘小此物必須裹送以須之有時故待錫命乃貢言不常也王氏曰橘與柚錫其命而後貢之不常入當繼荆州之無也張氏曰小曰橘大曰柚揚州所有也至今此物永嘉江西為多苐至於致逺故貢篚之外又有包焉包所以封護其外使未遽失土性也此橘柚必錫命而後貢也顔氏曰柚似橘而大其味酸橘柚不耐寒故包裹而貢錫貢者待錫命而後貢非金三品齒革之類為每嵗常貢島夷指東南之夷也橘柚錫貢於夷則今永嘉之地其為夷也必矣沿于江海逹于淮泗孔氏曰順流而下曰沿沿江入海自海入淮自淮入泗林氏曰禹之時江未有入淮之道自揚州入於帝都則必由江而入海然後入於淮泗至吳王夫差掘溝通水與晉㑹於黃池然後江淮始通若禹之時則未有此道也而孟子曰禹疏九河瀹濟漯而注之海決汝漢排淮泗而注之江此蓋誤指吳王夫差所通之水以為禹跡其實非也使禹時江已與淮通則何須自江而入海自海而入淮為是之迂回也哉程氏曰泗之北濟之南有菏水者白定陶而下經昌邑金鄉東緡魚臺四邑而與泗水合是水也班固以為河水許叔重以為菏水菏河古字應通然後知徐貢之書逹河也非以越濟也正因菏以逹也夫惟有菏以為逹濟之因則江海淮泗菏濟自南而北交相灌注水道既無闕絶而經文書例已盡者更不再書通此經一律也孟子於禹貢之書講之素矣豈不知禹之時江無入淮之道乎孟子去春秋之世近矣又豈不知吳開䢴溝江始有通淮之道乎然而曰禹排淮泗而注之江者蓋淮之東大抵地平而多水古溝洫法江淮之所相通灌者非必一處豈但䢴溝之舊跡而已哉林氏之說未可為通論荆在今襄州南障縣及衡在今潭州衡山縣陽惟荆州孔氏曰北據荆山南及衡山之陽唐孔氏曰此州北界至荆山之北故言據也南及衡山之陽其境過衡山也以衡是大山其南無復有名山大川可以為記故言陽見其南至山南也杜氏曰荆警也或取名於荆山焉李氏曰荆州其氣燥剛稟性彊梁故曰荆荆彊也曽氏曰臨沮之荆其隂為豫州其陽為荆州林氏曰孔氏曰北據荆山南及衡山之陽者蓋以衡為大山其南無復有名山大川可以為記故謂南及衡山之陽然謂北據荆山則不可先儒以為據者皆跨而越之也若兗州東南距濟是越濟而東南也青州曰東北據海是越海而東北也此州與豫州荆山為界荆山之北則豫州也安得跨而越之哉故謂之北距荆山則可謂之據則不可曰荆及衡陽則陽字上該荆矣如必曰荆陽及衡陽惟荆州此成何等文義曽林二公之說足以證孔氏之誤非深於經文不能也江漢朝宗于海孔氏曰二水經此州而入海有似於百川以海為宗宗尊也唐孔氏曰詩云沔彼流水朝宗于海毛𫝊云水猶有所朝宗朝宗是假人事而言水也老子云滄海所以能為百谷王者以其下之是百川以海為宗鄭氏曰江水漢水其流湍疾又合為一共赴海也猶諸侯之同心尊天子而朝事之張氏曰如鄭氏所云則止為荆楚言爾所示不廣林氏曰孟子曰禹之治水也以四海為壑白圭以鄰國為壑彼禹之治荆州之水欲使荆州之民免於江漢之患而乃決之於揚州則是以鄰國為壑矣惟施功也雖導江漢之水於荆州然必使之朝宗於海而揚州之民亦免於昏墊之患此其所謂以四海為壑也二水在此州合流而趨下之勢由是而愈順東望滄溟有朝宗之象茍不於此州記則揚州正其入海之地不必記矣九江孔殷在今嶽州巴陵縣即洞庭湖孔氏曰江於此州界分為九道甚得地勢之中按以上至九河既道程氏說刻本所闕今從永樂大典補入唐孔氏曰江以南水無大小俗人皆呼為江或從江分出或從外合來劉氏曰湖漢九水入於彭蠡是為九江桑氏曰九江地在長沙下巂縣西北下巂即嶽州巴陵縣地也朝氏曰洞庭九江也林氏曰九江之名與其地世代久逺不可强通然各自别源而下流入江此則可以意曉也程氏曰九河言播而江不言則江不為九江甚明也然其所以九名當時必有所因不容鑿為之說若其地且據漢世所傳謂在尋陽者為正蓋不敢於去古既逺之世創為臆說以破近古者之𫝊也葉氏曰江出岷山漢出嶓冡皆在梁去海甚逺江至東陵始迆為中江漢至大别始南為北江漢匯澤為彭蠡而江㑹為匯二水合於一而後入海則導江非至東陵導漢非至大别皆無入海之勢故二水雖發源在梁入海在揚而勢可使自是匯而入海順從而不違者東陵大别之間也故言朝宗乎海九江說者以為洞庭不在尋陽是矣九江荆之舊江也江漢有朝宗之勢則自澧而過至於東陵其流雖大而無所壅遏故九江不失其舊而甚中也殷中也甚中者宜過中而反不失中之辭也張氏曰水患既去九江之水皆循故道甚得地勢之中不復泛濫為害也自夫彭蠡既豬於揚州而江漢於此乃得安㑹順趨以逹於海而其上合流之西有九江者於是亦從而孔殷焉沱潛也雲夢也皆由此而治也是皆禹之導水自下而上而彭蠡者荆揚腹心之疾也先有以治之而二州之水害去矣說者惟不識此故不求九江於江漢合流之上而求之於合流之下此說之所以紛紛而終莫可信執也胡不玩經文而思之乎胡不以江漢九江沱漢雲夢次比其地勢而觀之乎始余讀衆說無一當余心者及以葉氏之論詳之然後知余每論大禹治水之規畫頗有可信者九江不必求其有九然後為是如太湖一湖而得名五湖昭餘祁一澤而得名九澤皆不可以數求也今之洞庭當是堯禹之時名為九江無足疑者不然則澧之下東陵之上有水大如洞庭而為江所過者禹顧不書何耶沱潛既道沱出今江陵石首縣潛當在江陵潛江縣孔氏曰沱江别名潛水名皆復其故道唐孔氏曰釋水云水自江出為沱漢出為潛而孔梁州注云沱潛發源此州入荆州以二州沱潛為一者蓋以水從江漢出者皆曰沱潛但地勢西高東下雖於梁州合流還從荆州分出猶如濟水入河還從河出班氏曰江沱出南郡枝江縣西東入江枝江唐隸江陵府熙寧六年省入松滋縣為鎮鄭氏曰枝江之沱尾入江耳首不於江出也華容有夏水首出江尾入沔蓋此所謂沱也潛則未聞象類按通典江陵石首縣即漢華容縣也在府東南二百里縣治正臨大江之南地理志云夏水受江入沔行五百里蘇氏曰枝江沱水華容夏水此荆州之沱潛也郫縣沱水安陽潛水此梁州之沱潛也以安國穎逹之言考之味别之說古人蓋知之久矣梁州荆州相去數千里非以味别安知其合而復出耶林氏曰據爾雅之言是凡水之出於江漢者皆有此名也出於荆者荆之沱潛也出於梁者梁之沱潛也要之皆是自江漢而出不必有合流味别之說程氏曰水自河出為灉故兗有灉沮之灉而後世亦以宋水之受汳者為灉不限一水也江有沱之詩始曰沱中曰汜終曰渚三者輾轉變稱皆取聲協亦可以見其不主一地不専一名也是皆可以類推者然則凡水之出江漢皆可以名沱潛則沱潛云者乃從江漢下流得名耳荆貢自漢陽以上浮漢支水皆為潛浮江支水皆為沱鄭氏不以枝江沱水為此之沱以其非從江出故也而東坡指以為是蓋亦姑從漢志云耳余考枝江之地隸今松滋松滋在江陵西南亦安知枝江之水不於江出而復入江耶至若鄭氏以夏水為沱而東坡則指以為潛此東坡之疏耳何者夏水首出江於華容之境行五百里東入沔此正合爾雅江出為沱之說而東坡以為潛非也然則潛不可得而知歟國初乾德中以漢江陵縣地置潛江縣在荆南東北百有餘里或者水有自漢而來名之曰潛故縣因以名歟程氏求沱潛於漢陽而上之地得之矣雲土夢作乂雲在安州安陸夢在江陵石首孔氏曰雲夢之澤在江南其中有平土邱水去可為耕作畎畝之治唐孔氏曰昭三年左傳云楚子與鄭伯田於江南之夢定四年左傳云楚昭王寢於雲中則此澤亦得單稱雲單稱夢經之土字在二字之間蓋史文兼上下也地理志華容縣南有雲夢澤杜預云枝江縣西有雲夢城江夏安陸縣亦有雲夢安陸今隸安州或曰華容東南有巴邱湖江南之夢雲夢一澤而每處有名者相如子虛賦云雲夢者方八九百里則此澤跨江南北每處名存焉小司馬氏曰雲夢本二澤名蓋人以二澤相近或合稱雲夢耳左傳云昭王寢於雲中又楚子鄭伯田於江南之夢則是二澤各别也蘇氏曰據春秋傳所載則雲與夢二土名也而云雲土夢者古語如此猶曰元纖縞云爾王氏曰雲之地土見而已夢之地則非特土見而已草木生之矣非特草木生之而已人有加功乂之者矣在安陸者雲也在漢之東在華容者夢也在江之南二澤夾江漢於其中而各自鍾水於江漢之外者也後世以其地望相近故總稱雲夢焉耳考此又以知經云沱潛既道雲土夢作乂者以江漢支流俱治而其傍之澤無復泛溢之患也雲土者言濱雲之土復其舊也夢作乂者言濱夢之人皆作乂也此則上下互見其義厥土惟塗泥厥田惟下中厥賦上下孔氏曰田第八賦第三人功修林氏曰此州之土雖同揚州之塗泥然其地稍高故其田加於揚州一等厥貢羽毛齒革惟金三品孔氏曰土所出與揚州同唐孔氏曰揚州先齒革此羽先羽毛者蓋以善者為先由此言之諸州貢物多種其次第皆以當州貴者為先也林氏曰按職方氏揚州其利金錫荆州其齒革革則是二州之所産不無優劣可見矣張氏曰徐州浮磬先於蠙珠豈可謂珠不如石乎梁州鐵先於銀豈可謂銀不如鐵乎穎逹之說過矣此當以文體為言所出適饒於此而且善故先之非以二物之貴賤等輕重也張氏之辨雖巧而實非杶幹栝柏礪砥砮丹孔氏曰幹柘也柏葉松身曰栝砥細於礪皆磨石也砮石中矢鏃丹朱類也唐孔氏曰考工記云弓人取幹之道也以柘為上釋木云栝柏葉松身陸璣毛詩義疏云杶㯉栲漆相似如一杶栝柏皆木名也以其所施多矣柘木惟用為弓幹弓幹莫如柘木故舉其用也砥以細密為名礪以粗糲為稱鄭云礪磨刀刃石也精者曰砥魯語曰肅慎氏貢楛矢石砮賈逵云砮矢鏃之石也丹者丹砂王肅云丹可以為采顔氏曰丹赤石也所謂丹砂者也曽氏曰揚州貢木不言其名所貢之木不可勝名也此州曰杶幹栝柏其所貢者止此而已張氏曰今辰溪丹砂醫方所貴正荆州分域也惟箘簵楛三邦底貢厥名孔氏曰箘簵美竹楛中矢幹三物皆出雲夢之澤近澤三國常致貢之其名天下稱善陸氏曰韋昭云箘一名聆風也馬云楛木名可以為箭毛詩草木疏云葉如荆而赤莖似蓍唐孔氏曰鄭云箘簵聆風也竹有二名或大小異也箘簵是兩種竹也𫝊言三物皆出雲夢之澤當時驗之猶然顔氏曰箘簵竹名楛木名皆可為矢蘇氏曰三邦大國次國小國也杶幹栝柏礪砥砮丹與箘簵楛皆物之重者荆州去冀最逺而江無逹河之道難以必致重物故使此州之國不以大小但致貢其名數而準其物易以輕賫致之京師重勞人也張氏曰三物貢其尤美者厥名猶言尤美也林氏曰考工記云材之美者有妢胡之笴鄭云妢胡胡子之國在楚旁意者即三邦之故地歟吕氏曰凡杶幹及楛十物非朝廷所常用必使之貢則勞民不使之貢則有用而或闕故惟使貢其名名者列其條目而貢之也見聖人處事之精審如此包匭菁茅孔氏曰包橘柚匭匣也菁以為菹茅以縮酒唐孔氏曰周禮醢人有菁菹鹿臡鄭云菁蔓青也蔓青處處皆有而令此州貢者蓋以其味善也僖四年左𫝊齊桓公責楚云爾貢包茅不入王祭不供無以縮酒周禮甸師云祭祀共蕭茅鄭興云蕭字或為莤莤讀為縮束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮鄭氏曰菁茅一物也匭猶纒結也菁茅茅之有毛刺者重之故既包裹而又纒結也王氏曰包匭菁茅者包且匭也物或篚或包至菁茅則包且匭者正以供祭祀故嚴之也張氏曰安國謂匭為匣而礙於包故以包為橘柚康成以包為裹而礙於匭故謂匭猶纒結余謂二物雖微専以供祭祀而非他用豈可不謹哉故以匭藏菁茅矣又以帕復包匭而致嚴也學欲通古今不因見今日之用復帕包盤杅之屬則包匭之說終為孔鄭所惑矣厥篚𤣥纁璣組孔氏曰此州染元纁色善故貢之璣珠類生於水組綬類唐孔氏曰釋器云三染謂之纁李巡云三染其色巳成為絳纁絳一名也說文云璣珠不圓者玉藻說佩玉所懸者皆云組綬是組綬相類之物也張氏曰組此州所善織紝者九江納錫大龜孔氏曰尺二寸曰大龜出於九江水中龜不常用錫命而納之唐孔氏曰史記龜策𫝊云龜千載滿尺二寸漢書食貨志云元龜距冉長尺二寸孟康注云冉龜甲緣也距至也度背兩邉緣尺二寸也杜氏曰蘄州廣濟縣蔡山出大龜書云九江納錫即此杜氏亦附㑹漢儒九江之說耳要禹時大龜不必蔡山者是薛氏曰大龜國之所寶其不得可以為常貢又不可錫命使貢惟使有之則納錫於上先儒多以為錫命乃貢此則何以異於錫貢哉浮于江沱潛漢逾于洛至于南河孔氏曰逾越也河在冀州南東流故越洛而至南河葉氏曰江沱潛漢與河皆不通故必陸逾於洛而後至於南河曽氏曰自漢而逾洛張氏曰順流而下曰浮自荆州順江流以入沱自沱順流以入潛自潛順流以入漢至漢則捨舟陸行以入洛自洛以入於南河程氏曰荆之貢不徑浮江漢而兼用沱潛者隨其貢物所出之便或由正徑或循支派期便於事而已也遡漢之極無水可浮則陸行至洛以期逹河故曰浮於江沱潛漢逾於洛至於南河也自孔安國有順流曰浮之說學者多信之而孔竊有甚疑者豫貢浮於洛逹於河順流也雍貢浮於積石至於龍門西河亦順流也而濟漯受河而東流兗貢浮濟漯以逹於河果為順流乎泗水東流入淮徐貢自淮以浮泗自泗以逹河果為順流乎况荆貢所謂浮於江沱潛漢正如程氏各隨其便之說而逾洛則是遡漢而上無水可以通河故捨舟陸行以入洛由洛以至於河耳又安可謂浮漢為順流乎浮也者舟行水上之謂安國不究經始末而輕為之解學如無垢亦為所誤信哉程氏用功於禹貢也深而昔者余之所疑亦因是而判然矣荆河惟豫州孔氏曰西南至荆山北距河水李氏曰河南其氣安舒厥性寬豫故曰豫豫舒也杜氏曰豫在九州之中言常安逸也又云豫者舒也言稟中和之氣性理安舒也蘇氏曰自北條荆山至於河為豫州北條荆山至河甚近當是跨荆而南猶濟河惟兗州也林氏曰蘇氏之意蓋謂荆州之言荆者南荆也豫州之言荆者北荆也雖以此二山分配二州然以地理考之其實不然北荆與河相去不甚逺茍以荆山為北荆之荆則豫州之境不應如是之狹也曽氏曰臨沮之荆其隂為豫州其陽為荆州此說是也伊出今虢州盧氏縣熊耳山東北入洛洛瀍出今西京河南縣穀城山東南入洛澗出今西京新安縣東南入洛既入于河孔氏曰伊出陸渾山洛出上洛山澗出沔池山瀍出河南北山四水合流而入河唐孔氏曰志云伊水出盧氏縣東熊耳山𫝊云陸渾山者熊耳山在陸渾縣唐先天元年割陸渾置伊陽伊陽今隸西京志云洛水出上洛縣冡領山𫝊云上洛山者冡領山在上洛縣境之內上洛今隸商州志云瀍水出榖城縣潛亭北𫝊云河南北山者榖城潛亭北即是河南境內之北山也通典洛州河南縣有穀城山瀍水所出古榖城在縣西北後漢志引博物記曰瀍水出潛亭山志云澗出新安縣𫝊云沔池山者沔池在新安縣西也志詳而傳略所據小異耳沔池今隸西京伊瀍澗三水入洛合流而入河言其不復為害也林氏曰據伊瀍澗入於洛而洛入於河此言伊洛瀍澗則以四水列言者曽氏曰漢水入於江以入海而荆州言江漢朝宗於海與此同意蓋其水之大小相敵也下文導洛言東北㑹於澗瀍又東㑹於伊此序水之次第自上而及下也此言伊洛瀍澗乃治水之先後自下而及上也曽林二公不知察此而求為大小相敵之說夫三水入洛而洛得兼三水而為大顧謂之相敵可乎不然則禹數九川浴與其一奚為而三者不言也滎波在今鄭州滎澤縣既豬導菏澤在今曹州定陶縣界被孟豬在今南京宋城縣孔氏曰滎澤波水已成遏豬菏澤在胡陵孟豬澤名在河東北水流溢覆被之唐孔氏曰地理志山陽郡有胡陵縣章帝更名湖陸至晉不改其後不知廢於何時不言其縣有菏澤也又云菏澤在濟隂定陶縣東孟豬在梁國睢陽縣東北以今地驗之則湖陵在睢陽之東定陶在睢陽之北其水皆不流溢東北被孟豬也然郡縣之名隨代變易古之胡陵當在睢陽之西北故得東出被孟豬也於此作孟豬左傳爾雅作孟豬周禮作望諸聲轉字異正是一道也許氏說文云菏水出山陽胡陵南正與孔𫝊同而班固以為在定陶何也蓋在定陶者其澤也在湖陵者其流也其流東與四合正在今單州之魚臺魚臺在單之東北百里而近正古湖陵地也而孟豬在睢陽東北則所謂被孟豬者導菏流之在定陶魚臺間者以被之於南也安國惟說菏之源委不明且誤言孟豬在菏東北是以致穎逹疑甚而有古胡陵當在睢陽西北之說余不極力窮之終為二公所惑而況能明禹跡始終經畫之妙耶顔氏曰言治菏澤之水衍溢則使被及孟豬不常入也葉氏曰孟豬菏澤其相去逺被及也猶言西被於流沙者導菏澤被孟豬言水僅相及而孟豬之蓄不以菏澤也林氏曰職方氏曰其川滎雒其浸波溠鄭云滎沇水也波讀曰播禹貢曰滎播既豬顔氏曰波亦水名曽氏曰爾雅云水自洛出為波觀此諸說則滎波之為二水明矣唐孔氏曰洪水之時滎澤水大動成波浪今時已成遏豬則是言滎波為一水也顔師古雖言波亦水名又言一說謂滎水之波則姑存兩說而不敢斷也林氏専主職方所記以為當是二水固不為無據之說然以余考之上文言導洛此則専主導濟而言不當又泛言洛之支水職方所記山川非治水次第不必泥也雖然導水之法大抵自下而上至此則先言伊洛瀍澗之入河而後次及於滎菏何也蓋洛濟入河處不甚相逺平時洛併諸水之力附河而下濟猶有所不堪而况其橫流浩蕩之時滎澤所承其有不為害之慘乎禹謀度之先皆灼知此利病故其經始河患施瀹濟之功必先疏四水以循故道而滎波固可豬矣滎波既豬則菏澤固可無患而猶導其流以被孟豬者所以殺其餘溢而亦預為他日泄水之地也反覆參究禹之規畫如在吾目吾殆不知手之舞之足之蹈之也厥土惟壤下土墳壚孔氏曰高者壤下者壚疏許氏曰壚黑剛土也唐孔氏曰直言壤不言其色蓋州內之土不純一色故不復得言色也厥田惟中上厥賦錯上中孔氏曰田第四賦第二又雜出第一壤者和緩之謂也墳者不黏埴之謂也此州兼有二土田宜若最上而止居第四者以下土又有黑剛之處非播種所宜故也履歷農郊利害在目君子其可忽於此乎厥貢漆枲絺紵厥篚纖纊錫貢磬錯浮於洛逹於河孔氏曰纊細綿治玉石曰錯治磬曰錯唐孔氏曰纖是細故𫝊言細綿顔氏曰紵纖紵為布及練也王氏曰磬錯二物不常貢錫命乃貢張氏曰揚州言厥包橘柚錫貢荆州言九江納錫大龜二州去冀都甚逺其待錫命則有說矣豫州北近冀都而磬錯亦以錫貢聖賢之惜人力如此則夫崇飾臺榭以為遊觀輦運土木以資妄費皆聖賢所深惡矣可不戒哉林氏曰職方氏云豫州其利漆枲則是漆枲之類此州之所宜也纖纊諸儒皆以為細綿然為二物亦未可知也華陽黑水惟梁州華山在今華州華隂縣孔氏曰東據華山之南西距黑水唐孔氏曰周禮職方氏豫州其山鎮曰華山在豫州界內此梁州之境東據華山之南不得其山故言陽也此山之西雍州之境也杜氏曰以西方金剛其氣强梁故曰梁州曽氏曰華山之隂為雍州其陽為梁州岷在今茂州汶山縣嶓在今秦州界既藝沱在今彭州永昌縣界潛此漢别出於嶓東南至恭州巴縣入江既道孔氏曰岷山嶓冡皆山名水去已可種藝沱潛發源此州入荆州唐孔氏曰漢制縣有羌夷曰道地理志云蜀郡有湔氐道岷山在西徼外江水所出也隴西郡西縣嶓冡山西漢水所出也沱出於江潛出於漢二水發源此州而入荆州故荆州亦云沱潛既道班氏曰禹貢江沱在蜀郡郫縣西東入大江又曰江沱在蜀郡汶江縣西南東入江郫今隸成都府汶江即今茂州汶川縣地鬵谷水出漢中安陽縣西南北入漢通典云金州安康縣即漢安陽縣也晉改安康唐至德二年又改為漢隂今仍漢隂名鄭氏曰郫之沱安陽之潛其尾入江漢耳首不於江漢出江源縣有􅗪江首出江案隋志後周改江原曰晉原今隸蜀州南至犍為武陽縣又入江豈沱之類歟通典云眉州彭山縣即武陽地也潛蓋漢西出嶓冡東南至巴郡江州入江者通典云江州縣故城在渝州巴縣西今渝州改為恭州郭氏曰沱水自蜀郡都水縣箋山與江别而東流又曰有水從漢中沔陽縣南流沔陽晉猶存九域志興元古迹有沔陽城至梓潼漢壽入大穴中通峒山下西南潛出一名沔水舊俗云即禹貢潛也案晉志云劉備據蜀改葭萌曰漢壽西晉泰始三年又改漢壽為晉壽後孝武分梓潼北界立晉壽郡統晉壽等縣案通典利州晉屬晉壽郡縣無晉壽而有葭萌不知何時復此舊名林氏曰沱在彭州唐昌本朝開寶四年始改為永昌又曰沱在益州郫縣西小司馬氏曰郫之沱安陽之潛是也以漢志通典考之以地勢觀之則是沱水别流於茂州汶川之境徑彭州永昌又徑成都郫界復東入大江明矣鄭氏謂在郫之沱首不江出此蓋未嘗深考源委曲折故也若潛水惟鄭氏所指西漢與經浮潛正合請辨于後葉氏曰江漢見於荆者既朝宗于海則已治矣故於發源無所用力特言岷嶓既藝則不特水治也林氏曰江漢二水發源此二山當其泛溢悍怒而未有所歸則其發源之山亦為水所浸灌而不得遂其播種之利今既疏導以入于海則岷嶓二山所出之水皆順流而東則此二山遂可種藝矣治江漢之水由東而西上亦既極其源矣而分派旁流者又已俱治則梁州之大功畢矣萬世之下想象禹之規畫何其簡易精當如此也蔡蒙旅平二山皆在雅州嚴道縣和夷砥績嚴道和州鎮即和夷之故地也孔氏曰蔡蒙二山名祭山曰旅平言治功畢和夷之地致功可藝唐孔氏曰地理志云蒙山在蜀郡青衣縣應劭云順帝改曰漢嘉縣蔡山不知所在和夷平地之名鄭氏曰蔡蒙皆在漢嘉縣杜氏曰雅州嚴道縣有蒙山禹貢云蔡蒙旅平謂此也漢嘉不知廢於何時案晉志屬漢嘉郡今雅州晉漢嘉郡也其地當在嚴道之境王氏存曰雅州蒙頂山即書蒙山也蘇氏曰蒙山今曰蒙頂和夷西南夷名林氏曰據漢志青衣但有蒙山無蔡山不知鄭氏何所據而知蔡山亦在漢嘉當姑闕之鄭氏謂和為夷所居之地而曽氏本鄭說以謂自嚴道而西地名和川夷人居之今為羈縻州者三十有七則經所謂和夷者也蘇氏亦以和夷為西南夷名若此諸說皆可信今雅州猶有和川鎮此即和夷之故地也和夷者東近蒙蔡之夷也蔡蒙旅平則和夷底績矣此梁州西南最逺之地言旅平於此所以示告終也厥土青黎厥田惟下上厥賦下中三錯孔氏曰色青黑而沃壤田第七賦第八雜出第七第九三等愚謂差等之處有三第六第七第九也八不與其中唐孔氏曰王肅云黎小疏也顔氏曰色青而細疏曽氏曰梁州山水俱多故其賦比九州為下等獨言色之青黑而不及其性則非壤非墳為土之剛瘠可知矣使其果為沃壤如孔氏之說則田宜上品而顧乃止居下上何耶厥貢璆鐵銀鏤砮磬孔氏曰璆玉名鏤剛鐵唐孔氏曰釋器云璆琳玉也郭璞云璆琳美玉之别名鐵者可以刻鏤故為剛鐵也曽氏曰蜀郡卓氏至以鐵冶富擬邦君則梁州之利尤在於鐵故言鐵先於銀也熊羆狐貍織皮西傾因桓是來孔氏曰貢四獸之皮織金罽西傾山名桓水自西傾山南行因桓水是來浮於潛唐孔氏曰與織皮連文必不貢生獸故𫝊云貢四獸之皮釋言云氂罽也舍人曰氂謂毛罽也胡人續羊皮作衣織毛而言皮者毛附於皮故以皮表毛耳地理志云西傾在隴西臨洮縣西南西傾在雍州自西傾山南行因桓水是來浮於潛水也地理志云桓水出蜀郡蜀山西南行羌中入南海則初發西傾未有水也不知南行幾里得桓水也馬氏曰治西傾山因桓水是來言無他道也鄭氏曰桓水出西傾山杜氏曰西傾山在洮州西南吐谷渾界桓水所出鄭氏曰桓是隴阪之名其道盤桓旋曲而上故名之曰桓蘇氏曰西傾桓水出焉桓入潛潛入沔葉氏曰雍言織皮崑崙析支渠搜西戎即叙則織皮非中國之貢也疑西傾即西戎之境熊羆狐貍織皮文當與西傾因桓是來相屬謂此四獸之皮西傾之戎因桓水而來貢也西傾雍州之山也西傾之戎胡不浮積石至于龍門西河而必道梁州之界何也因有桓水之便較積石為近故舍彼而從此焉耳是來云者是指梁州言也酈杜諸公皆言桓水出西傾於經文為順而班固以為出蜀郡之山非也浮于潛水凡出於漢者皆名潛則漢志安陽鬵谷之水與郭氏所引沔陽南流之水皆謂之潛可也若此所浮之潛則當以鄭氏所指漢西出者為正蓋主之以經文參之以地理則桓水自西傾來東與之㑹者惟以西漢水當之可也苟舍是而他指於西漢之東則桓水其能越西漢乎逾于沔孔氏曰漢上曰沔又曰泉始出山為漾水東南流為沔水至漢中東行為漢水班氏曰沮水出武都沮縣東狼谷山今興州順政縣漢沮縣之地也南至沙羡南入江羡音夷漢屬江夏郡即今鄂州江夏縣過郡五行四千里荆州川其記禹貢養水則曰出隴西氐道縣當在秦州之西至武都為漢今階州將利漢武都地也其武都縣注則曰東漢水受氐道水一名沔過江夏謂之夏水入江其南郡華容縣注則又曰夏水首受江東入沔行五百里應氏曰沔水自漢别至南郡華容為夏水過江夏郡入江故郡曰江夏杜氏曰沔水發源興利順政縣一名沮水又曰沔州漢陽縣有漢水一名沔水漢陽令為軍鄭氏曰或謂漢為沔劉氏曰巴漢志云漢水二源出氐道之養山名養南都賦注曰漢水源出隴西經武都至武關山厯南陽界出沔口入江巴漢志曰西漢出隴西嶓冡山㑹白水經葭萌入江案廣漢郡有白水縣注云水出徼外北入漢案通典利州景谷縣漢白水縣也今利州無景谷但昭化有白水鎮當是唐家五代廢人桑氏曰漾水出隴西嶓冡山東至武都沮縣為漢又曰漢水更南過巴郡閬中縣今閬州酈氏曰東西兩川俱出嶓冡同為漢水雖津流派别枝渠勢縣原始要終潛流或一故俱受漢漾之名又曰東西兩川俱受沔漢之名程氏曰漾水不出西縣嶓冡山却出武都沮縣東狼谷山而東流入漢中若以東狼谷山所出之水為漢源則東狼谷山當為嶓冡矣西漢嘉陵江水也自髙祖置廣漢郡以後人見嘉陵江來自興鳳與漢中接境又郡名廣漢遂誤名嘉陵以為漢水耳東西漢水辨班氏言漢水出隴西氐道而劉氏引巴漢志又言出氐道養山是皆水源實跡而非鑿空遽為之說也今考氐道地當在秦州之西而嶓冡山者養山以東之山也漾水發源養山而東徑嶓冡其水别為一流東南至江州入江者即後世所謂西漢而禹時所浮之潛也以地勢考之既㑹桓水為順而於經之浮潛又合顧何必致疑於其間而又泛求之他乎學者如考經之詳當自以余說為當漢沔辨杜氏言沮縣東狼谷之沮即沔水也沔出沮縣東狼谷而漾出隴西氐道則沔漾之源班氏固未嘗以為一也及記漾水至武都為漢則曰東漢水受氐道水一名沔是沔至武都去沔源為近雖其流未與漾合而沔漢之稱固已亂其真矣況於下流既合而顧孰辨沔漢之異源耶孔氏曰漢上曰沔鄭氏曰或謂漢為沔皆𫝊文承襲之餘而未嘗知源委曲折者也至劉氏所引巴漢志言西漢始源曰沔酈氏言東西兩川俱受沔漢之名則又誤益誤而不知質諸經者也據經但言嶓冡導漾東流為漢無漢上曰沔之語雖曰浮潛逾沔而逾之一字與自漢逾洛同義漢不通洛則自潛逾沔之地亦非水道相貫而所以至此必捨舟陸行者以潛入沔之處相逺而於此而逾非惟趨沔為近且入渭為便故貢道不得不然耳學者茍能本諸經而參之史且於地理之學不茍則余之說煥然而前人之述誤可以挽漢川之水而一洗之矣顧不快哉沔夏辨班氏曰沮至沙羡入江沔過江夏入江似二委不同也及余考沙羡之地即今江夏縣也是二委入江即漢水一派而巳班氏記漢沔既知異源而至合流混名不加考察故又記其一委為二亦猶孔鄭諸公以二源為一也大抵𫝊習之誤如此者多非旁參力究詎能知始末曲折之當乎雖然自漢沔之名雜漢入江處曰沔口可也而又有夏口之名何耶據漢志言沔過江夏謂之夏水而南郡華容有夏水首受江東入沔行五百里蓋由夏水至江夏界入沔故沔遂得夏水之名非華容夏水即沔也沔既得名夏水故沔口亦稱夏口云耳彼應劭謂沔自漢别至南郡華容為夏水此又謬𫝊之甚者也通典江陵縣有夏水口此受江之口耳入江夏口在江夏縣界也凡此學者亦當討論嘉陵江辨案嘉陵江出鳳州大散關西南嘉陵谷至興州北境當㑹東漢水而東行安得越東漢而為西漢乎夫自漢志言漾水出氐道巴漢志又言出氐道養山則是來自今秦州之西境過階州將利之東興州順政之西迤邐東趨漢中者是漢源流亦道之實也彼嘉陵江來自大散西南則不容不入東漢而程氏指以為漢人所謂西漢者由其以東狼谷之沮為東漢則嘉陵源委固可為西漢無礙也大抵事之偏執至迷誤後學者古今同一律耳非極力稽證其能得其真乎入于渭亂于河孔氏曰越沔而北入謂浮東渡河而還帝都白所治正絶流曰亂唐孔氏曰計沔在渭南五百餘里故越沔陸行而北入渭渭水入河故浮渭而東孫炎曰亂橫渡也漢武帝時人有上書欲通褒斜道志云斜水出扶風武功縣衙嶺山北至郿入渭褒水亦出衙嶺山至南鄭入沔通典云漢中褒城縣有褒水褒谷及漕事下張湯湯問之言抵蜀從故道顔氏曰故道即今鳳州界也故道多阪回逺今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽上沔入褒褒絶水至斜間百餘里以車轉從斜下渭如此漢中榖可致而山東從沔無限便於抵柱之漕且褒斜材木竹箭之饒擬於巴蜀上以為然拜湯子卯為漢中守發數萬人作褒斜道五百餘里道果便近而水多湍石不可漕蘇氏曰沔在梁州山南而渭在雍州山北沔無入渭之道而漢人所言褒斜此則自沔入渭之道也然褒斜之間絶水百餘里故曰逾于沔蓋禹時通謂褒為沔也據唐孔氏言越沔陸行而北入渭則是以漢為即沔自浮潛至沔即捨舟陸行而北入渭也然經言浮于潛逾于沔則是自潛逾沔非謂自沔逾渭也若以逾于沔為逾于渭則以逾于洛為逾于河可乎蘇氏求褒斜之道得之矣然亦以漢為即沔以禹時通謂褒為沔而說逾之一字與穎逹無異吾固質之經而莫敢信也且以經而參之史沔漢本二源甚明但不知沔東行幾百里入漢水耳今而浮潛以至漢上去沔為近故捨舟陸行以入沔而沔之相通者又有褒焉故自沔北入褒又自褒逾斜而北逹渭然言入不言逹以褒斜之間絶水百餘里又有如漢人所言故也兼上文既言逾沔亦所以該下而有文也夫沔褒既是水道言沔不言褒可也斜渭既是水道言渭不言斜可也如其必欲言沔渭之間有褒斜絶水不通則當曰逾于沔逾于渭古人之文豈如是其不簡直哉學者試以豫說思之當亦見學經之不可苟而有以發明先儒之所未能言者顧豈好辨也乎黑水西河惟雍州孔氏曰西距黑水東據河龍門之河在冀州西唐孔氏曰計雍州之境被荒服之外東不越河而西逾黑水玉蕭云西據黑水距西河所言得其實也遍檢孔本皆云西距黑水東據河必是誤也又河在雍州之東而謂之西河者龍門之河在冀州西界故謂之西河王制云自東河至於西河千里而近是河相對而為東西也李氏曰河西其氣蔽壅受性急凶故云雍雍壅也杜氏曰以其四出之地故曰雍州亦謂西北之位陽所不及隂所壅閉凡釋九州之名者皆因字生義云耳未必得古人命名之實不足信也弱水既西來自雍州西北徼外涇屬渭汭孔氏曰導之西流至於合黎屬逮也水北曰汭言治涇水入於渭唐孔氏曰諸水既言導此言既西由地勢不同導之使西流也鄭云衆水皆東此水獨西故記其西下也屬謂相連屬故𫝊訓為逮逮及也言水相及毛詩𫝊云汭水涯也鄭云汭之言內也蓋以人皆南面望水則北為汭也且涇水南入渭而名為渭汭知水北曰汭弱水在雍境西北之極與涇水邈不相及而又中限以大河禹所記若利害相關何也蓋方其洪水橫流之時弱亦東浸㑹衆水而被於河河不安而涇亦受其患矣禹導河於冀兗豫之間雍之上流固已砥定而今其畢功於此則必以導弱為先者以雍之為害尤在於弱水故也今既導之使西以復其故道則大河之西無泛濫之水河安而涇亦安矣不然則於經文固未可通而禹之規畫亦豈泛然無統要者乎漆沮既從灃水攸同孔氏曰漆沮之水已從入渭灃水所同同之於渭葉氏曰灃在涇上漆沮在涇下今言涇而後漆沮言漆沮而後灃者漆沮既從而不違則灃可與渭同入於河灃以後成用力宜差多故詩獨言灃水東注維禹之績也治弱水以及涇漆沮雖自西而東然涇漆沮治而後治灃則又自下而上也禹之規畫非不定如此度勢隨宜行其所無事也如河患在九河疏其下則其上易為力江患在彭蠡豬其上則其下無足憂皆所以先後順理也學者得余說而通之然後可以觀禹貢荆岐既旅孔氏曰已旅祭言治功畢此荆在岐東非荆州之荆唐孔氏曰治水從下自東而西先荆後岐葉氏曰治冀之初固巳自梁及岐則荆州之旅久矣言終南惇物至于鳥鼠者自終南至鳥鼠皆刋旅也終南在長安縣惇物在武功縣至于鳥鼠孔氏曰三山名言相望唐孔氏曰三山空舉山名不言治蒙上既旅之文也班氏曰扶風武功縣大一山古文以為終南垂山古文以為惇物皆在縣東案通典京兆長安縣有終南山而班氏以為即武功大一山當是唐以來其山屬長安林氏曰九州之地西北多山東南多水雍州在西北故其山為最多揚州在東南故其水為最多觀此篇之所載可以見矣秦都長安在雍州所謂百二之險者惟其山多故也凡此下文所謂導山益稷篇所謂濬畎澮距川是也案荆在耀州導荆則或導其水於河或導之於漆沮也岐在鳳翔導岐則或導其水於涇或導之於渭也終南在長安惇物在武功此又或導於灃或導於渭各隨其利順焉耳至於鳥鼠則渭之發源是也其上下左右之水皆導之以入渭則又不言可知矣禹記每州治水山川表裏交相發明而導山導川又叙其始末之詳於後讀此書者參㑹而觀之其庶乎不為童習之懵然而發之文章言語間當有意味學者將皓首猶童習乎抑將童習蚤為之所乎原隰砥績今别州之地至于豬野在於涼州孔氏曰下濕曰隰豬野地名言皆致功唐孔氏曰鄭元以為詩云度其原隰即此原隰是也原隰豳地從此致功西至豬野之澤也班氏曰休屠澤在武威縣東北古文以為豬野澤杜氏曰涼州姑藏縣有豬野澤今為化外地原隰至豬野亦猶惇物至鳥鼠雖其地相去甚逺而當時施功由下而上者不極其所當治不巳也大抵禹之治水其大而要者既先導之使有歸小而渙散者又各濬之使有距夫然後為澤自爾豬為平地自爾安而陂障修治之功易矣原隰近涇渭豬野近河弱三危既宅三苗丕叙孔氏曰西裔之山已可居三苗之族大有次叙美禹之功唐孔氏曰禹治水未畢已竄三苖水災既除彼得安定林氏曰舜竄三苗之始蓋在洪水未平之前及乎洪水既平之後三危之地既可安居則三苗之族於是始得其叙案經舜竄三苗在受終之年而唐孔氏諸公以為受終之年洪水已平若受終之年洪水已平則竄三苗在洪水已平之後禹於此預記其丕叙何邪穎逹為今之說正與經合雖自背於前不覺也三危既定此治黑水之成功張氏曰舜之遷逐四凶終無疾惡之心必欲使之大有次叙安其居止而無憂愁不聊之苦而後已此聖人之心也吕氏曰三苗不道竄於三危自後世觀之凡以罪流放者聽其自殘自生在所不恤聖人之心不如此方其有罪必行竄棄刑行之後施仁發政自當同及故禹治水至三危亦為畫其居宅其與漢文時所論王制不同厥土惟黃壤厥田惟上上厥賦中下孔氏曰田第一賦第六人功少唐孔氏曰此與荆州賦田升降皆較六等荆州升之極故云人功修此州降之極故云人功少其餘相較少者從此可知也王制曰凡居民量地以制邑度地以居民地邑民居必參相得也則民當相準而得有功修人功少者記言初置邑者可以量之而州境闊逺民居先定新遭洪水存亡不同故地勢有美惡人功有多少治水之後即為此差在後隨人少多必得更必其等此非永定也林氏曰凡天下之物得其常性者最為可貴土色本黃此州之土黃壤故其田為上上而非餘州之所及也厥貢惟璆琳琅玕孔氏曰璆琳皆玉名琅玕石而似珠浮于積石至于龍門西河㑹于渭汭孔氏曰積石山在金城西南河所經也沿河順流而北千里而東千里而南龍門山在河東之西界逆流曰㑹自渭北涯逆水西土唐孔氏曰㑹合也人行逆流而水相向故逆流曰㑹從河入渭自渭北涯逆水西上言禹白帝訖從北而西上更入雍州界也諸州之末惟言還都之道此州事終言發都更去明諸州皆然也林氏曰此州之逹於帝都有二道浮于積石至于龍門西河者一道也自渭汭以逹於河者又一道也渭汭之道亦砥龍門西河故以㑹言之非至于龍門西河乃始㑹于渭汭也程氏曰雍之貢入有兩道其北道自後世朔方西涼浮河者無所因於他州故特記其詳曰浮于積石至于龍門西河其南道自今陜西入河者與梁之北貢所謂浮渭入河者同道而可以㑹合積石之貢於河故又因梁州前文而特致其略止曰㑹于渭汭而已其義例與梁荆一律也㑹言貢道之㑹非㑹貢也織皮崑崙析支渠搜西戎即叙孔氏曰織皮毛布有此四國在荒服之外流沙之內羌髳之屬皆就次叙美禹之功及戎狄也唐孔氏曰四國皆衣皮毛故以織皮冠之四國崑崙也析支也渠也搜也鄭氏曰衣皮之民居此崑崙析支渠搜三山之野者皆西戎也王肅云崑崙在臨羌西析支在河關西西戎西域也王肅不言渠搜鄭併渠搜為一孔傳不明或亦以渠搜為一通西戎為四也案陸氏引馬云崑崙在臨羌西析支在河關西與王肅所言正合臨羌河關皆漢金城郡之縣也陸氏又云漢志朔方郡有渠搜縣武紀云北發渠搜是也然以余考之漢朔方之渠搜非此所謂渠搜此亦當是金城以西之戎也後世種落遷徙故漢有居朔方者若禹時渠搜居朔方則不應浮積石陸氏之說非也蘇氏曰禹貢之所篚皆在貢後立文而青徐揚三州皆萊夷淮夷島夷所篚此云織皮崑崙析支渠搜西戎即叙大意與上三州無異蓋言因西戎即叙而後崑崙析支渠搜三國皆篚織皮但古語有顛倒詳略耳其文當在厥貢惟璆琳琅玕之下其浮于積石至于龍門西河㑹于渭汭當在西戎即叙之下以記入河水道結雍州之末簡編脫誤不可不正梁州言熊羆狐貍織皮此獨言織皮者蒙上文也此言西戎即叙梁州止言西傾者以下文該之也禹貢說斷卷二
