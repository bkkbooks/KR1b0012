body:
  text: 禹貢說斷卷四宋傅寅撰𨗳淮自桐柏孔氏曰桐柏山在南陽之東唐孔氏曰地理志云桐柏山在南陽平氏縣東南淮水所出水經云出胎簮山東北過桐柏山胎簮蓋桐柏之傍小山傳言南陽郡之東也胎簮山即桐柏也後世又别名之耳禹謂𨗳淮自桐柏不應桐柏非淮所出今其山在唐州桐柏縣東㑹于泗沂唐孔氏曰沂水先入泗泗入淮耳以沂水入泗處去淮已近故連言之東入于海在楚州東北入海班氏曰淮水東南至臨淮淮陵縣入海淮臨晉猶存不知後於何代廢省今其地當在楚州界𨗳渭自鳥鼠同穴孔氏曰渭水出焉林氏曰渭水出於首陽南谷而禹之𨗳渭惟自鳥鼠同穴而始故曰𨗳渭自鳥鼠同穴余考水經有所謂出鳥鼠山者有所謂出南谷者二者皆以渭水名之然禹言𨗳渭自鳥鼠而南谷者不記則南谷者他水之名渭者耳桑酈之説得之傳聞大抵不足多據而林氏援之以斷經顧不思禹𨗳漾江不言自為其源之逺也而渭比漾江之源為如何哉下比淮洛同一書法禹之意可知矣唐孔氏曰釋鳥云鳥鼠同穴其鳥為鵌大吾反其鼠為鼵徒忽反李巡曰鵌鼵鳥鼠之名共處一穴天性然也郭璞曰鼵如人家鼠而尾短鵌似鵽而小知乱切鵽鳩一名冠雞黄黒色穴入地三四尺鼠在内鳥在外孔氏尚書傳云共為雌雄張氏地理記云不為牝牡璞並載此言未知誰得其實也此禹自其源而𨗳之也余詢曽官隴西者曰鳥鼠各有雌雄是張氏之説為然也案刻本下衍四十八字今從永樂大典本校正程氏曰經於鳥鼠一山而三言之雍州曰終南惇物至於鳥鼠𨗳山曰西傾朱圉鳥鼠其後叙渭又言鳥鼠同穴蓋其先單言鳥鼠者再而合言鳥鼠同穴者一耳占三從二則鳥鼠同穴巳見其非一山矣考之水經桑欽止曰渭出鳥鼠山無同穴之文也地説曰鳥鼠山者同穴山之枝幹也據此則鳥鼠同穴自是二山明也孔安國曰鳥鼠共為雌雄同穴處此山因以名也此説甚怪而本之爾雅臣不敢遽議其非也鄭元之時已知此二名者當為二山矣而疑經之鳥鼠同穴蓋嘗聨文則又為之説曰鳥與鼠飛行而異處者其山為鳥鼠及其止而同處則其山為同穴且曰鳥名鵌以鵽而黄黒鼠同家鼠而短尾穿地而共處鼠内而鳥外此不惟謹並爾雅且亦兼存鳥鼠同穴之文兩冒而俱言之冀有一而合也然其理有可疑者鳥鼠異類自不應相牝牡設使有之二蟲者何知而能飛行止宿異處同歸不踰其常耶况水經所載二山之中川流間之不正相附其言鳥鼠飛游各為一山而其所宿又自一山推之於鵌尚或能之若鼠而絶水必待泳游乃得越過其於同穴理不能常蓋專意附㑹爾雅而不自覺其不通也至於杜彦逺則以為同穴止宿養子互相哺養張晏以為不相牝牡最後杜寶大業雜記有曰大業三年隴西郡守獻同穴鳥鼠煬帝謂牛洪曰爾雅曰其鳥曰鵌其鼠曰鼵鼵當尾短今長何耶洪曰舊説未必可依遂圖以付所司此説也杜寶以為可以傳信故書也然煬帝好奇尚諛宫禁之内髙徳儒且指野鳥為鸞今其蕩游無度荒逺守臣強取鳥鼠配合古説以來媚悦固不足信而又鼠尾長短巳與古説不同益知詐罔也李吉甫郡縣志曰鳥鼠山今名青雀山其同穴鳥如家雀而青鼠如家鼠而黄其氣辛辣人若馬中之輒病是説也使誠不妄則隋唐相近牛洪其必知以洪之佞凡事迎逢焬帝當其致疑鼠尾洪豈肯不以此種語實其欺陷耶吉甫雖信傳聞而著之志自謂堅確矣然古以鵌色為黄黒而今以雀為青雀則不獨隋世之鼠尾與古異而唐傳之雀色亦不與古同此皆未可據信載考其説以為山在縣西渭水所出二源並下則正與他説所為鳥鼠為同穴山之枝幹者合也然則鳥鼠山者其同穴之别枝歟渭出其間凡二其源而下流乃始參㑹此二源者又皆經禹疏𨗳特鳥鼠一山獨大故經之概叙山川單言鳥鼠者再蓋舉其大者言之也鳥鼠之山雖大而渭之𤼵源不止此一山於是叙渭所始兼舉而並言之故曰鳥鼠同穴也參据前後其為兩山何疑而何用附㑹入之怪神也且酈道元最為尚怪在叙注諸水悉取小説異教奇文幻記以為實録而獨於此不肯主信也於是前叙渭源則直引地記以明同穴别是一山後於孔鄭杜張四説又皆存之而不以為是也夫平時尚怪者至此尚疑其怪則真誕矣臣之詳辨乎此者正以渭源近而可驗古𫝊鵌色黄黒至唐為雀而特變青則其誕又可以質而世獨信之於以見古事之出於隠暗荒逺如色味地脉皆不應引之以紊古經也東㑹于灃出京北鄠縣東南孔氏曰灃水自南而合班氏曰酆水出扶風鄠縣今𨽻京北東南北過上林苑在長安入渭張氏曰曰酆水出鄠縣南山酆谷北入渭上林賦注又東㑹于涇出今鎮戎軍升頭山孔氏曰涇水自北而合班氏曰涇水出安定涇陽縣西升頭山東南至馮翊陽陵縣入渭案通典曰漢涇陽縣故城在原州平凉縣南又曰平髙縣有笄頭山涇水所出九域志云至道元年以原州故平髙縣地置鎮戎軍古迹有笄頭山一名雞頭一名崆峒又原州有臨涇縣渭州平凉縣即唐平凉縣地也陽陵自晉已廢當是今京兆涇陽之地又東過漆沮在今華州華隂縣北孔氏曰漆沮二水名亦曰洛水出馮翊北班氏曰洛水出馮翊懷徳縣東南入渭懷徳在今耀州富平縣界沮水出北地直路縣東北入洛直路自後漢巳廢今其地當在慶寧諸郡桑氏曰沮水出北地直路縣東過馮翊祋祤縣北東入于洛今耀州同官縣漢祋祖也在州東北五十里酈氏曰澤泉水出沮東澤中與沮水隔原相去十五里俗謂是水為漆水也東流逕懷徳城北東南注鄭渠合沮水又以沮直絶注濁水至白渠合焉故濁水得漆沮之名也其水又東北注于洛水洛水入渭在華隂縣北如酈氏所説漆沮二水也既入于洛而洛亦以漆沮名者豈以其混流之故而稱號之通歟不然禹何為其亂名實如此也唐孔氏曰地理志曰漆水出扶風漆縣今邠州新平地是也依十三州記漆水在岐山東入渭則與漆沮不同矣此云㑹于涇又東過漆沮是漆沮在涇水之東故孔以為洛水一名漆沮以水土驗之與毛詩古公自土沮漆者别也彼即漆扶風漆水也彼沮則未聞入于河在華州華隂縣東北班氏曰渭水東至船司空入河通典云漢船司空故縣在華隂東北北五十里𨗳洛自熊耳東北㑹于澗􅈆孔氏曰㑹于河南城南又東㑹于伊孔氏曰㑹于洛陽之南又東北入于河孔氏曰合于鞏之東鞏𨽻西京在京東一百一十里劉氏曰帝王世記云夏太康五弟湏于洛汭在鞏縣東北三十里九州攸同孔氏曰所同事在下唐孔氏曰昔堯遭洪水道路阻絶今水土既治天下大同故總叙之蘇氏曰書同文車同軌葉氏曰九州辨土地以别之者始也一制度以同之者終也吕氏曰九州之水皆同其底平之功攸字訓所言所同則是總目下文之事也傳之説為長四隩既宅孔氏曰四方之宅巳可居唐孔氏曰室隅為隩隩是内也遂以隩表宅言四方舊可居之處皆可居也張氏曰室隅為隩謂其僻逺也言水患既除四方之僻逺處亦各安其所居也杜氏曰隩猶淇奥之奥案刻本下衍奥隅二字今從永樂大典本校正水患既平四方之民居水之隈曰隩皆得安其居也吕氏曰言四方之外皆可宅也案刻本脱吕氏曰言四字今校正九山刋旅九川滌源九澤既陂孔氏曰九州名山已槎木通道而旅祭矣九州之川已條除泉源無壅塞矣九州之澤已陂障無泛溢矣唐孔氏曰上文諸州有言山川澤者皆舉大者言之所言不盡故於此復更總之林氏曰九山九川九澤皆是泛指九州之山川澤而言之若必欲以弱水而下為九川雷夏而下為九澤則𨗳岍而下果九山否乎山者川之所自出所由逕者也言九山於上而九川擊之則是九川者九川所出所逕之山也澤者川之所或至所或鍾者也言九川於上而九澤擊之則是九澤者九川所至所鍾之澤也禹之言曰予决九川距四海而𨗳弱以下又正當其數則所謂九川滌源者非泛指亦明矣説者意禹為總括之語而不知九川者百川之所㑹列九川而言則凡九州之刻本作九川見其中矣記事之精簡宜無大於此者而况禹之施功雖徧天下要固自有足跡未嘗及者以非患之所在故也滌源而泛指豈百川皆滌源乎九山自𨗳岍而下九澤自雷夏而下皆是也凡其川流脉絡豬蓄匯溢皆與九川相為表裏者也主之以九川而山之與澤皆亦名九以見山澤之非泛指而皆其附九川而名之者也詳經文之首末討治水之規模固不容於泛論禹也學者試思之吕氏曰九州之山巳刋除置壇場而旅祭以告成功九州惟梁雍書旅山而梁必書蔡蒙者書之於所言山之末以示告成之義也雍必書荆岐岐者書之於所言山之首又以見禹迹所至無不祭也以二州互見之文而上該他州之祀禮禹之書法大抵簡嚴如此也然蔡蒙二山則近岷江荆岐二山則近河渭禹顧不泛書他山何也九山刋旅余益信其為九川所擊利害之山為不誣也所謂滌源者治水自下而上至其源亦滌之也弱黒之水雖不極其源導之所自起亦源也程氏曰河之為患至能憂勞堯禹久之乃平則後世遭罹其患者亦何敢諱勞惜費臣獨有怪者三代而後能變亂為治使天地萬物悉就條理者惟漢唐本朝而河患特甚它代秦晉隋得國不久固不暇逺畧其餘三國五季以及南北不能包攬河境設有䇿畫東不能指之於西南不能以及其北其不相該應如此冝其常决不救及反厪厪有之此似天有定數非人力得預臣嘗深為難曉也久之熟思漢人賈讓之論謂古隄闊故游波有所縱盪漢隄狹故束迫而為决溢乃慨然嘆曰此天下至理也是河道平决之分也讓獨專以論隄而臣推以論世於是宿疑釋然河事可得而論矣讓之言曰齊與趙魏為境齊作隄去河二十五里水抵隄泛趙魏趙魏亦為隄去河二十五里漢隄陿者去水數百步逺者數里夫以漢隄而較古隄其受容不同如此而水比古不加少彼不决安歸也且古人豈不知棄地可惜正為有所棄乃能有所存不容曲計目前耳後經治世生齒衆作業盛但見河堧有地而棄不知古人有為為之也既已田之又從而治屋廬或聚落稍慮漂沒則隄外起隄以自䕶壅它日復有田廬其外者益又添隄以賈讓所見齊趙魏以及黎陽今隷衞州内黄今隷北京諸馬今隷滑州諸有隄處大隄之外小隄大抵數重以率言之凡邊河州縣近河添隄益多則容水益陿其理然也漢去古不逺已不知遥隄本意恣民堙障不立限禁茍無賈讓謂之發明則古制殆無傳矣利之所存惟人希土曠則河堧得以受水稍經生息則遥隄之外展轉添隄固其所也則何怪乎漢唐以及我宋平治久則河決益數也是故漢自髙后以前唐自肅代以後河患特少則生齒登耗乃與河之平決相應蓋有以矣惟國朝建隆之初即決隷滑與它朝事勢不類蓋周世宗父子於大河下方兼南北有之民視瀕河為内地故攘據其中者衆以端拱詔書驗之則可見矣又書叙滎蠡既豬而總之曰九澤既陂水經河北有鯀隄李垂言大伾有禹隄則隄之來古矣賈讓言隄防之設近自戰國者非也且河自陜洛以上它水入之過此則它水率多受河是冀兖豫之河皆行乎地上也古而無隄三州無見土矣由是言之雖禹亦必仗隄以為水防則隄之利害可不究窮乎河之源委以比四瀆最逺且長其所容受乃不如江多郭璞謂踰河減江則其狹可知夫其狹人力所不能廓獨其㳂岸有隄逺河一丈則水之容也益一丈増一里則益一里姑以古隄存者言之對隄皆空二十五里則是河道兩旁有五十里可受漫水縱有霖漲溢冒平地未必能越五十里而破隄以出此為無拓河之勞而收拓河之利古人之智也漢明帝之詔曰左隄彊則右隄傷左右皆彊則下方傷夫知左彊則固右以禦其暴姑可紓矣左右俱彊兩不能齧而其怒乃移下方是惟無以受之巧力雖勝終不免一法也有以知厯世狹隄所以甚堅而無補於敗皆是故也漢人欲訪禹迹穿地為九以傚九河曰縱不能為九但得四五冝有益又嘗議多穿漕渠分殺水怒本朝亦嘗屢開支河如金赤游麋六塔案以上五字刻本脱今從永樂大典本補入二股減水諸河是皆措置之大者也揆其按二字刻本所無今從永樂大典本補入意度皆将求分水力而巳然使水力當分縱於要處得百許支河道其減得幾熟與並河凡郡悉設遥隄使之方行無所束迫其為容受何啻一支流之多哉况水闊則平平則隄易以立束而急之則湍怒以與隄鬬故甚堅亦敗此又利善之差殊者也又國朝乾徳興國祥符之間三嘗講求遥隄獨興國詔書為詳曰河防舊以遥隄寛其水勢其後民利沃壤咸居其中河以盛溢則罷其患遂遣趙孚等條析隄内民籍税數議蠲賦徙民興復隄利聖意究知害源鋭意復古千世一時也孚輩智不及逺徒曰遥隄存者百不一二役費甚大妄以他語塞詔而止夫遥隄久廢驟復動亘十數郡廢誠大閣熟田不得耕徙見民不得居妨誠多然獨不能對引利害以相除乎河不決猶歲歲有春料費常不下鉅萬萬茍決矣不論何地何時悉雜役兵夫救塞勞費殆無已時何嘗不費而又決溢所及不止並河但在下流城郭屋室丁口生業漂溺掃地比之徙民益業害又益大孚不長計而曲以目前言之殊可惜也然而此一舉也平世為之實難漢田蚡奉邑在鄃故城在今徳州平原縣西南利在河決而南則鄃無水灾於是瓠子之禍淮夷悉塾武帝欲加救塞蚡矯夭面議不容帝之施力今遥隄所包豈止百鄃占田其間豈盡是循理之士但有一蚡何世不可藉田此策殆不輕得行也或者如髙祖平秦光武中興承大亂餘烈土無見民縱復廣為之禁亦無妨奪於此時而訪遥防毁近障葺廢定令以漸為之規模一定息水怒於不爭縱初時勞費而逸寧之效燕及無極其功始可纘禹不止一世也臣故論而著之以俟方來程氏之論河隄究極古今𤼵明利害真有用之學也余受之不忍棄編之於此則夫學禹貢而但説山川之名者可以愧矣四海㑹同孔氏曰四海之内㑹同京師九州同風萬國共貫唐孔氏曰禮諸侯之見天子時見曰㑹殷見曰同此言四海㑹同乃謂官之與民皆得聚㑹京師非據諸侯之身朝天子也夷狄戎蠻謂之四海但天子之於夷狄不與華夏同風故知四海謂四海之内即是九州之中乃有萬國萬國同其風化也葉氏曰五服之内皆㑹同於京師以脩其職張氏曰水患既去非特九州之民往來無阻而蠻夷戎狄皆復㑹同于京師矣吕氏曰四海皆㑹同朝王六府孔修孔氏曰水火金木土榖甚修理言政化和唐孔氏曰六材之府甚修治矣張氏曰非特水得其性而火金木土榖亦各得其性而為天下用矣蓋水於天地為物最大水得其性則五行亦皆得其性矣此鯀湮洪水乃謂之汨陳其五行而九疇之次五行所以一曰水居其先者豈無謂乎葉氏曰六府無廢財貢賦之法於是乎立庶土交正底慎財賦咸則三壤成賦中邦孔氏曰交俱也衆土俱得其正謂壤墳壚致所慎者財貨貢賦言取之有節不過度皆法壤田上中下大較三品成九州之賦明水害除唐孔氏曰致所重慎者惟財貨賦税也慎之者皆法則其三品土壤凖其地之肥瘠為上中下三等以成其貢賦之法於國中美禹能治水土安海内於此總結之蘇氏曰交通也正平凖也庶土不通有無則輕重偏矣故交通而平凖之九州各則其壤之髙下以制國用為賦入之多少中邦諸夏也貢篚有及於四夷者而賦之於諸夏也王氏曰庶土交正底慎財賦言以衆土交相正制財賦之法致慎其事也咸則三壤成賦中邦言九州之田咸有則以成中邦賦法蓋土賦有及四夷田賦止於中邦而巳葉氏曰庶土交正以九土相參而辨其等也咸則三壤以三壤定其制而為之法也書有貢名而此獨言賦以所底慎而養中國者在賦而貢其義也吕氏曰庶土交正九州之土彼此相視髙下各得其正底慎二字見聖人當庶土交正之時欲制其賦先慎敬慎之心制其法歸於中以為萬世之𫝊惟先有敬心則能制上中下三等之壤以成賦於中邦大抵序事序其事迹則多違其本心序其本心則多略其事迹今此四句載禹制賦之辭本末皆備底慎者其心也則壤者其迹也以此見古之秉筆作史者皆知道之人程氏曰禹之定賦也曰咸則三壤成賦中邦孔子之叙書也曰任土作貢則九州之田冝皆與賦相當也今考之經其相當者兖之一州耳荆之賦至髙於田五等此其故何也孔安國謂人功有修有不修以理推求當必有之然無古事以謂之證也故曰賦者直記其米粟之出於田者耳賦之外有貢焉併貢而總之以為賦入之數故髙下相補除而田品賦等自應不齊也是説也臣求之經似亦有當矣蓋荆之賦最重者也田賦之外其貢則金瑶琨篠蕩齒革羽毛織貝橘柚不勝其多也雍之賦最輕者也以其田賦之外貢者璆琳琅玕而已亦無包篚之類故總言之則輕也以其最輕最重者質之輕而此説近乎可信矣然言經者不可執一得其一隅而三隅對來皆無所礙乃為通耳今其説曰田品之下者其賦本輕惟其該貢篚數之則為重是矣然考之於冀其賦為總秸粟米此外絶無一貢用何物増計而使髙於田四等也徐之賦下於田三等亦巳輕矣然其貢為夏翟桐磬珠魚元縞不為不多矣於其中珠元縞三者皆非易得之貨而又未知其責貢幾何者然則胡為而不得合并以就重賦之目歟以此推之知其不能遽通也又論古事者必得古制古制刻本脱二字今從永樂大典本増入文微當得古説既有古制以為稽據又有古語從而𤼵明之則古事之情見矣經之分州叙事也貢與賦對出禹於立制取民之初明著其意惟曰庶土交正底慎財賦咸則三壤成賦中邦但以此文求之則九州貢篚似不在數矣然其書專以貢名而又孔氏叙書亦止云任土作貢則貢者又以專指貢篚而言也而臣有以折𠂻其歸者得之孟子也曰夏后氏五十而貢商人七十而助周人百畝而徹其實皆什一也禹貢之貢即孟子所謂五十而貢者蓋其一代賦名也夫其為貢雖與助徹周為什一而其制之所以取民則龍子所謂校數歲之中以為常者又其所以為什一也載考之經刻本脱二字今從永樂大典本増入兖之賦必待作十有三載乃同者兖居東北最下河害特甚它州山川田土久矣其就藝又而兖之升髙避水者今而始得降邱宅土也自非寛為之期使加功歲久則無所謂數歲中校可以起立貢則是故作之必至十有三載乃同他州也然則龍子之謂校數歲以為常者經固言之矣况經之叙則壤成賦也其必待六府孔修之後則土未出榖庶土雖可交正禹猶未肯遽立賦者也然則賦則之本於歲校益又可證矣孔安國之以人功參田品者豈亦有見於此耶又周人之制井九百畝其中為公田八家皆私百畝同養公田是聚八家之力治公田百畝而八家别自各得百畝之入此其所以為什一之制也夫惟所取單出公田設非歲稔亦不于公田之外多責一穗一粒此所以田之與賦常相什一而無時輕時重之異也夏后氏之制一夫授田五十畝若歲各立則隨田所入以歸公上則與周制同矣而有所謂校數歲之中以為常者又於田品之外參核歲事以為品則也品品信有髙下矣官又籍其歲入而參記之閲數歲之中而酌其中以定多寡此其意以為加詳而不知適以加獘也歲校以定多寡奠焉異時歲事不必常如參定之初於是所輸始見其偏矣當樂歲而粒米狼矣則歲校所取比之什一為巳寡及夫凶年糞其田而不足而必取盈焉則歲校所取比之什一為巳多故龍子得以議之曰治地莫善於助莫不善於貢也此其田與賦所以有時而不相應也雖然聖人立法猶有可議者歟善乎黄門蘇氏之言曰貢之不若助也爼豆之不若盤盂也肉刑之不若徒流笞杖也古之人不為此非不智也勢未及也寢於地者得藁秸而安矣自藁秸而後有筦簟也自筦簟而後有温麗也此貢助徹均為什一而所以什一者不同蓋見獘而後知所以救也庶土交正底慎財賦者蓋參正庶土之髙下有無而必致其謹也謂之財賦者賦之出于土者不一故以財言之也咸則三壤成賦中邦此田賦也必以中邦言者蓋表其為什一之正行之中國謂之堯舜之道而非桀貊之道也田賦如此土賦從可知矣荆公謂土賦有及于四夷非也四夷皆以貢言不當以賦言也錫土姓祗台徳先不距朕行孔氏曰台我也天子建徳因生以賜姓謂有徳之人生此地以此地名賜之姓以顯之王者常之以敬我徳為先則天下無距為我行者唐孔氏曰此一經皆史美禹功言九州風俗既同可以施其教化天子惟當擇任其賢者與共治之選有徳之人賜與所生之土為姓既能尊賢如是又天子立意常自以敬我徳為先則天下之民無有距違我天子所行者皆禹之使然故叙而美之蘇氏曰我以徳先之則民敬而不違矣王氏曰錫土姓者言建諸侯賜之土以立國賜之姓以立宗林氏曰錫土姓者於是始可以彊天下封諸侯而成五服也左傳曰天子建徳因生以賜姓胙之土而命之氏蓋胙之土即所謂錫土是也命之氏即所謂錫姓是也如契封於商錫姓子氏稷封於邰錫姓姬氏必在於此時以稷契觀之則其他諸侯皆然也施博士曰祗台徳先不距朕行何預於治水之事而於此言之者當洪水未平之時四方諸侯其㑹同之禮有廢而不講者則其於祗上之徳蓋亦闕如也然則徳雖出於上之所為而能使之祗台不距者禹預有貢焉故舜稱之曰廸朕得時乃功惟叙其意亦合於此善哉此説也張氏曰向也洪水滔天九土莫辨雖有徳之人當賜姓氏者上亦無所施設矣禹既弼成五服至於五千州十有二師外薄四海咸建五長各廸有功其當賜姓氏者多矣今以功來上可以施行也錫土者命之氏而逺及支庶錫姓者因其所生而以傳其正適焉若舜賜姓曰媯而命其氏曰陳者是也媯以傳其適不容有兩人氏以及支庶則是凡曰陳者皆其支庶也此有土姓之别歟祗台徳先不距朕行者此則深明禹以勤徳率諸侯而諸侯各廸有功之意也夫禹懲創丹朱以傲而殄厥世故過門而不入啟呱呱而弗子祗勤我徳以先之遂弼成五服至於五千而州十有二師外薄四海之長各廸有功皆不違我之所行矣以是知禹所以成此大功者非他求之也祗我勤徳以先之而已吕氏曰古者無常姓必有功徳然後賜之爵命之氏禹之治水如此廣博其所勞役天下多矣而天下翕然從禹之行而無距者蓋禹有徳以先之故也使禹無徳以先之下天下豈肯從今看禹貢皆是自禹為此則是徳何則禹之所為此其心何如也史官恐後世見禹之胼胝遂以為禹惟有力故以徳表之此作書之要害去而利興法善而政行九州所同也此其功雖在禹而贊佐與有力焉故錫土姓及於益稷之儔而禹於此者之曰享所賜者以彼等能敬從吾之表倡也自常情觀之禹之言近於矜而禹非矜也紀實事以褎同列而敷奏於吾君之前正所以為不欺學者毋以常情議禹可也五百里甸服孔氏曰規方千里之内謂之甸服為天子服治田去王城面五百里唐孔氏曰既言九州同風法壤成賦而四海之内路有逺近更叙弼成五服之事甸侯綏要荒五服之名堯之舊制洪水既平之後禹乃為之節文使賦役有常職掌分定甸服去京師最近賦税尤多故每於百里即為一節侯服稍逺近者共役故二百里内各為一節三百里外共為一節綏要荒三服去京師益逺每服分而為二内三百里為一節外二百里為一節以逺近有較故其任不等甸服入榖故𤼵首言賦税也賦令自送入官故三百里内每皆言納四百里五百里不言納者從上省文也於三百里言服者舉中以明上下皆是服王事也侯服以外貢不入榖侯主為坼候二百里内徭役差多故各為一名三百里外同是斥候故共為一名自下皆先言三百里而後二百里舉大率為差等也顔氏曰甸之為言田也王氏曰五百里甸服者畿内也甸者井牧其地之謂王所自治也吕氏曰四井為邑四邑為邱四邱為甸甸之一字見得井牧之法至此巳成百里賦納總孔氏曰甸服内之百里近王城者禾藁曰總入之供飼國馬唐孔氏曰去王城五百里總名甸服就其甸服内又細分之從内而出此為其首總者總之銍秸禾穗與藁總皆送之周禮掌客待諸侯之禮有芻有禾此總是也蘇氏曰總藁穟并地最近故納總三百里納銍孔氏曰銍刈謂禾穗唐孔氏曰説文云銍穫禾短鐮也詩云奄觀銍刈用銍刈者謂禾穗也禾穗用銍以刈故以銍表禾穗也三百里納秸服孔氏曰秸藁也服藁役唐孔氏曰去穗送藁易於送穗故為逺彌輕也然計什一而得藁粟皆送則秸服重於納銍則乖近重逺輕之義蓋納粟之外斟酌納藁四百里猶尚納粟此當藁粟别納非是徒納藁也顔氏曰言服者謂有役則服之耳王氏曰納秸而服輸将之事也以正在五百里之中便於畿内移用故使納秸服也林氏曰納秸雖優而又使之服輸将之事則其力之所出者以補其財之所入財之所入足以優其力之所出矣蘇氏曰以藁為藉席之類可服用者秸之為用多矣故百里既併穗納之三百里又純輸此賦也納秸之下加一服字以見輸将之勞可與不納粟相補除也四百里粟五百里米孔氏曰所納精者少麤者多王氏曰四百里粟者以逺故也五百里米者以其尤逺故也東萊先生曰榖有殻曰粟無殻曰米張氏曰藁秸雖輕而舟車負載不若粟米之數少也林氏曰薛氏曰畿内天子之居其所賴以養天子者在此千里之民而已故所賦所納備言於此蓋餘服則賦各歸其國故禹貢略之義或然也觀經文於納總之上特加一賦字則凡賦之出於田者皆可以觸類而通之矣故自諸侯以下但言見國逺近之制而不及所輸之物其辭不費使讀之者自以意曉此又述作體也田賦有兵車牛馬之屬而不言者蓋舉食而言則兵不言可知矣五百里侯服孔氏曰甸服外之五百里候候也斥候而服事唐孔氏曰襄十八年左傳稱晉人代齊使司馬斥山澤之險斥謂撿行也斥候為撿行險阻伺候盗賊此五百里主謂斥候而服事天子故名侯服因見諸言服者皆是服事也蘇氏曰此五百里始有諸侯故曰侯服林氏曰建侯服以封親賢使各守其民人社稷以為天子之蕃衛也張氏曰公侯伯子男凡五等止曰侯服何也蓋三恪之後方稱上公謂前代異姓之後使得守代代禮樂制度以存宗社故稱為公以尊其祖也若當代之封則皆為諸侯耳周制太保為西伯率西方諸侯畢公為東伯率東方諸侯此蓋朝廷三公也一公居中二公分陜以治侯服之不及公所從來久矣百里采孔氏曰侯服内之百里供王事而巳不主一唐孔氏曰采則事事謂役也有役則供不主於一故但言采王氏曰於此有采地也蘇氏曰卿大夫之采地周氏曰周官六卿之外為六遂六遂之外有家邑為大夫之采地小都為卿之采地大都公之采地王子弟所食邑也與此王畿五百里之外始有采服同意周制采地在畿内此在畿外何也唐虞之際民淳事簡封建少而土地寛故采地在畿外至周則封建宻而分畫詳矣采地不得不移之内也雖然周之采地稍縣都凡三百里此特一百里又何也周建官多唐虞之官少而况甸三百里非皆采地亦有公邑此百里則皆采地耳是故讀禹貢而參亦周官則庶乎王制之㳂革可知矣二百里男邦孔氏曰男任也任王者事唐孔氏曰言邦者見上下皆是諸侯之國也蘇氏曰與百里采通為二百里也男邦小國也王氏曰於此但建男邦者欲王畿不為大國所逼而小邦易獲京師之助也三百里諸侯孔氏曰三百里同為王者斥候故舍三為一名蘇氏曰自三百里以往皆諸侯大國次國也小國在内依天子而國大國在外以禦侮也東萊先生曰男采在内既足以䕶王畿又去王畿近強悍諸侯不足以陵之此聖人制内外之輕重不差毫末所謂天下之勢猶持衝也張氏曰其建置如此豈有如李唐頡利引兵直至渭水如石晉耶律引兵直至大梁之患乎林氏曰輪賦税則逺者輕而近者重建侯邦則逺者大而近者小逺近大小輕重莫不有法於其間而彊天下之制盡於此矣五百里綏服孔氏曰綏妄也侯服之之五百里安服王者之攻教也唐孔氏曰要服去京師巳逺王者以文教要束使服此綏服路近言安服王者政教以示不待要束而自服也張氏曰綏之為言安也謂以安王室為職也此亦諸侯耳亦其稍逺故變名為綏欲其知此五百里内所以建諸侯者為安王室也林氏曰王畿之外既封建諸侯之國使以小大相維強弱相比以為王室之輔矣而其外之五百里則接於邊陲蓋其外則要荒之服也故於此則設為綏服以為内外之辨此服之内所建之國所立之制凡欲服安邊境衛中國而巳故其名曰綏服東萊先生曰綏服者去王畿漸逺不可不常存綏撫之心故以綏為名又須見聖人非私於彼加意於逺算計見效與近者均也三百里揆文教二百里奮武威孔氏曰揆度也度王者文教而行之三百里皆同文教之外二百里奮武衛天子所以安張氏曰三百里之内雖去侯服未逺然已有夷蠻之風先王修其教不易其俗齊其政不易其宜故於綏服不必盡行朝廷文徳第付之賢者使揆度其所可行而教之王氏曰二百里奮武衛者以近蠻夷故也東萊先生曰二百里之國而能捍數百里之蠻者蓋因其所居而使之守其鄉邑則人必自盡二百里足矣薛氏曰今之邊徼右軍旅而略文教與此同意五百里要服孔氏曰綏服外之五百里要束以文教蘇氏曰總其大要法不詳也東萊先生曰要服只是蠻夷然猶近中國故為要約而已不一一治之也張氏曰蠻夷之性不可盡責以文教何休曰王者之於夷狄以不治治之斯言其有味矣三百里夷孔氏曰守平常之教事王者而已蘇氏曰雜夷俗也王氏曰三百里夷者於此皆夷也張氏曰夷有簡易之意亦要束之説也二百里蔡孔氏曰蔡法也法三百里而差簡王氏曰蔡放也放罪人於此蘇氏曰放有罪曰蔡春秋𫝊曰殺管叔蔡蔡叔蔡素逹反五百里荒服孔氏曰要服外之五百里言荒又簡略王氏曰荒不治也言不可要而治也林氏曰漢班超為西域都尉甚得夷狄心超被召還任尚代之尚謂超曰君侯在外國三十餘年而小人猥承君後宜有以誨之超曰塞外吏士李非孝子孫順蠻夷之心難養易敗宜蕩佚簡易寛小過總大綱而巳禹名境外之服謂之要荒正超所謂蕩佚簡易之意也三百里蠻孔氏曰以文徳蠻來之不制以法唐孔氏曰鄭云蠻者聽從其俗覊麋其人耳故云蠻蠻之言緡王肅云蠻慢也禮儀簡慢林氏曰要服三百里謂之夷荒服三百里為之蠻蓋此乃徼外蠻夷之地也二百里流孔氏曰流移也言政教隨其俗凡五服相距為五五千里吕氏曰凡曰夷曰蔡曰蠻曰流皆是夷狄本名皆不必求其義如唐之突厥漢之冒頓此豈有義可求林氏曰要服之三百里夷其外二百里是亦夷也而謂之蔡荒服之三百里蠻其外之二百里是亦蠻也而謂之流蓋其外之二百里其地為景逺中國之人有積惡大罪而先王不忍殺之者則投之於最逺之地故於要荒二服取其最逺者言之以見流放罪人於此者其為蠻夷之地則蒙上之文可見也五服之名與其每服之内逺近詳略皆是當時彊天下下之實迹也故於侯服則言其建國小大之制至於要荒則言其蠻夷逺近之辨與夫流放輕重之差皆所以紀其實也東漸于海西被于流沙朔南暨聲教託于四海孔氏曰漸入也被及也此言五服之外皆與王者聲教而朝見唐孔氏曰南北不言所至客踰之此言西被於流沙流沙當是西境最逺者也而地理志以流沙為張掖居延澤是也計三危在居延之西大逺矣志言非也王氏曰言訖于四海則朔南亦皆訖于海東萊先生曰漸被暨亦不須於一字上為之輕重但水患治平自東自西自南自北無思不服林氏曰此言九州彊界之所抵以見其聲教之所暨也考之上文海岱惟青州海岱及淮惟徐州言青徐之境東海也故曰東漸于海雍州之弱水既西弱水至於合黎餘波入於流沙是雍州之畀抵于流沙揚州曰淮海惟揚州則是揚州之界抵于南海冀州夾右碣石入于河河之入海在碣石之右則冀州之界抵于北海故曰朔南暨聲教訖于四海朔南不言其所至者連下文而見之也聲教者亦文徳之所及也然下文既曰訖于四海則是四方皆至於海矣而西獨言祗于流沙者蓋水之西流至此而極不見其所歸未可以正名其為海也故王制曰西不盡流沙東不盡東海亦惟以東海對流沙也張氏曰王制云西不盡流沙南不盡衡山東不盡東海北不盡恒山今此聲教東言海西言流沙朔南不言所至以是知不止於恒山銜山而已也蓋四海之内南北長東西短故東西皆可言其所止而南北其際未易窮也中庸曰聲名洋溢于中國施及蠻貊天之所覆地之所載日月所照霜露所墜舟車所至人力所通凡有血氣者莫不尊親其此之謂歟東海流沙衡山恒山九州彊界之所至也是謂四海之内要荒二服則為四海矣朔南不言所至舉東西以見朔南也若夫聲教之所及則不限以彊界之所至言東界于海則海以東漸之矣言西被于流沙則流沙以西被之矣言朔南暨聲教而繼以訖于四海則朔南所暨又不至於恒衡二山明矣張氏引中庸為説甚當言南北亦是而以東西為止於東海流沙則又與中庸未合聖人之政令雖自有分限而聲猷之所聳動光華之所覆被蓋與天地之髙明溥博一也無垢之説余謂本之以明其所未盡吾徒以為何如禹錫𤣥圭告厥成功孔氏曰元天色禹功盡加於四海故堯賜元圭以彰顯之言天功成王氏曰禹錫元圭于堯以告成功也元天道也歸功於堯故錫元圭與師錫帝九江納錫大圭同義蘇氏曰以五徳王天下所從來尚矣黄帝以土故曰黄炎帝以火故曰炎禹以治水得天下故從水而尚黒殷人始以兵王故從金而尚白周人有流火之祥故從火而尚赤湯用元牡蓋初克夏因其舊也詩云有客有客亦白其馬是殷尚白也帝錫禹以元圭為水徳之瑞是夏尚黒也比五徳所尚之色見於經者也張氏曰考功既云天謂之元禹之治水一順天理以成功故堯錫以元圭志其功也林氏曰古者交於神明必用圭璧此是洪水既平禹以元圭告成功於天耳必用元圭者蓋天色元固天事天猶蒼璧然也其曰錫者下錫上亦可謂之錫之也東萊先生曰禹既成功故以元圭贄見於舜亦告成功古者卿大夫以至於士相見皆有所贄以通情羔鴈幣帛雉之類是也水患平而錫土姓君之報功也聲教訖四海而錫元圭臣歸美以報上也然歸美必以元圭者元天色也圭粹玉也言吾君之徳與天為一而寓誠於圭以表見之也君吾是徳而臣欲成是功其可乎此禹告成功之深意而言之於敷奏之末者亦禹之自言也或者以為史辭誤矣五服辨案以下刻本所闕今從永樂大典原本増入唐孔氏曰凡五服之别各五百里是王城四面面别二千五百里四面相距為方五千里也賈逵馬融以為甸服之外百里至五百里米特有此數去王城千里其侯綏要荒服各五百里是面三千里相距為方六千里鄭元以為五服服别五百里是堯之舊制及禹弼之每服之間更増五百里面别至于五十里相距為方萬里司馬遷與孔意同王肅亦以為然故肅注此云賈馬既去其實鄭元尤不然矣禹之功在平治山川不在拓境廣土土地之廣三倍於堯而書傳無稱也則鄭元創造難可據信漢之孝武疲獘中國甘心夷狄天下户口至減大半然後僅開縁邊之郡而巳禹方憂洪水三過其門不入未暇以征伐為事且其所以為服之名輕重顛倒逺近失所難得而通矣先王規方千里以為甸服其餘均分之公侯伯子男使各有寰宇而使甸服之外諸侯入禾藁非其義也史遷之旨蓋得之矣是同于孔也若得周禮王畿之外别有九服服别五百里是為方萬里復以何故三倍于堯又地理志言漢之土境東西九千三百二里南北萬三千三百六十八里驗其所言山川不出禹貢之書山川戴地古今必同而得里數異者堯與周漢其地一也尚書所言據其虚空鳥路方直而計之漢書所言乃謂著地人跡屈重而量之所以數不同也故王肅上篇注云方五千里者直方之數若其迴邪委曲動有倍加之較是言經指直方之數漢據迴邪之道有九服五服之地雖同王者革易自相變改其法不改其地也鄭元不言禹變堯法乃云地倍于堯故王肅所以難之王制云西不盡流沙東不盡東海南不盡衡山北不盡恒山凡四海之内斷長補短方三千里者彼自言不盡明未至逺界且王制漢世為之不可與經合也葉氏曰禹制五服每服率五百里而王畿甸服在其内則一方為二千五百里東西南北相距各五千里此所謂弼成五服至于五千者也至周而益為九畿每畿亦互百里而王畿又不在内則一方為五千里南北東西各萬里周之地果如是廣乎學者求其說而不得故鄭元以堯舊服五千里至禹治水之後又増其倍是詭謂禹貢為舊服所増之數以與周制合之謂周公攝政斥大九州之境故五等諸侯之封大者増其五之四小者増其十之五此其矯妄不經無所取信余以周官大司馬九州之籍考之方千里曰國畿其外亦皆以方言方者謂四方也四方環之為千里徑數之每方當止為二百五十里則周之畿為儉于禹矣所以然者天下之事至周而加詳則朝聘㑹同之節貢賦税斂之法不得不審林氏曰前所言者九州之山澤川浸與夫田賦貢篚之詳纖悉盡之而其所以彊界天下以為京師諸侯夷狄之别者猶未之盡也於是遂言五服逺近之制周官職方氏辨九州之國使同貫利自東南曰揚州至其榖宜五種既列序九州之詳乃繼之曰辨九服之邦國自方千里曰王畿以下遂言其所以為九服者此蓋倣禹貢書而為之也然其所記載則有不同者此篇自甸服至於荒服每面二千五百里四面相距為方五千里職方氏方千里為王畿王畿之外為九服毎服亦以五百里為率并王畿而數之則有萬里之數故諸儒疑焉或以謂周公斥大境土其地倍於堯禹之世此蓋未嘗深考此二書之所載徒見其所序者皆以五百里為言遂從而為之説耳禹之五服與職方氏之九服所謂五百里者職方氏則自其兩面相方而數之惟禹之王畿在五服之内而自其一面而數之故禹之五服自畿服至于荒服每面二千五百里四面相距為方五千里至于職方氏王畿不在九服之内而以二面相方而數之故九服之内有方千里之王畿王畿之外每面二百五十里二面相方為方五百里之甸服故自王畿之外至於藩服每面二千七百五十里四面相距各為五千互百里其所以増於禹貢者但有五百里耳安得萬里之數􅁘漢地理志云漢之境土東西九千三百二十里南北萬三千三百六十八里則是漢之輿地不啻萬里故言周之九服有萬里者往往推此以為據唐孔氏曰漢之山川不在禹貢之域山川戴地古今必同而得里數異者堯禹周漢其地一也尚書所言據虚空鳥路方直而計之漢書所言乃謂著地人跡屈曲而量之所以其數不同也唐孔氏此説其謂堯與周漢其地一也此誠確論若以虚空鳥路方直而計里數則古無此理以某觀之山川不出禹貢分域而得有里數倍加者古今之尺不同耳王制曰古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東南北四十六畝三十步古者百里當今百二十一里六十步四尺一寸二分蓋古今令尺長短盈縮隨世不同故其里數廣狹亦異此王制所載但是自周初至于戰國數百年間而其所差已如此竊謂職方氏之九服所謂五千里者即禹貢五服所謂五千里漢之山川除武帝開闢四夷所載武威酒泉南海蒼梧數十郡之外其他州郡皆禹貢五服之地禹之聲教東漸于海西被于流沙朔南暨聲教訖于四海是其要荒之所暨則皆已至于極邊之地縱使後世人君能于禹貢五服之外開拓邊境其所得者不過磽确不毛之地得之無所益失之無所損者周公曰其克詰爾戎兵以陟禹之迹方行天下至於海表罔有不服所貢乎詰戎兵者不過陟禹之迹而已其或甘心于禹迹之外以開拓邊境増廣分域者是皆出於好大喜功而為之也故王者之彊理天下将欲制為京師諸夏夷狄之辨者當以禹貢之書為正按周制王畿地方千里而班固地理志言雒邑與宗周通封畿地東西長而南北短長相覆為千里顔師古釋之曰宗周鎬京也方八百里八八六十四為方百里者六十四雒邑成周也方六百里六六三十六為方百里三十六二都得百里者百方千里也余以周公營雒之制攷之王城為東都雒陽為下都皆畿内地也平王東遷即東都也豈侵諸侯之域哉由是觀之見班氏顔氏之言不誣也或曰邦畿千里謂方千里也今而曰短長為千里則開方之法非邪曰凡古之制畿封國皆以開方言者直圖籍記畫之體然耳要其度地部封大抵皆因地勢所宜而制其境不必皆正方也堯都平陽雖在南河之北而其畿所通當越河而南者多矣如其必以冀州千里正方為畿則林氏之所疑者當不可釋而先王彊理之政竟為不可通耶此學所擊非小正儒者所宜用心宜相與共推之不可畏其難而以為不必論也予請試言之鎬京與雒邑通封彊周畿之制也南亳與西亳通封彊商畿之制也豈二代創為此哉宅中而正從古然也故堯都平陽而甸侯綏三服四面各千有五百里非其畿内越河以洛為朝㑹之地則何由而得方三千里之中乎林氏之致疑于此好學莫加焉請試釋以予之説則是非之定否當必有决之者矣林氏曰先王彊理天下以綏服二百里為奮武衛之地謹華夏之辨此真萬代不易之法也林氏此論當矣而余觀其論舜典所謂蠻夷猾夏則曰此非境外之蠻夷舜之世九州之内蓋有蠻夷與吾民錯居境内冀揚州之島夷青州之萊夷徐州之淮夷梁州之和夷是也惟其與吾民雜居之境内而能肆為侵暴以為吾民之害于是使臯陶辨華夷内外之分以法繩治而特取其尤桀黠者而誅之耳夫先王謹華夷之辨見於綏服奮武衛之制截然不可侵紊如此顧何從而有境内之夷乎林氏之説自相矛盾如此蓋見春秋以來中國有戎故雜疑信之心而或為是説焉耳程氏之論大抵牽強支離與經不合則由其五服之制講之未明故也學者知林氏之失則知程氏之失吳氏曰據禹貢五服之制九州之内止方五千里嘗稽之王制古者百里當今百有二十一里今謂漢也是禹貢五千里之制即漢之六千里也况五服之制據方里而言合以東西四正為據當時堯都平陽正東至東萊之海方二千八百里正西至張掖之流沙方三千三百里是僅可以滿五服之制也兩漢九千里之制則以遼東之海與燉煌之流沙而言也而遼東在東北隅燉煌在西南隅非其正也夫正方一尺者衺之而度其兩隅則為尺有四寸而嬴則五服之制舉其隅而度之宜其九千里也漢制南北萬三千餘里者舉朔方日南而言也而禹貢所届正南止及衡山之陽而日南又在衡山之南八千餘里非禹迹所及也至平陽之北不盈千里已為戎狄之地是五服之制唯東西南三方為然北方僅滿二服而巳頴達鳥道之説甚巧傳失其據矣嗟乎古先哲王為天下後世之慮何其審也夫九州之地四正雖近四隅實遥非不知舉其隅計其道里之逺足為大矣五服之制乃舉其近而略其逺何哉蓋不欲以一時廣大之名啟後世無厭之禍所以詒孫謀以正也惜乎秦漢以還好大之君以廣斥土宇為功而紀録之臣又從而恢張之是豈堯禹之用心乎嗚呼戒哉王制言四海之内方三千里正與孟子所謂海内之地方千里者九同也較之禹貢止得為三服而要荒實為九州之外甚明也觀禹貢所叙九州之境自亦可見海岱惟得州東至海也𨗳弱水至流沙而止𨗳黒水逕三危而南三危流沙地嚮正為相比今而曰黒水西河惟雍州則是西至流沙無疑也荆及衡陽惟荆州南至衡山也冀州雖不言所至而治水極於恒衛恒山出恒山衛水又出其南耳則是北至恒山無疑也以此細攷則九州之内止三服而要荒實在九州之外所以别其為夷蠻也吴氏以九州之内方五千里誤矣漢以來道理殊絶非惟尺步不同而屈曲方直所量亦異又要荒之外有所増闢宜其不與禹貢孟子王制合也吴氏之説大抵支離未當余故一為决之九州辨林氏曰此篇既言九州九川分域又及夫五服彊理内外之辨末乃九州境界之所抵先後彼此互相𤼵明至纖至悉可謂無餘藴矣某嘗以斯言考其彊理天下之制而參以王制之所載則誠有可疑于其間王制曰自恒山至于南河千里而近冀州自南河至于江千里而近豫州自江至于衡山千里而遥荆州自東河至于西河千里而近亦冀州自東河至于東海千里而遥徐州自西河至于流沙千里而遥雍州西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之内斷長補短方三千里則是九州之地方三千里也五服之制王城之外每面五百里為甸服又其外五百里為侯服又其外五百里為綏服自甸服至綏服每面一千五百里四面相距為方三千里此九州之地也以天下之輿地分為五服則是自甸服至綏服九州之内也要荒二服則在九州之外此五服之制也然以九州四面之所距而考之則不能無疑焉自恒山至于南河千里東河至于西河千里此蓋畿内之千里即甸服也自東河至于東海千里自西河至于流沙千里此千里之地建五百里之侯服又建五百里之綏服而東海流沙之外則為要荒服今夫經之所載至于南北則有盈縮焉以北考之冀州之北距于恒山則已接于邊陲矣其何以容五百里之侯服又何以容五百里之綏服又何以容五百里之甸服耶以南攷之自南河至于江千里則已建侯服綏服矣自江至于衡山千里則要荒二服蓋已在九州之内而自衡山至于南海蓋又有千里之地五服之制至衡山則巳盡矣而揚州之境南距于海者猶未之盡也以南言之則大嬴以北言之則大縮此實某之所深攷而未知其説也夫禹之功萬世永賴與天地同垂於不朽其書之傳所以為法於萬世則其制度不容如是之差意其必有所乗除相補以為彊理天下之定制某淺陋未足以知此請闕之吕氏曰禹别四海為九州宜若有均一之制而較其道理廣狹全不相侔濟河兖海岱及淮徐相去不能千里荆河豫千里而嬴海岱青千有五百里而縮荆山衡陽荆二千里而遥東海西河冀三千里而近夀春之淮潮陽之海揚相去且六千里龍門之黄河燉煌之黒水雍相去以四千里以至華陽黒水梁窮數千里而未知所經是何廣狹之殊也或者九州之别品殊墳壤因土宜而别之也故其道里無得而均然而荆河淮濟之間徐兖豫三州之境也截長補短不能當淮海一州之半借使三州土壤既殊不可得而并揚州之大獨不可得而釐耶古今名儒訓釋禹貢多矣而未始及此蓋難言之也竊嘗計之九州之别蓋倣井田之法井田之法始於黄帝方里而井井九百畝中為公田八家皆私百畝同養公田而九州之制為王畿八州建國以國以蕃王室是同養公田之義也故其區别境壤不因土宇之小大不限山川之間阻唯據民田多寡而均之耳然而四海之内夷險不齊如荆河淮濟之間百舍坦夷萬頃一瞬而又當中原要區民力脩地利盡良疇既闢曠土實稀故三州徐兖豫境土最為狹也至淮漢以南揚州淮南荆州荆漢函劍以西雍州在函谷之西梁州在劍閣之西江湖泛濫關山重複而又僻在遐陬濶疎稼政年土益寡墾田是艱故四州境土最為闢也嘗考西漢之時去古未逺方其極盛九有民户總計千二百餘萬而徐兖豫三州當五百五十餘萬户青冀二州當三百五十萬户而荆揚豫梁四州僅當三百萬户夫民非榖不生榖非民不殖推其户口之多寡足以見田疇之廣狹據今驗古大略可知則九州之别惟民田是均斷可考矣吴氏謂九州之别民田是均此誠禹制然也但論揚州之境太逺不知其有要荒之限耳夫荆州之境南不盡衡山則㑹稽以南之境宜亦非揚州所有攷禹之巡狩可知也禹貢說斷卷四
