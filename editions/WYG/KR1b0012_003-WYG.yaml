body:
  text: 禹貢說斷卷三宋傅寅撰導岍今瓏州吳山縣吳嶽是及岐在今鳯翔岐山至于荆山在今耀州富平班氏曰呉山在扶風汧縣西古文以為汧山陸氏曰岍字又作汧一名吳嶽九域志曰吳嶽頂有五峯按後魏孝文於漢汧縣地置長蛇縣唐貞觀九年更名呉山今屬隴州北條荆州在馮翊懐徳縣南光武省懐徳不知并入何縣今按後漢志荆山在雲陽當是分其地入雲陽通典曰晉移北地郡之富平縣於今京兆富平縣西角懐徳城有荆山按隋志皆言荆山在京北富平夫西漢在懐徳東漢在雲陽自晉以來則在富平信土地分隸變遷不易稽考今富平雲陽俱隸耀州案此條引班氏地理志止及岍山荆山不及􅄮山者葢因已見治梁及岐條下也孔氏曰更理説所治山川首尾所在治山通水故以山名之三山皆在雍州唐孔氏曰上文毎州説治水登山従下而上州境隔絶未得徑通今更従上而下條説所治之山本以通水舉其山相連屬言此山之傍所有水害皆訖也因冀州在北故自北始従北導岍至敷淺原舊説以為三條地理志云禹貢北條荆山在馮翊懐徳縣南南條荆山在南郡臨沮縣東北是舊有三條之説也故馬融王肅皆為三條導岍北條西傾中條嶓冡南條鄭元以為四列導岍為陰列西傾為次陰列嶓冡案以上刻本所闕今従永樂大典本増入為次陽列岷山為正陽列鄭元創為此説孔言當為三條也岍與嶓冡言導西傾不言導者史文有詳略以可知故省文也王氏曰導山者導山之澗谷而納之川也蘇氏曰孔子叙禹貢曰禹别九州隨山濬川葢言此書一篇而致意也既畢九州之事矣則所謂隨山與濬川者復申言之隨山者隨其地脈而究其終始也何謂地脈曰地之有山猶人之有脈也有近而不相連者有逺而相屬者雖江河不能絶也自秦蒙恬始言地脈而班固馬融王肅治尚書皆有三條之説鄭元則以為四列古之達者巳知此矣北條之山首起岍岐而逾于河以至太嶽東盡碣石以入于海是河不能絶也南條之山自嶓冡岷山至于衡山過九江以至敷淺原是江不能絶也葢禹之言卓然見於經者非地脈而何自此以下至敷淺原皆隨山之事也葉氏曰導山者濬兩山之川屬之大川以同入于海者也言導岍而不言導西傾二山皆在雍以岍見之也言導嶓冡而不言導岷山二山皆在梁以嶓冡見之也九州之山獨記雍梁荆揚豫冀而不及青徐兗三州者葢三州皆在東河之東與四列不相通青徐之山惟岱而兖無山此三州之水惟河則或不必隨山以為治也林氏曰此一段文義本甚明白以先儒有三條四列之説必欲以衆山首尾相屬故其説多牽强而不通夫觀書者必視其書之所由作然後其義易曉禹貢之書本為治水而作其言所導之山葢主於決懐襄之水而為言也何取於山條列哉張氏曰山而謂之導者以向者洪水滔天首尾不辨今水患既除使山川復其本性隨山之勢窮極其首以遂其風土之宜此言導之意也豈特導水云乎哉禹之言曰予決九川距四海濬畎澮距川是先大而後小也至此則先言導山而後導川又先小而後大何也葢治水之法由下而上故其言先大而後小也此則總論水之形勢脈絡由上而下故其言先小而後大也或曰自導岍以至敷淺原皆以山為言不言水也予以為水獨何歟曰畎澮之水不勝其記故禹即山以表之亦猶詩人言信彼南山維禹甸之託山以表田也今圖岍岐等山及諸水以觀之則凡畎澮距川自可意見若夫條列之說地脈之說決懐襄之説遂風土之説皆無足取也逾于河孔氏曰此謂梁山龍門西河唐孔氏曰逾于河謂山逾之也張氏曰北條荆山首自岍岐東絶西河而北雖河不能隔斷也吕氏曰人逾非山逾非山逾亦非人逾禹所記之言然耳葢在河之西導此等山過河之東與北則導彼等山非導岐荆既畢而後始涉河以導壺口也冀州既載壺口治梁及岐是治水越河而西經文明甚學者將信經文乎將従臆說乎壺口雷首在今河中府河東縣至于太嶽孔氏曰三山在冀州太嶽上黨西班氏曰雷首山在河東蒲坂縣南晉志曰夷齊居其陽所謂山陽山按隋開皇十六年祈蒲坂置河東縣大業初併蒲坂入河東壺口在汾之北雷首在汾之南而太嶽又在壺口之東北也以形勢求之既背以地理計之又逺條列首尾之説其可従乎經凡言至者非治此而後至彼也亦所記之文然耳若曰治汾之北則壺口南則雷首又壺口之東北亦至太嶽也學者因余説而復經文始知余之不妄底柱在今陜州陜縣河水中屹立若柱然析城在今澤州陽城縣至于王屋在今孟州王屋縣孔氏曰此三山在冀州南河之北東行杜氏曰陜州陜石縣有底柱山大唐貞觀中太宗巡幸命魏徴勒銘見存本朝熙寧六年省陜石縣為鎮入陜班氏曰析城山在河東濩澤縣西南濩音烏虢切案唐志天寶元年更濩澤縣為陽城王屋山在河東垣縣東北案通典絳州垣縣漢舊縣也東北有王屋山又云洛州王屋縣有王屋山垣與王屋俱有其山則王屋當是漢垣縣地也垣今復隸絳州即垣曲是王屋隸孟州以地勢東北觀之當言底柱王屋而後析城今反記杞城於王屋之上何也析城在底柱之東北太行在王屋之東南自西南以及東北自西北以及東南亦所記之法然耳非可以山之首尾求也太行當連王屋為句孔氏以屬常山誤矣太行恒山至于碣石入于海太行在今懐州河内縣常山在今定州曲陽縣孔氏曰此二山連延東北接碣石而入滄海百川經此衆山禹皆治之不可勝名故以山言之唐孔氏曰太行去恒山太逺恒山去碣石又逺故𫝊云此二山連延東北接碣石而入滄海言山傍之水皆入海山不入海也又解治水言山之意百川經此衆山禹皆治之川多不可勝名故以山言之也謂漳潞酈氏云潞即濁漳汾洓桑氏云洓水出河東聞喜縣東山黍篩谷南過解縣東又西南注于張陽池聞喜今隸觧州解故城在河中桑泉唐天寳改桑泉為臨晉在壺口雷首太嶽經底柱析城濟出王屋淇近太行恒衛滹沲􅋤易近恒山碣石之等也班氏曰東太行山在河内山陽縣西北又曰太行山在埜王縣西北案山故城城在修武縣西北熙寧六年省修武為鎮入武陟隋志云河内漢曰埜王開皇十年改名河内武陟俱隸懐州當二縣俱有其山恒山在常山郡上曲陽縣西北此與冀州恒衛既従大陸既作之文相表裏也不惟此也導岍及岐至于荆山逾于河壺口雷首至于太嶽與既載壺口治梁及岐既修太原至于嶽陽一事體而互發明也底柱析城至于王屋太行與覃懐底績于衡漳漳亦一體而互發明也學者試深求之當自識經文之妙入于海言恒山碣石四傍之水皆以小附大東入于海也西傾在今洮州臨洮朱圉在今秦州伏羌城傍近鳥鼠在今熙州渭源堡傍近孔氏曰西傾朱圉在積石以東鳥鼠渭水所出在隴西之西三者雍州之南山班氏曰西傾山在隴西臨洮縣西南案唐志洮州臨潭縣有西傾山通典云山在臨潭西南吐谷渾之界朱圉山在天水冀縣南案隋志冀城縣注云後周曰冀城唐志云秦州伏羌縣本冀城武徳二年更名通典云伏羌秦漢冀縣又云上邽縣有朱圉山俗名曰白嚴山九域志云建隆二年置伏羌寨熙寧三年以寨為城又古跡云古上邽縣本邽戎邑知上邽經唐末五代廢之矣鳥鼠同穴山在隴西首陽縣西南通典云渭州渭源縣漢首陽縣也後魏改之唐志云渭源鳥鼠山一名青雀山五代職方考云唐末渭州臨吐番爟於涇州平涼置渭州而縣廢則今渭非古矣今熙州有渭源堡當是古渭源縣之地至于太華在今華州華陰縣孔氏曰相首尾而東唐孔氏曰鳥鼠東望太華太逺故𫝊云相首尾而東也班氏曰太華山在京兆華陰縣南熊耳在今商州上洛外方在今西京登封桐栢在今唐州桐栢至于陪尾在今安州安陸孔氏曰四山相連東南在豫州界洛經熊耳伊經外方淮出桐栢經陪尾凡此皆先舉所施功之山於上而後條列所治之水於下互相備班氏曰洛水出宏農上雒縣冡領山熊耳山在盧氏縣東伊水所出經云導洛自熊耳如固所紀洛水非出熊耳乎余謂冡領即熊耳一山連延同此一名後世又従而别為冡領之號耳通典曰虢州盧氏有熊耳山商州上洛有冢領山熊耳山今二縣俱隸二州正連境又通典記上洛之山既曰有冡領又曰有熊耳是一山連延古同一名無疑矣洛則出今之所謂冡領古文以潁川崈髙縣崈髙山為外方山顔氏曰崈髙崇字通典曰洛州登封縣漢崈髙也太唐永徽中置嵩陽縣武太后改為登封有中嶽嵩髙山桐栢山南陽平氏縣東南隋志云淮安郡桐栢縣梁置曰淮安也開皇初郡廢更名縣曰桐栢有桐栢山以隋志考之桐栢漢平氏縣地也今復隸淮安即唐州横尾山在江夏安陸縣東北古文以為陪尾山通典云安州安陸有古陪尾山西傾朱圉鳥鼠至于太華即雍州終南惇物至于鳥鼠之役也熊耳外方桐栢至于陪尾即豫州伊洛􅈆澗與夫導淮之役也圖而觀之凡畎澮之水或入于河渭或入于伊洛或入于淮皆可以形勢見也學者知此味其肯徒章句乎導嶓冡在今秦州界至于荆山在今襄州南漳縣孔氏曰漾水出嶓冡山梁州經荆山荆山在荆州唐孔氏曰荆州以荆山為名知荆山在荆州也班氏曰嶓冡山在隴西西縣案晉改西縣為始昌不知始昌後廢於何時通典秦州上邽縣注云有漢西縣城一名始昌在今縣西南有嶓冡山今上邽已廢九域志古跡云有古上邽縣當在天水縣界南條荆山在南郡臨沮縣東北通典云襄陽南漳縣漢臨沮也有荆山又云漢臨沮故城在江陵郡當陽縣北唐志亦曰南漳本臨沮隋志曰西魏初置重陽縣後周置沮州尋廢改重陽曰思思安開皇十八年曰南漳是臨沮自西魏方更置不一内方在今荆門軍長林縣至于大别在今漢陽軍界孔氏曰内方大别二山名在荆州漢所經班氏曰章山在江夏竟陵縣東北古文以為内方山後漢志引荆州記曰山髙三十丈周迴百餘里五代職方考曰復州竟陵晉改曰景陵通典曰江陵長林縣有章山今景陵隸安州長林隸荆門以地勢觀之今其山不復景陵有矣大别山在六安安豐縣西南安豐今隸夀州唐孔氏曰地理志無大别鄭元云大别在廬江安豐縣杜預解春秋云大别闕不知何處或曰大别在安豐縣西南鄭杜之説即據班氏所志而唐孔氏以為地理志無大别此檢閲不詳之失也左𫝊云呉既與楚夾漢然後楚乃濟漢而陳自小别至于大别然則二别近漢之名無緣得在安豐如預所言雖不知其處要與内方相接漢水所經必在荆州界也蘇氏曰二别山皆在漢上此梁荆導漢之役也内方在荆門則大別居漢上當是漢陽界山也故李氏詩說曰漢水東流漢陽軍觸大别山南入于江岷山在今茂州汶山縣之陽至于衡山在今潭州衡山縣孔氏曰岷山江所出在梁州衡山江所經在荆州班氏曰岷山在蜀郡湔氏道縣西徼外江水所出湔子田切考晉志巳無此縣當是漢末以來廢之矣唐志茂州汶山縣有岷山通典亦曰禹導江發跡于此衡山在長沙國湘南縣東南通典曰潭州衡山縣漢湘南縣也又曰衡州湘潭縣有衡山今湘潭亦隸潭州唐志云衡山縣有南嶽衡山祠過九江至于敷淺原在今江州徳安縣蒲塘驛前孔氏曰言衡山連延過九江接敷淺原言導従首起言陽従南敷淺原一名傅陽山在揚州豫章界班氏曰傅易山在豫章歴陵縣南古文以為敷淺原傅讀曰敷昜古陽字通典曰江州尋陽縣有蒲塘驛即漢歴陵縣也驛前有敷淺原原西數十里有傅陽山據通典傅陽山在敷淺原之西而班氏即以傅陽山為敷淺原者葢連延數十里止是一山古今殊號逺近異稱云耳歴陵晉屬鄱陽郡後不知廢於何時尋陽今為徳化徳安二縣之地當是五代時改析此梁荆揚導江之役也禹之導山惟言雍冀梁豫荆揚而不及青徐兖三州惟冀特言入海而揚止於敷淺原何也葢青徐兖揚四州與冀之碣石等處地皆濱海者也碣石入海既北於冀見之故南於此四州不言也文省而事該此最作經之妙後世史官及之乎導弱水來自雍州西北南外至于合黎在今化外甘州餘波入于流沙在今化外甘州孔氏曰合黎水名在流沙東弱水餘波西溢入流沙唐孔氏曰此下所導凡有九水大意亦自北為始以弱水最為西北水又西流故先言之黑水雖在河南水従雍梁西界南入南海與諸水不相參涉故又次之四瀆江河為大河在北故先言河也漢入于江故先漢後江其濟發源河北越河而南與淮俱為四瀆故次濟次淮其渭與洛俱入于河故後言之計流水多矣此舉大者言耳凡此九水立文不同弱水黑水沇水不出于山文單故以水配其餘六水文與山連既繋於山不須言水積石山非河上源記施功之處故云導河積石言發首積石起也漾江先山後水淮渭洛先水後山皆是史文詳略無義例也又淮渭洛言自某山者皆是發源於上欲使異於導河故加自耳鄭元云凡言導者發源於上未成流凡言自者亦發源於上未成流必其俱未成流何須别導與自河出崑崙發源甚逺豈至積石猶未成流而云導河也顔氏鄭氏皆以合黎為山名地理志張掖郡删丹陽縣桑欽以導弱水自此西至酒泉合黎張掖郡又有居延澤在縣東北古文以為流沙如志之言酒泉郡在張掖郡西居延屬張掖合黎在酒泉則流沙在合黎之東與此𫝊不合案經弱水西流水既至于合黎餘波入于流沙當如𫝊文合黎在流沙之東不得在其西也杜氏曰合黎水在甘州張掖縣界又曰沙州古流沙地其沙風吹流行在郡西八十里蘇氏曰合黎山名程氏曰弱水即條支媯水是也余觀程氏所論弱水最為究求之力然取禹貢導水之文而熟復之弱水黒水言導而不言所導之處葢其由來甚逺雖禹亦不能沿流以窮其源也弱水用功止自合黎而上合黎而下得其餘波入于流沙遂亦不復究其為何如也然流沙之地大扺居雍州之極西弱水流逕雍界而西入流沙不見其他折也故知弱水之西流而與他川逈異云耳禹在當時足跡之所親目力之所及猶不能用意於非所用意之外而學者生於數千載之下居數萬里之外而顧執諸家異同之言以遐想而意決之殆可謂窮無窮而極無極矣杜氏所言地著頗亦可信今且據之以見合黎流沙所在而弱水則來自雍州西北徼外不知其所従出實地也合黎當以為山名猶漾水至于大别之類葢皆指山言耳流沙當是澤名以其地之沙風吹流行如通典所載故澤因名流沙導黑水來自雍州西徼之外至于三危在今沙州入于南海孔氏曰黑水自北而南經三危遇梁州入南海唐孔氏曰地理志益州郡計在蜀郡西南三千餘里故滇王國也武帝元封二年始開為郡郡有滇池縣縣有黑水祠止言有其祠不知水之所在鄭云今中國無也𫝊之此言順經文耳案酈道元水經黑水出張掖雞山南流至燉煌過三危山南流入于南海然張掖燉煌並在河北所以黑水得越河入南海者河自積石以西皆伏流故黑水得越而南也杜氏曰道元注水經説鋭意尋討亦不能知黑水所經之處顧野王撰輿地志以為至僰道隸戎州入江其言與禹貢不同未為實錄至於孔鄭通儒莫知其所或年代久逺遂至湮涸無以詳焉三危山在沙州燉煌縣東南程氏曰黑水即葉榆澤是也黑水亦出外戎經雍州極境過三危越河南渡經梁州西界而入南海此經文可推者也説者必欲言黑水所自出惑矣夫禹不言而後世欲言之宜其説之不同而徒為是紛紛然也程公駁酈道元等諸説求漢志益州郡葉榆縣在今黎雅西南葉榆澤為黑水之正又以滇池縣在今黎雅西南滇池澤為黒水之下流葢以滇池澤傍有黑水祠為證故也又據酈道元等叙載葉榆入海之地在交趾汵縣今今化外襄陸等州為入南海之的信其有驗也而黑水西河惟雍州則雍州無黑水矣故又求唐史東女弱水為黑水之上源東女之地正東以及東南皆與今蜀茂雅二州接境則正在漢益州之北去雍州河廓界地望甚順東女弱水之來即雍州鄰境也遂以葉榆一水為界梁雍兩州以應經黑水西河惟雍州之文信其善辯也而東女弱水前此未有黑水之稱稱黑水自程公始其殆可深據乎又孔頴達云滇水有黑水祠而不見水程公乃疑更世既乆祠或移之他地遥設而望祀是葢亦臆度之説也又三危山無所證著以三苖遺種在宕昌即今化外宕州宕達浪反疑其當在東女弱水旁凡此皆余所未敢執以為實者也余恐學者慕名而輕信昧多聞闕疑之理故諄諄若此焉耳非好辯也導河積石在今化外鄯州龍支縣界至于龍門在今同州韓城界孔氏曰施功發于積石至于龍門或鑿山或穿地以通流唐孔氏曰釋水云河水千里一曲一直則河従積石北行又東乃南行至于龍門計應三千餘里釋水云崐崙虚色白李巡曰崑崙山名虛山下地也郭璞云發源髙處激湊故水色白潛地地中受渠衆多渾濁故水色黄漢書西域𫝊云河有兩源一出葱嶺河合東注蒲昌海蒲昌海一名鹽澤者去玉門陽闗三百餘里廣衺三四百里其水停居冬夏不增減皆以為潛行地下南出于積石為中國河郭璞云其去崑崙里數逺近未詳司馬氏曰禹本紀言河出崑崙崑崙其髙二千五百餘里日月所相避隠為光明也其上有醴泉瑶池今自張騫使大夏之後窮河源惡睹本紀所謂崐崙者乎故言九州之山川尚書近之矣班氏曰積石山在金城河闗縣西南羌中龍門山在馮翊夏陽縣北今同州韓城縣隋開皇十八年置即漢夏陽也杜氏曰水經云崑崙墟在西北去嵩髙五萬里地之中也其髙萬一千里河水出其東北陬屈従其東南流入于渤海又出海外南至積石山下有石門又南入葱嶺山又従葱嶺出而東北流其一源出于闐國南山北流與葱嶺所出河合又東注蒲昌海又東入塞過燉煌酒泉張掖郡南又東過隴西河闗縣北詳水經所作殊為詭誕全無憑據所云河出崑崙山者宜出於禹本紀山海經所云南入葱嶺及出于闐南山者出於漢書西域𫝊又云出海外南至積石山下有石門然後南流入葱嶺據此則積石山當在葱嶺之北又云入塞過燉煌酒泉張掖郡南並今郡地也夫山水地形固有定體自葱嶺于闐之東燉煌酒泉張掖之間華人往來非少去積石數千里未有桑田碧海之變陵遷谷移之談此處豈有河流纂集者不詳斯甚又按禹導河積石者堯時洪水下民昬墊禹所開決本救人患積石之西砂鹵之地河流既小地勢復髙不為人患不待疏鑿以此施功發跡自積石山而東則今西平郡龍支縣界山是也西平郡今化外鄯州也水經所謂葱嶺北積石佑所謂大積石是也自酈道元巳疑非非禹貢積石禹貢積石宜在蒲昌海下今考班杜所説一云在河闗一云在龍支龍支漢允吾縣地屬金城河闗亦屬金城班杜所言二縣雖不同積石當跨二縣界有之矣二縣在蒲昌海東正與酈道元之說相合固無禹理水之功自葱嶺之北其本紀灼然荒唐撰經者取為準的班氏西域𫝊所言宜惟憑張騫使大夏見兩道水従葱嶺于闐合流入蒲昌海所以騫𫝊遂云窮河源也案古圖書名河所出曰崑崙山宜所謂古圖書即禹本紀以于闐山出玉乃謂之崑崙即所出水便云是河也窮究諸説悉皆謬誤孟堅又以禹貢云導河自積石遂疑河潛流従此方出且漢時羣羌種雖衆多不相統一未為强國漢家或未嘗遣使詣西南羌中或未知自有河也寧有今吐蕃中河従西南數千里向東北流見與積石山下河相連聘使涉歴無不言之吐蕃自云崑崙山在國中西南則河之所出也又按書云織皮崑崙析支渠搜西戎即叙又范􅁮後漢書云西羌在漢金城郡之西南濱于賜支續漢書曰河闗西可千餘里有西羌謂之賜支葢析支也然則析支在積石之西是河之上流明矣崑崙在吐蕃中當亦非謬而不謂之河之本源乃引葱嶺于闐之河謂従蒲昌伏流數千里至積石方出斯又班生所未詳也同州韓城絳州龍門二縣有龍門山龍門縣今隸河中府即禹所鑿三秦記云魚鼈上之即為龍否則點額而還又慈州文城縣有孟門山與龍門相對慈州今廢其吉鄉縣以隸隰州文城省為鎮入吉鄉河至今隰州吉鄉孟門山是為入龍門至河中府龍門縣汾水合河之上為門龍門口然則吉鄉龍門二縣所謂龍門山者是在河之東者也韓城所謂龍門山者是在河之西者也兩岸俱有其山則西所謂龍門與東孟門相對之處是在韓城以北程氏曰導河自積石以下未至龍門以上經但一書積石不言方嚮知荒逺在所當略也按雍州崑崙之戎浮積石則謂河出崑崙山宜亦不妄杜言其山在吐蕃中亦不為無所據矣然禹不言河源惟記積石耳今吾苐論其所記不必求其所以不言也若夫自積石至于龍門計應三千餘里禹記河之所逕所以疎濶若此者以龍門而上積石而下地髙而水不為患禹功所不加故不言也程氏荒逺之説非南至于華陰孔氏曰河自龍門南流至華山北而東行程氏曰河自北狄入中國皆南行至此而極始折而東行東至于底柱孔氏曰河水分流包山而過山見水中若柱然程氏曰河至華陰則巳改為東流不待至底柱乃始折東今其曰東至底柱者自改東以後惟底柱可可記也河自南行至華陰自華陰東行至底柱則東字連華陰而言不必曰自改東以後惟底柱為可記也又東至于孟津南西京洛陽北孟州河陽孔氏曰孟津地名在洛北都道所湊古今以為津唐孔氏曰孟是地名津是渡處在孟地致津謂之孟津𫝊云地名謂孟為地名耳杜預云河内河陽縣南孟津也在洛陽城北都道所湊古今常以為津武王渡之近世以來呼為武濟杜氏曰河流自華陰至于底柱夾兩山之間其流皆湍悍至于孟津然後其勢稍暖故可以横舟而渡也東過洛汭在今西京鞏縣東孔氏曰洛汭入河河處唐孔氏曰洛入河處河内鞏縣東也鞏在西京東一百一十里程氏曰洛既北入河河之南洛之北其兩間為汭也汭之為言在洛水之内也渭水入河之間亦名為汭正其義也河自洛汭以上行地中它水反來注河故山水名稱迹道古今如一無所譌誤以其山川皆相附著故也自大伾以下不論水道難考雖山舊常憑河者亦復不可究辨此非山有移徙也河既遷變年世又逺人知新河之為河而不知舊山之不附新河惟輒並河求之安従而得舊山之真歟山静物也且因河徙而譌錯如此則降水大陸其方嚮益難究定矣此其並河凡屬所為無的之因也至于大伾今衛州黎陽縣黎山是孔氏曰山再成曰伾至于大伾而北行唐孔氏曰釋山云再成英一成岯李巡曰山再重曰英一重曰岯𫝊云再成曰伾與爾雅不同葢所見異也鄭元云大伾在修武武徳之界修武今懐州武陟縣修武鎮是其地熈寧六年省入武徳今懐州河内縣武徳鎮是其地熈寧六年省入張揖云成臯縣山也今孟州汜水縣漢謂之成臯縣漢書音義有臣瓚者以為修武武徳無此山也成臯縣山又不一成今黎陽縣山臨河豈不是大伾乎瓚言當然黎陽今隸衡州杜氏曰衛州黎陽縣有大岯山今名黎陽東山又名青檀山在縣南七里其張揖云成臯山是大伾山謬也程氏曰黎陽山在大河垂欲趨北之地禹故記之正與河將東流而先記華陰之在極按以下至唐孔氏至于大陸正義刻本所闕今従永樂大典本補入南者同也若成臯之山既非従東折北之地又無險礙如龍門底柱之須疏鑿也其地西去洛汭既巳絶逺東北距降水大陸又為絶逺禹獨何為而特於此數數致言耶臣故於瓚佑有取正以其理有當焉耳北過降水在今冀州武邑縣孔氏曰降水水名入河唐孔氏曰地理志云降水在信都縣按班固漢書以襄國為信都在大陸之南或降水發源在此下尾至今之信都故過降水降水乃至大陸若其不爾則降水不可知也鄭以降謂為降下反反聲轉為共河内共縣其水出焉東至魏郡黎陽縣入河此近降水也周時國於此地者惡言降水改謂之共此鄭胸臆不可従也杜氏曰貝州經城縣有枯絳渠按唐㑹要唐天祐三年八月割貝州經城隸魏州又按九域志北京即升唐魏州為之熈寧六年省經城為鎮入宗城則枯絳渠今在北京宗城縣界北入冀州南宫縣界又過信都衡水武邑三縣界南宫而下四縣今俱隸冀州程氏曰枯絳渠可證古降所麗與禹河方嚮正合但禹河既枯而絳瀆亦枯至武邑斷絶别無可考鄭康成以淇水之自衛州入河者為降水其援引證誤元已自覺之遂改引屯氏河為證酈道元既已仍襲其説尋又覺屯河之無降名也因又改易漢志屯河名稱以應古降既以明誤且有大失審究者經之叙河曰此過降水是原有降水而禹因河役過之其理甚明也今屯河因漢河決溢甫有迹道設使漢河真是禹河亦無有因此河決流而反記此河位置者而况漢河本非禹河而求禹河所逕於漢河支派則豈非重複之誤耶此其誤之所起不出乎臣之所陳者矣河既改流並河山川皆非其故而不知反諸未始改流以前此與中流失劍而刻舟以記者正同一誤也至于大陸當是瀛州以東之地孔氏曰大陸澤名唐孔氏曰漢地理志云大陸在鉅鹿縣北釋地十藪云晉有大陸孫炎等皆云今鉅鹿縣北廣河澤也郭璞云廣河猶大陸以地名言之近為是也春秋魏獻子畋于大陸焚焉還卒于寗杜氏春秋説云嫌鉅鹿絶按以上刻本有闕文今従永樂大典本補正逺以為汲郡修按刻本下衍郡修二字武縣呉澤也甯按甯字二本俱無今従正義補入即修武也然此二澤相去甚逺所以得為大陸者以爾雅廣平曰陸但廣而平者則名大陸故異所而同名焉然此二澤地形卑下得以廣平為陸者澤雖卑下旁帶平之之地故統名焉故大陸澤名廣河以旁近大陸故也程氏曰大陸之說雜出不一其始地理志謂在鉅鹿縣未聞其去古河絶逺且其地理次序逺在古絳上流不與經應古歴代言地理者皆疑非是為此之故益傍東北展轉求之故隋氏以趙之昭慶縣為大陸唐氏先天中創鹿城置陸澤縣皆意大陸之在其地而為此之名而杜李輩因而實之曰邢趙深此三州者皆大陸也亦孔穎達所謂廣平為陸故綿延千里而皆可稱謂者是也今逺古絶逺隋唐之名二縣以為大陸者或其有據不可得詳矣始雜疑信而兩𫝊之且以深之陸澤為大陸則古河之行乎貝冀者既可用枯絳以應北過降水之文其逕深而入滄者可以謂之至于大陸也雖不能寸寸銖銖較其首末比之漢河所經全無降水大陸二名可以傅㑹其通多矣余考地理次第降水在冀之東北入河而深在冀之正西指深之大陸為經之所指亦與過降之文未合夫既謂之大陸則不必専以為澤凡廣河澤以東其地平廣綿延千里皆謂之大陸也此所指當是瀛州以東之地而經之恒衛既従大陸既作則瀛以西至深趙相之間皆是又北播為九河同為逆河入于海逆河在今滄州之東北其地巳淪于海孔氏曰北分為九河以殺其溢同合為一大河名逆河而入于渤海皆禹所加功故叙之唐孔氏曰鄭元云下尾合名為逆河言相向迎受酈氏曰河之入海舊在碣石今川流非禹瀆也周定王五年河徙故瀆故班固曰商竭周移也又以漢武帝元光三年河又従東郡更注渤海是以漢司空掾王横言曰王者天嘗連雨東北風海水溢西南出浸案刻本下有闕文今従永樂大典本補正數百里張沂亦云碣石在海中葢淪於海水後世儒者知求九河於平地而不知求碣石有無以為之證王横之言信而有擬碣石入海非無理也程氏曰王横之言以當時所親見而破萬世傳聞之惑世之言禹貢者失稽焉臣於是用其説博求諸古知其精確可信也周定王五年河徙故瀆漢元光三年河水徙従頓邱東南流入渤海今其地屬澶川清豐縣熈寜六年省入也渤海舊在滄棣之濱因以為名則今滄濱之海東北則為漢河自樂陵縣入海樂陵今隸滄州在州南一百二十五里則是周漢以前河入海故道不在漢世所指渤海之地矣遷固親著周漢河徙見之紀志而其記禹貢導河語輒自忘之乃曰九河逆河入于渤海薛瓚従而證之曰禹貢河口入海乃在碣石元光河徙始注渤海禹時不注也然則欲知漢河禹河入海之實従碣石求之則可見矣九河歴世滋久借曰通塞移徙不可主執而碣石者通一山冡趾皆石無有移徙摧折之理也漢河既不並碣石入海而平地亦無碣石則九河逆河其與碣石俱淪于海王横之言其巳信按程氏說刻本多闕誤今従永樂大典本校正禹於導山以碣石入海為記所以著其為海畔山也於冀州貢道以夾右碣石入河為記所以見河口入海正附碣石旁也一時之紀述萬世得藉以知河道之的其諸以為聖人紀事之法歟嶓冡導漾發源氏道飬山東經嶓冡山葉氏曰漢源出嶓冡源出岷故言嶓冡導漾岷山導江淮出胎簪山至桐栢而大渭出南谷山至鳥鼠而大洛出冡嶺山至熊耳而大因其流之大可以為人害者治之而非其源故言導淮自桐栢導渭自鳥鼠同穴導洛自熊耳漾江之来甚逺地且髙而源微未能為害禹正不必極其源也故止于岷嶓導之淮渭洛之源近而為雍豫等州害者非特下流而巳故禹治之必極其源葉氏之説反之矣不然則禹究心於甚逺而畧於近顧與導弱導黑導河異其功用何邪東流為流至今階州將利縣界東流班氏曰養水至武都為漢按通典武州治將利縣漢武帝置武都郡又按唐志景福元年更名階州則今階州將利葢武都縣地也通典云漢中郡金牛縣有嶓冡山禹導漾至此為漢此亦後世因漢上流所經之山名曰嶓冡亦轉有此名耳非秦州嶓冡也漾水既束即曰漢水非必至今牛而後漢水也此祖安國至漢中東行為漢之說耳唐至興元俯西縣注云武徳三年析利州之緜谷置金牛寶厯元年省金牛入西縣今西縣復隸興元府西一百里又東為滄浪之水在今均州武當縣孔氏曰别流在荆州唐孔氏曰傳言别流似分為異水按經首尾相連不是分别當以名稱别流也劉氏曰南都賦注云漢水至荆山東别流為滄浪之水酈氏曰武當今隸均州縣西北四十里漢水中有洲名滄浪洲庾仲雍漢記謂之千齡洲非也是俗語訛音與字變矣地説曰水出荆山東南為滄浪之水是近楚都故漁父歌曰滄浪之水清可以濯我纓滄浪之水濁可以濯我足余按禹貢言導漾水東流為漢又東為滄浪之水不言過而言為者明非他水決入也葢漢沔水自有滄浪通稱耳纒絡鄢鄀地連紀郢咸楚都矣漁父歌之不違水地考按州𫝊宜以尚書為正耳林氏曰張平子南都賦云流滄浪而為隍廓方城而為墉李善注引左氏𫝊屈完所謂楚國方城以為城漢水以為池則是滄浪即漢水也葢漢水至于楚地則其名為滄浪之水也過三澨在郢州長夀縣界孔氏曰三澨水名入漢桑氏曰荆州沲水在南郡枝江縣三澨池之南在邔縣之北邔音其已反此縣晉猶存後不知廢于何時其地在枝江南枝江今為江陵府松滋縣之鎮松滋在府西南八十里酈氏曰尚書曰導漢水過三澨地說曰沔水東行過三澨合流觸大别山阪故馬融鄭元王肅孔安國咸以為三澨水名也許慎言澨者埤増水邊土人所止也按春秋左傳曰文公十有六年楚軍次于勾澨以伐諸庸宣公四年楚令尹子越師于漳澨定公四年左司馬戍敗呉師于雍澨昭公二十三年司馬薳越縊于蓬澨服䖍或謂之邑又謂之地京相嶓曰杜預亦云水濟及邊地也今南陽今隸澄州淯陽南陽有漢淯陽縣故城在淯水之陽二縣之間淯水之濱有南澨北澨矣而諸家之論水陸相半又無山源出處之所津途闗路唯鄭元及劉澄之言在竟陵縣界漢竟陵故城在郢州長夀縣南五代晉改竟陵為景陵今隸安州經云邔縣北池然池流多矣而論者疑焉亦不能辨其所在顔氏曰三澨水在江夏景陵林氏曰三澨水名也水經則以為在江陵邔縣之北顔師古則以為在江夏景陵未知孰是枝江之地非漢所經三澨不當在其境鄭氏等謂竟陵是矣至于大别南入于江江漢合於鄂州之西孔氏曰觸山迴南入江林氏曰漢水既東流為滄浪之水矣於是過三澨水所入之處又於是觸大别山以與江合也東滙澤為彭蠡東為北江入于海孔氏曰滙迴也水東迴為彭蠡大澤程氏曰江漢蠡相㑹處為彭蠡澤三江相㑹而南不能以敵中北西來之勢故中北遏南而南相與迴旋而為一大澤者其來久矣今禹本其所由有澤之因故歸之于漾而為之言曰東匯澤為彭蠡而于江亦曰㑹于匯耳其實彭蠡一澤三江之水為之也說者未有發明此意余故輒及之岷山導江發源羊膞嶺下東逕岷山酈氏曰岷山即瀆山而水曰瀆水也又謂之汶阜山在徼外江水所導也益州記曰大江泉源即今所聞始發􅈩􅈩嶺下緣崖散漫小大百數猶未足濫觴東南下百餘里至白馬嶺而歴天彭闗亦謂之為天谷也秦昭王以李冰為蜀守冰見氐道縣有天彭山兩山相對其形如闕謂之天彭門亦曰天彭闕江水自此以上至微弱所謂發源濫觴者也岷山在氐道而天彭闕亦在氐道而天彭以上江水至微則禹於岷山導江其山當天彭闕之東也東别為沱孔氏曰江東南流沱東行唐孔氏曰以上云浮于江沱潛漢其次自南而北江在沱南知江東南流而沱東行又東至于灃當在溪灃之境孔氏曰灃水名唐孔氏曰鄭元以此經自導弱水以下言過言㑹者皆是水名言至于者或山或澤皆非水名故以合黎為山名澧為陵名鄭元云今長沙郡有澧陵縣其以陵名為縣乎孔以合黎與澧皆為水名弱水餘波入于流沙則本源入合黎矣合黎得容弱水知是水名楚辭曰濯余佩兮澧浦是澧亦為水名酈氏刻本作顔氏曰澧水出武陵充縣西至長沙下巂縣西北入江顔氏刻本作酈氏曰澧水在荆州江水别而為沱其經流則東至于灃也漢孔氏云澧水名酈水云澧水出武陵充縣西至長沙下巂縣西北入為江楚辭曰濯余佩兮澧浦顔師古謂澧在荆州蘇氏亦謂澧水在荆州歴觀諸儒所説則以澧為水名非無所據也然鄭氏謂此經自導弱水以下言過言㑹者皆是水名今長沙郡有澧陵縣其以陵名為縣乎鄭氏此言似亦有理故曾氏曰澧鄭氏以為澧陵在今水不至澧陵故先儒疑焉皆以為澧水夫春秋至豫章在江北漢淮之間漢之潯陽江夏在江北後世皆在江南烏知禹之時澧陵非江水所至之地乎以曾氏此説觀之則知鄭氏以為陵名有合於經文然經文曰導弱水至于合黎餘波入于流沙則是合黎必有受水之處而鄭氏以其曰至于遂以合黎為山名苟以合黎為山名則安能受弱水所入之勢而溢其餘波于流沙乎此又不能無疑也余按下文九江澧水既與其一則其非水明矣過九江至于東陵東迤北㑹于滙東為中江入于海孔氏曰江分為九道在荆州東陵地名唐孔氏曰九江之水禹前先有其處禹今導江過歴九江之處非是别有九江之水陳氏曰九江即荆州九江孔殷是也東陵在荆州所以得名九江者以大江之水自禹之前已有此九道洪水作害水失故道今禹自岷山導江復過前所謂九江者以至東陵此皆江之故道非别有九江之水江水既過九江又至于東陵也東陵古荆州地今隸鄂州九域志云太平興國二年析鄂州永興縣置永興軍三年改興國治永興縣蘇氏曰迤迤邐也林氏曰迤者斜出之辭也江漢一水皆是西來至其合處則其勢迤靡而相屬故漢水自發源嶓冡皆東流至其將與江合也則稍折而南葢江水是發源岷山皆東流至其將與漢合也則稍折而北葢江在漢南漢在江北漢稍南江稍北則其勢相屬故㑹于彭蠡而復東也滙者彭蠡之澤也不言㑹于彭蠡者葢蒙上東滙澤為彭蠡之文且見其與漢水共注北澤也漢孔氏以東迤為一句而以北字屬于下謂北㑹于滙故其說以謂迤溢也東溢分流都共北㑹為彭蠡鄭氏又以東迤者為南江夫既以迤為溢而又以東溢為分流展轉相訓乃成義其文勢不相屬非經意也據經文言北江中江是自彭蠡而東方分為二江鄭氏以東迤為南江則是自東陵而下􅥙分為三矣此説猶不與經合漢江二水既合於彭蠡矣然後由彭蠡分出為中江入于海此言東為中江入于海而上文言導漢東為北江入于海有北江中江則是必有南江矣即揚州所謂三江既入是也江至東陵始與漢合而經於東陵之下記其東行斜迤而北者著其與漢既合之形勢也繼曰㑹于滙者著其同為彭蠡澤也經之文明潔如此何得不信猶惑於孔鄭之鑿説乎導沇水出今孟州王屋縣王屋山東流為濟在今孟州濟源縣入于河在今孟州溫縣孔氏曰泉源為沇流去為濟在溫西北平地唐孔氏曰地理志云濟水出河東垣縣王屋山東南至河内武徳縣入河𫝊言在溫西北平地者濟水近在河内孔必驗而知之見今濟所出在溫之西北一十餘里溫是古之舊縣故計溫言之杜氏曰絳州垣縣漢舊縣也東北有王屋山沇水所出又曰洛州王屋縣有王屋山沇水所出又曰沇水是王屋山頂崖下澄渟不流至濟源縣西二里平地潛源重發名濟水東流經溫縣入河按隋志王屋縣舊曰長平後周改曰王屋當是漢垣縣地不知何時析置長平耳今王屋隸孟州在州西北一百三十餘里曾氏曰止者為漾流者為漢止者為沇流者為濟自其水之所自出而言之則曰漾曰沇故其導之也則必指其水之所自出而言之故係之以其川瀆之通稱以此二水流自漾沇而出及其既流而出則曰漢曰濟以至於入江入河入海皆受漢濟之名而漾與沇但可以名其始出之水而巳張氏曰沇濟一也發源為沇既流為濟且漾水東流為漢江水東别為沱漾水流為漢漾水既為漢則漢水之名熄矣故為漢之後不復名為漾沇水流為濟沇水既為濟則沇之名熄矣故為濟之後不復名為沇至江水東别為沱乃其支流耳江水之名自若也按地志曰濟水出河東垣縣王屋山東南今絳州垣曲縣山也始發源王屋山頂峯下曰沇水既見而伏東出於今孟州濟源縣一源東源周回七百步其深不測西源周回六百八十三步其深一丈合流溫縣縣是為濟水歴虢公臺西南入于河溢為滎孔氏曰濟水入河並流十數里而南截河又並流數里溢為滎澤在敖倉東南唐孔氏曰濟水既入于河與河相亂而知截河過者以河濁濟清南出還清故可得而知也班氏曰軼出滎陽北地中杜氏曰溢為滎在鄭中滎澤縣按隋志開皇四年置廣武縣仁夀元年改名滎澤當是析古滎陽地置之今按九域志滎陽在鄭州西六十里滎澤在鄭州西北四十五里如孟說敖倉又在滎陽之西北則是滎澤在敖倉東南許氏曰濟入河伏流南出蘇氏曰濟水既入河而溢為滎禹不以味别安知滎之為濟乎鄭氏曰導漢水至于大别南入于江經文止于此而巳東滙澤為彭蠡東為北江入于海皆脫文也導沇水東流為濟入于河經文亦止于此而巳河南有水亦名為濟河北之濟與河南之濟相亂故知溢為滎以上當有導某水一二句後世傳者失之林氏曰滎陽以東本無濟道禹既導濟以入河河濟相合其流寖大使皆決于河之故道則必有汎濫之患禹于是自河決之以為滎澤而東出于陶邱北以入于海是亦所以分殺其勢而濟之溢為滎也河洛雜矣非復濟水也惟此書為治水而作故載者如此程氏曰降水逆行其初葢有不盡入河散漫自恣者今也積石以東收汎水而入之河既巳多矣其在豫也伊洛􅈆澗悉以水㑹河既盈而濟繼之故溢而注滎也東出于陶丘北在今曹州定陶縣界孔氏曰陶邱邱再成班氏曰禹貢陶邱在濟陰郡定陶西南陶邱亭郭氏曰今濟陰定陶城中有陶邱杜氏曰漢濟陰郡城今曹州濟陰縣是也亦漢定陶縣也故定陶城在東北按九域志太平興國三年以濟陰縣定陶鎮置廣濟軍熈寜四年廢軍以定陶縣隸州在州東北三十七里程氏曰濟入于河而對溢為滎以東出于陶邱之北者一時適然之事也以其異故變文而記之曰溢曰出者禹貢書例之所無也又東至于菏在曹州定陶界孔氏曰菏澤之水班氏曰菏澤在定陶東杜氏曰菏澤在今曹州濟陰縣城東北九十里今濟陰東北之地既柝為定陶縣則菏澤在定陶界也程氏曰樂史寰宇書云濟陰有山是為菏山菏水西自考城來屬考城今隸東京而考城者於汴京為東於濟陰為西而濟之正源未嘗一逕考城亦可以見菏水之自為一派而濟來㑹之甚明也水經以此水為五丈溝而五丈溝者即近世命為五丈河而開寳中改命以為廣濟河者其是也太平興國中割定陶一鎮為軍而名廣濟則又因水以為之名此正菏水首末也又東北㑹于汶又北東入于海孔氏曰北折而東班氏曰沇水東至琅槐入海酈氏曰山海經曰濟水絶鉅野注渤海入齊琅槐東北者也地理風俗記曰博昌東北八十里有琅槐鄉故縣也按琅槐屬千桑郡後漢郡國志巳無此縣是光武所并省博昌唐隸青州導沇辯弱黒二水來自雍州塞外至逺而不可窮故禹言導而不言其所自起至於沇水源出中國且去帝都不逺而禹之所書顧與弱水同例何也酈杜二子皆有沇水潛行之説意者禹疑其水之異而略于記歟曰非也甚逺者不能書甚近者不必書而沇源在在帝都之南所以不書也聖經書法之妙大抵如此滎澤辯濟既入河與河相亂而其溢為滎也禹安知其為濟哉孔穎達謂以其色辨東坡謂以其味别而許敬宗則以為入河伏流而出鄭漁仲則以為簡編脱誤林少穎則以為禹分殺水勢而程泰之則又以為水㑹于河既多河盈而濟繼之故溢而注滎也紛紛之論將孰従而折𠂻乎余嘗思之程氏之見比諸公為勝夫河自積石而來所受水為不一而至於歴華陰而東行則又有伊洛等水㑹之河之盈可知矣然河自孟津以來其地稍平其勢稍緩而加以水之滿盈則其流寛徐益與底柱而上不同矣沇水自北而南勢鋭而流捷衡河横度固當時所有之事也今時水潦驟集山流横突溪澗其勢狀尚可辨視况於濟之衡河南出滎口浩博禹何待於區區色辨味别而後知邪然其入河而出不能無河水之混而大槩則濟耳若其天時有變河流蕩激之際滎口欲其純受濟水不能也此可以理而推不必過為之惑林氏謂分殺水勢者謂沇入河而河溢故禹決滎瀆以殺之而滎實非濟也然禹記兖州疆境指濟為東南所據禹豈應亂名實如是乎許氏伏流之說謂其源之或潛而意之耳鄭氏簡編脱誤之説求其說不得而姑為之說耳凡此皆學者所當明辨毋容其汨亂經文亦庶乎為羽翼六經之一端也杜氏曰濟水因王莽末旱渠涸不復截河南過今東平鄆州濟南齊州淄川淄州北海青州界中有水流入于海謂之青河實菏澤汶水合流亦曰濟河葢因舊名非本濟水也莽末濟涸見後漢郡國志程氏曰春秋閔二年衛侯及狄人戰于滎澤鄭氏曰今塞為平地滎陽民猶謂其地為滎澤酈道元所言亦與鄭合然則滎澤在春秋時既可以戰則巳不復受河而鄭氏之於東漢酈道元之於後魏所見皆同則可以知滎本無源因溢以為源河口有徙移則滎之受河者隨亦枯竭然杜佑以莽末濟不截河而南於是凡濟水下流悉棄不錄且謂漢以前郡國之以濟名者濟南濟北濟陽濟陰皆命名者失於詳考按刻本句有脱誤今従永樂大典本校正其説直謂滎澤既塞則不復有濟矣此其說不審之甚者也以理推之滎既塞矣自滎至海地亘千里水行其間自成川脈葢數州之水循溢滎下流故道而行者自若也豈獨菏汶哉禹貢說斷卷三
