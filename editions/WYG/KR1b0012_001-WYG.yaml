body:
  text: 禹貢說斷卷一宋傅寅撰禹貢夏書孔氏曰此堯時事而在夏書之首禹之王以是功唐孔氏曰此篇史述時事非是應對言語當是水土既治史即録此篇其初必在虞書之内葢夏史抽入夏書或仲尼始退其第事未可知也林氏曰􅆁鄘衛之詩􅆁地所採者則謂之􅆁國風鄘地所採者則謂之鄘國風衛地所採者則謂之衛國風其間非有異也禹貢之篇夏史所録故不得謂之虞書而謂之夏書耳孔氏乃謂此堯時之事而在夏書之首禹之王以是功此過論也沈氏曰禹貢之篇虞書也作於有虞之世述於有夏之時故後世係之夏書以明禹之所作也張氏曰此一篇以為史官所記邪而其間治水曲折固非史官所能知也竊意禹敷土隨山刋木奠髙山大川此史辭也若夫自冀州至訖於四海皆禹具述治水本末與夫山川之主名草木之生遂田賦之髙下土色之黑白山之首尾川之分派其所以弼成五服聲教訖於四海者盡載以奏於上藏史官史官畧加刪潤叙結成書取以備一代之制作謂之夏書然其間祗台徳先不距朕行此豈史辭哉此禹之自言也堯典堯之書也而為虞書之首禹貢舜之時所作也而為夏書之首孔子之定書如此何也舜之有天下葢傳於堯而禹有地平天成之功是其所以受舜之禪宜也至於湯革夏則其書首湯誓武王翦商則其書首泰誓聖人之意葢可知矣孔氏之言曰此堯時事而在夏書之首禹之王以是功此正殆於有見而林氏執􅆁鄘衛之說以非之未可為通論禹别九州隨山濬川任土作貢孔氏曰分其圻界刋其木深其流任其土地所有定其貢賦之差唐孔氏曰禹别九州之界隨其所至之山刋除其木又曰計九州之境當應舊定而云禹别者以堯遭洪水萬事改新此為作貢生文故言禹别耳又曰賦者自上稅下之名謂治田出穀故經定其差等謂之厥賦貢者自下獻上之稱謂以所出之穀市其土地所生異物獻其所有謂之厥貢雖以所賦之物為貢用賦物不盡有也亦有全不用賦物直隨地所有採取以為貢者此之所貢即與周禮太宰九貢不殊但周禮分之為九耳其賦與周禮九賦全異彼賦謂口率出錢不言作賦而云作貢者取下供上之義也諸序皆言作某篇此序不言作禹貢者以發首言禹句末言貢篇名足以顯矣百篇之序此𩔖有三微子作誥父師少師不言作微子仲虺作誥不言作仲虺之誥與此篇皆為理足而畧之也班氏曰昔在黄帝作舟車以濟不通旁行天下方制萬里畫埜分州陸氏曰周公職録云黄帝受命風后受圖割地布九州鄹子云中國為赤縣赤縣之内為九州春秋說題辭云州之言殊也林氏曰顓頊置九州堯時洪水斷絶使禹理水還為九州王氏曰王制云廣谷大川異制民生其間者異俗故禹别九州皆奠髙山大川以正封域蘇氏曰不貢所無及所難得葉氏曰記云共工氏之覇九州也其子曰后土能平九州故祀以為社則九州之名舊矣洪水之害山川土壤封域經界貢賦之制蕩析湮墊皆失其正至禹而復辯故言别水行地上四方不通必隨山刋木以為道然後能度其形𫝑觀其源委而川可濬川濬而九土見矣辯其名物以制地征作民職而貢賦出焉貢賦雖異而以奉上為主故謂之貢祭法注云共工氏在太昊炎帝之間張氏曰洪水滔天九州莫辨禹欲治水先定九州之界然後随九州之山濬九州之川使水復歸故道而入於海陳氏曰九州之為州乆矣然州之義學者不論也在堯之時洪水之害浩浩蕩蕩封疆之界不可得而别也禹從其巨鎮之在水中者而别之曰此冀也此兖也此青徐也此荆揚也此豫梁雍也是巨鎮之宛然出於水之中故曰九州也州與洲同随山濬川者隨水源之所自出者濬之以為川不汨其潤下之性故也洪水之害如此其乆使彌年亘月無有止息則民生無噍𩔖矣以理推之當亦每嵗之中泛濫有時如今之春夏暴長而特為尤甚焉耳禹之治之也當其懐山襄陵之際亦無所措其力憂民之切雖曰由巳溺之亦必俟其𫝑之既殺方嚮有可辯而土功有所施於是乎寖寖規畫以豫為後來之防而巳若其别九州如陳氏謂從其巨鎮之在水中者别之余恐無是理也學不通世務腐儒耳故余不得不為之辯林氏曰賦者九州之田賦是也貢者兖州而下厥貢篚之𩔖是也别而言之雖有貢有賦有上下之差合而言之則貢者乃賦稅之總稱不必漆絲鹽絺之𩔖然後謂之貢葢併與田賦之所出包篚之所入皆在其中矣此貢之一字與商之助周之徹皆是其一代之制取民之總名也古人之命名不茍也三代取民之制必以貢助徹為名其用心之仁可知矣是故史官之名此書孔子之作此序皆於貢之一字深致其意㓜學能於此乎察壯行猶於此乎背况未嘗知此者乎吕氏曰随山有兩意一謂随山開道以觀水𫝑一謂随山之脈絡相視其水𫝑濬其川程氏曰禹之自言曰予決九川距四海濬畎澮距川者因也孔子叙其書曰随山濬川任土作貢者亦因也孟子曰禹之行水也行其所無事亦因也因者本其所自然而無所增損云耳功以因而成則書載其功亦豈外於因哉九州之分尚矣顧其髙山大川託以為彊界所視者不容無所記載禹為司空習此亦素而特其洪水為害封域淪壊川流故瀆亦決徙不明故禹先定其髙山大川之方嚮以别九州之分限則凡地之逺近髙下水之源委曲折皆可得而審矣随山濬川任土作貢於是次第施之何往而不如其意乎任土作貢夫人能言之而隨山濬川說者罕見其的余請詳辯之禹之自言曰予乗四載隨山刋木史之辭亦曰禹敷土隨山刋木説者意孔子序文當不與之異故多以刋木通道為解殊不知孔子之文隨山濬川與任土作貢對立隨山而濬川任土而作貢程氏所謂因其所自然之謂也且四瀆之水皆東行以入海而弱水則西黑水則南者其所出所逕之山𫝑則然也山之𫝑所向背水因而趨避之者也禹不能逆山以行水亦猶不能强所無以作貢應變施設雖曰多端而經畫妙用同乎順理孔子序書凡三句十二字而深於經意者知其該貫首末無復餘藴此豈泥於文辭之間者所能窺哉禹敷土隨山刋木奠髙山大川孔氏曰洪水泛溢禹分布治九州之土隨行山林斬木通道奠定也髙山五嶽大川四瀆定其差秩祀禮之規唐孔氏曰禹身行九州規謀設法乃使佐巳之人分布治之於是平地盡為流源鮮有陸行之路故將欲治水隨行山林斬木通道往者山為水所包川皆泛濫祭祀禮廢今始定之以見水土平復舊制也司馬氏曰禹與益后稷奉帝命命諸侯百姓興人徒以傅土唐司馬氏曰尚書作敷土今按大戴禮作傅土故夏本紀依之傅即付也謂付功屬役之事顔氏曰敷分也謂分别治之奠定也言禹随行山之形狀而刋斫其木以為表記決水通道故髙山大川各得安定也蘇氏曰敷道􅁱載叙義皆治也山行多迷刋木以表之且以通道史記云行山表木葉氏曰辯九州之封域而分布之使官各有守以任其事民各有宅以任其力而後隨山刋木之功可施隨山刋木以通道於四方而後髙山大谷之名可正山川有主名而後或自山𨗳或自川𨗳而水可得治矣髙山大川如荆岐江漢是也治水者不逆其性而行其所無事則惟形𫝑之順而巳形𫝑以山川為主山川以其髙且大者為主髙山大川各定其所而名正則其餘可以𩔖求奠定也猶周官言奠地守也張氏曰敷分也敷土即别九州之義以謂分辯九州之地然後隨山之形𫝑以導水之歸路且又刋木之蔽障以表山路之逺近則又定髙山如五岳者大川如四瀆者東西既辯南北巳明然後導山導川可得而施功也此葢禹初措手治水之規模也林氏曰鯀湮洪水以與水争𫝑於隄防之間適以激其怒耳故禹惟務敷土而散之不與水争𫝑而水得性矣此所以有成功也隨山刋木者除障蔽而驅禽獸使避水者各安其居也奠髙山大川者本其風俗之異以為九州經界之凖也程氏曰禹之經畫必以奠髙山大川為始葢髙山既奠則避礙有方大川不迷則濬距有向吕氏曰史官作禹貢先言禹敷土三字見禹有一定之規模在胸中分布九州之土甚處用此治甚處用彼治工役計用多少然後用工所以終能成功定髙山有箇標凖次便看得箇大川所歸喻如築城若尋常築動是數年不能得成至李光弼築萬里城不過數月之功葢先擺布甚處成隊聲𫝑相接故能速成禹之治水其規模在此而巳刋木以通道定髙山大川以為髙表凡一州之内必有髙山大川先定其所知以為表則其他皆可知治水非土木為用不可也土則隨處以分布木則隨山以刋伐見禹之規模簡易無生事擾民之患也如治華隂之河則先於華隂左右分布可取之土於華隂之山刋用便近之木此敷土隨山之義若夫奠髙山大川則是定其方嚮源委以辨地域以知逺近以察衆流之所趨㑹而馴以加功故也此與孔子所謂别九州同冀州釋地曰兩河間曰冀州郭氏註曰自東河至西河李氏曰兩河間其氣清厥性相近故曰冀冀近也林氏曰其地險易帝王所都亂則冀安弱則冀强荒則冀豐故曰冀州唐孔氏曰九州之次以治為先後以水性下流當從下而泄故治水皆從下爲始冀州帝都於九州近北故首從冀起而東南次兖而東南次青而南次徐而南次揚從揚而西次荆從荆而北次豫從豫而西次梁從梁而北次雍雍地最髙故在後也自兖以下皆凖地之形𫝑從下向髙從東向西青徐揚三州並為東偏雍州髙於豫州豫州髙於青徐雍豫之水從青徐而入海也梁髙於荆荆髙於揚梁荆之水從揚而入海也兖州在冀州東南冀兖之水各自東北入海也冀州之水不經兖州以冀是帝都河為大患故先從冀起而次治兖若使冀州之水東入兖州水無去處治之無益雖是帝都不得先也蘇氏曰堯水河為患最甚江次之淮次之河行冀兖為多而青徐為下流被害尤甚堯都於冀故禹行自冀始次於兖次於青次於徐四州治而河患衰矣雍豫雖近河以下流既治可以少緩也故次於揚次於荆以治江淮江淮治而水患平故次於豫次於梁次於雍以治江河上流之餘患而雍最髙故終焉八州皆言自某及某為某州而冀獨否葢以餘州所至知之先賦後田不言貢篚皆與餘州異林氏曰禹之治水其始也必决其懐襄之水然後及導其川澤之流而其所為先後之序具載於九州之後導岍及岐以下是也此之所載但記夫九州之經界與其田賦貢篚之詳若夫治水之先後不在於此也夫洪水之為害泛濫於天下其治之也必相視其水之大𫝑順其地之髙下漸而導之不可拘於經界之限也故自導岍及岐以至於又東北入於河其首尾本末各有條理葢治水之𫝑末嘗不自上而導下自下而決之於海也史官條列備言於經界之後論九州者但當觀其分疆定界與夫制田賦之多寡不必論其先後之序王制曰自東河至於西河千里而近自常山至於南河千里而近此則冀州之境界也張氏曰冀州不言山川所界如濟河惟兖淮海惟揚者葢王者以天下為家京師為室其山川則當以天下為界安可如餘州之局以山川哉此又禹之微意也孔蘇二家執九州之次以為禹之治水自下而上林氏執導岍以下之文則以為自上而下二者將孰從而折衷之孟子曰禹疏九河瀹濟漯而注諸海决汝漢排淮泗而注之江然後中國可得而食也孟子之言自北而南自下而上且不及雍梁而遽言中國可得而食則禹之規摹亦可見矣若夫導岍至敷淺原此乃記濬畎澮距川之方嚮導黑水至東北入於河此乃記九川之首尾林氏未明經意遽執此文謂治水必自上而下其於世務不通甚矣且使禹之行河必欲積石之功既畢然後鑿龍門以治華隂孟津諸處則於三數月之間其或雨潦驟集冀豫兖青之民又何所賴於禹乎故夫治水者必使其下能容而有餘易泄而無礙然後可以安受上流而不至於衝激以生怒禹之經畫所以首冀兖而後雍梁者此也茍能明此則非惟逹禹貢九州之次且於孟子之談禹知其有自來矣孔蘇之論又安可忽哉或曰禹疏九河而後瀹濟漯信孟氏之言有倫也决汝漢排淮泗亦豈必自下而上乎曰此其文為注江而設也其實禹之治水瀹濟漯之後遂治淮泗以及於江江治矣然後治漢治汝如禹貢所載九州之次也或又曰四水惟漢入江耳汝泗入淮淮徑入海安得俱言注之江乎曰古溝洫法南北東西互相通灌如揚之䢴溝雖吴王所開廣然古必有迹道可以泄淮水而注之南矣不然則孟軻氏豈容無稽據而肆為之說乎既載壺口在今隰州吉鄉治梁在今同州韓城及岐在今鳯翔府岐山孔氏曰壺口在冀州梁岐在雍州從東循山治水而西唐孔氏曰史記稱髙祖入咸陽蕭何先收圖籍則秦焚詩書圖籍皆在孔君去漢初七八十年耳身為武帝博士必當具見圖籍其山川所在必是騐實而知壼口在冀州梁岐在雍州當時疆界為然也班氏曰壺口山在河東北屈縣秉按慈州吉昌縣漢北屈也有壺口山北屈厯晉無改至後魏始更置定陽隋開皇十八年又改名吉昌唐仍舊本朝熈寧五年慈州廢以吉昌𨽻隰州更名吉鄉梁山在馮翊夏陽縣西北按同州韓城縣漢為夏陽有梁山隋開皇十八年置韓城岐山在扶風美陽縣西北按岐州岐山縣有岐山周太王徙於岐即此岐山本後周三龍隋開皇十六年改名岐山以有岐山故也鄭氏曰於此言治梁及岐者葢治水從下起以襄水害易也王氏曰載事也既事壺口然後治梁及岐也水逆行泛濫而亂故治之也蘇氏曰梁岐二山在雍州今於冀州言之者豈當時河患上及梁岐乎禹通底柱則壺口平而梁岐自治因河而言非以二山為冀州之地也葉氏曰詩言奕奕梁山惟禹甸之則梁之施功為多而岐因梁以及之者也林氏曰言冀州之水而及於雍之梁岐者曽氏曰吕不韋云龍門未闢吕梁未鑿徐州彭城縣吕梁山也有吕梁鎮河出孟門之上孟門山與龍門山相對在今隰州吉鄉縣大溢逆流無有邱陵髙阜滅之名曰洪水大禹疏通謂之孟門按地理志謂壺口在北屈之東南而酈道元謂孟門在北屈之西南則壺口孟門之東山也龍門在梁山北則梁山龍門之南山也以是言之其先河出孟門之上横流而出則知其東之壺口其南之梁山其西之岐山皆墊於水矣禹於壺口之西闢孟門而始事於壺口於梁山之北闢龍門而終事於梁山而其餘功又及岐山焉葢壺口梁岐一役也其施功皆同時不可分言於二州故併言於冀也吕氏曰岐梁皆是龍門左右之地也水之所以為患正緣龍門狹隘壅塞其水故禹治之鑿龍門使水𫝑通行以此觀孟子謂禹之治水行其所無事此豈得為無事葢鑿其所當鑿治其所當治所以為無事也二州山川有利害相闗而同一時之役者非特此也示例於此而他不言可知矣熈寧十年秋七月乙丑河决於澶淵東流入鉅野北溢於濟南溢於泗而彭城最受其害水之環城至髙二丈八尺時蘇東城守彭城恐其民驚潰乃登城以鎮之曰當與城俱存亡及水退東城相視於城之東門正當水之衝府庫在焉而地狹不可以為甕城乃大築其門䕶以磚石建黄樓於其上繼而潁濵將之宋過而登之乃為之賦曰嗟維此邦俯仰千載河東傾而南􅂥蹈漢世之遺害漢元光河决􅉚子包原隰而為一窺吾墉之摧敗吕梁齟齬横絶乎其前四山連屬合圍乎其外水洄洑而不進環孤城而為海觀此賦則知吕梁與河患相表裏也吕不韋之說蘇潁濵之賦學者不可不知既􅁱太原在今太原府榆次縣至於岳陽即今晉州霍邑縣霍山孔氏曰髙平曰太原今以為郡名岳太岳在太原西南山南曰陽唐孔氏曰太原原之大者漢書以為郡名即晉陽縣是也按隋文帝改漢晉陽為太原縣本朝太平興國四年省太原入榆次榆次在府東南七十里班氏曰河東彘縣有霍太山在東林氏曰晉州霍邑縣有霍山一名太岳山禹貢所謂岳陽按後漢順帝陽嘉二年彘更名永安隋開皇十八年永安更名霍邑王氏曰地為水所攻蕩隳圯而壊故􅁱之也葉氏曰載始事也傳言禹能􅁱鯀之功則鯀之功不皆廢也葢有因而􅁱之者焉鯀惟知治太原至岳陽而不道壺口推而上之以及梁岐而與岳陽會此功所以不成故禹始事壺口治梁及岐壺口梁岐治因􅁱鯀之舊迹以至於太原岳陽張氏曰此言既治太原之水㳂流而至於太岳之南也太岳在太原西南上流既治則下流通利而入於南河矣林氏曰曾氏云太原汾水之所出岳陽汾水之所經既􅁱太原至於岳陽導汾水故也按水經汾水出太原汾陽縣北管山南過永安縣西西至汾水隂縣北西注於河今憲州静樂縣即漢汾陽地也管山在其界河申寶鼎縣即漢汾隂也本朝祥符四年改為榮河覃懐底績即今懐州之地至於衡漳清漳出本潞州涉縣濁漳出長子縣孔氏曰覃懐近河地名漳水横流入河從覃懐致功至横漳唐孔氏曰地里志河内有懐縣在河之北葢覃懐二字共為一地衡即古横字横漳在懐北五百餘里從覃懐致功而北至横漳也杜氏曰懐州禹貢覃懐之地按唐貞觀元年省懐縣入武陟而杜氏云武陟漢懐縣地故城在今縣西是貞觀所省懐縣即漢之舊而武陟亦其地也後世變更名號不一難以盡詳唐志云河内縣有懐水往古覃懐之地也今懐之河内武陟皆有之武陟在河内東八十五里班氏曰清潭水出上黨沽縣太谷東北至渤海阜城縣入河濁漳水出長子縣鹿谷山東至鄴入清漳阜城今𨽻永静軍今為相州臨漳縣之鎮葢熙寧六年省洛州肥鄉深州鹿城冀州衡水恩州漳南皆漳水所逕唐天寶十五年更鹿城名東鹿本朝至和元年省漳南入厯亭林氏曰曾氏云河自大伾折而北流漳水東流而注之地之形南北為從東西為横河北流而漳東流則河從而漳横矣禹自覃懐致功遂踰太行而北既得漳流而導之入河漳水合河下流如不以道則亦害於河流故也曾氏論禹貢山川地理援引書傳考究源流其說皆有依據比諸儒之說為最詳堯都冀之平陽今晉州所治臨汾縣也禹之治水莫先於帝都而冀州三方距河深患所在其疏導莫先於河矣然行河當自下流始而冀州所紀惟急於帝都之傍近而下流未嘗及焉何也今以地里詳之壺口梁岐皆帝都之西也太岳在霍邑霍邑北臨汾百有餘里則太原岳陽帝都之北也覃懐帝都之南也衡漳帝都之東也於帝都四面固無水不逹於河而吾第憂河之下流不决而上之水皆奔赴之速則豫兖青徐之民將何所逃其害乎禹之用固愛君之至而其於救斯民之溺特可緩乎竊嘗思之而得其說於孟子之談禹而又熟復禹貢之書然後其疑始釋而於神禹治水之規畫始井井乎知其序矣孟子之言曰禹疏九河瀹濟漯是其於談禹之要㫖無出於此者夫九河者河之最下而濟漯者其傍流也治其最下而速其行通其傍流而使其中無停積之患則河之大體無足憂矣禹既規畫成此然後疏帝都四傍之水舉逹於河而冀州之患平矣冀州之患既平則凡兖青徐揚之所當治或四載躬臨或賛佐分命又從而次第舉矣茍或不然則雖竒計百出隄防萬端以殫終身之勞而水胡可得而治耶今觀禹貢而冀州不言疏九河以九河為兖州之地而首言於兖州故也不言瀹濟漯以漯流兖州濟厯豫兖而不可總之於冀故也且又導九州之首尾各巳條列於後使於每州一一言之則經文不幾於重複之甚乎又况禹之治水茍其利害相因則雖一川異州亦必有同一時之役者如其必待某州之功畢然後治某州則禹之聖豈無權而幾於執一者乎或曰壺口梁岐之役曽氏以為鑿龍門而冀州所記不及龍門何也曰導河積石至於龍門巳列之於後故於此但言壺口梁山所以互見其事也亦猶言導岍及岐至於荆山逾於河而捨梁山不言者與此治梁互見之也壺口雷首至於太岳則上捨太原而不言下舉雷首以見治龍門梁山之下而底柱析城王屋太行之治則覃懐底績之由也禹貢一書吾姑舉其一州言之其互見之法精宻如此學者可得而易言乎哉或又曰載始事也禹經始冀州莫先龍門而雷首厎柱析城王屋太行皆居其後乎曰瀹濟之時固嘗有利害相因而導之矣然龍門汾水未治於上則雷首而東欲厎績不能也故論天下之大𫝑禹之經畫雖無先於疏九河瀹濟漯而就冀一州言之則龍門者咽吭之害也汾水抑又次焉史書之曰冀州既載壺口治梁及岐既􅁱太原至於岳陽然後覃懐底績以至於衡漳先後之序曉然如此然學者不識形𫝑而觀此書譬之青天白日瞽者欲知其清明其可得乎厥土惟白壤厥賦惟上上錯厥田惟中中孔氏曰無塊曰壤水去土復其性色白而壤賦謂土地所生以供天子上上第一錯雜雜出第二之賦田之髙下肥瘠九州之中為第五顔氏曰柔土曰壤唐孔氏曰九章算術穿地四為壤五壤為息土則壤是土和緩之名故云無塊曰壤孟子稱稅十一為正輕之於堯舜為大貊小貊重之於堯舜為大桀小桀則此時亦什一稅俱什一而得與九等差者人功有强弱收穫有多少傳以荆州田第八賦第三為人功􅁱也雍州田第一賦第六為人功少也是據人功多少總計以定差此州以上上為正而雜為次等言出上上時多而上中時少也多者為正少者為雜此計大率所得非上科定也但治水據田責其什一隨土豐􅇤是上之任土而下所獻自有差降即以差等為上之定賦也然一升一降不可常同冀州自出第二與豫州同時則無第一之賦豫州與冀州第一同時則無第二之賦或容如此事不可常鄭氏曰此州入穀不貢王氏曰物其土田以知所宜奠其賦以知所出也冀州之土非盡曰壤而曰白壤者其大致然也餘州葢皆如此蘇氏曰賦田所出榖米兵車之𩔖禹貢田賦皆九等此為第一雜出第二之賦冀州畿内也田中中而賦上上理不應耳必當時事有相補除者豈以不貢而多賦耶然不可以臆說也葉氏曰此周官所謂以土均之法辯五物九等以制地征者也五物五地之所宜物也以五物制地征故賦有出於土者此庶土交正而為之者也以九等制地征故賦有出於田者此咸則三壤而為之者也惟賦不皆出於田故有田上而賦寡如徐青梁之𩔖而甚若雍之田上上而賦乃中下者有田下而賦多如豫冀揚之𩔖而甚若荆之田下中而賦乃上上者田下而賦多則土賦兼其間也田上而賦寡則又溝畎灌溉之於水旱畜泄有利否而人力衆寡勤惰之不齊不可概以田為率也賦以出於田為正故餘州皆以賦次田而冀州獨以賦次土者葢冀州之田第五而土白壤賦出於土宜多於田林氏曰周官大司徒之辨十有二壤之物而知其種以教稼穡樹藝終以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政葢將欲教民樹藝與夫令地貢斂財賦必辨九州土壤之所宜土性不同則所宜之榖亦不同如周官職方氏荆揚州宜稻冀雍州則宜黍稷之𩔖因其土地所宜而教之播種則其所收者必多也故禹於洪水既平之後將欲教民粒食因而致田賦之差必先辨九州土壤所宜以利民也九州之賦較數嵗之中以為常則自九州之賦自有常數而九等之差亦不可易也而又有錯出於他等之時者葢嵗有豐凶水旱之不同不可取必於每嵗之常賦必時有所蠲放以利民是以其所入之總數自有增損多寡之不同孟子曰治地莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之而不為虐則寡取之凶嵗糞其田而不足則必取盈焉為民父母使民盻盻然將終嵗勤動不得以養其父母又稱貸而益之使老穉轉乎溝壑惡在其為民父母也孟子此言謂其有激而云將以救戰國之虐政則可若謂禹貢之法為不善則不可葢九州之賦既有每嵗之常數而又有雜出於他等之時則是其於凶年無取盈之理觀禹貢一篇然後知禹之貢法未嘗有不善也禹之貢法固善矣意者後世之子孫不善用之惟取必於每嵗之常賦而又有雜出於他等之時此夏法之所以為弊也田之髙下既分九等則其田賦亦當稱是而乃有異同者葢有髙下田逐畝所收之多寡而比較之然九州之間地有廣狹民有多寡則其賦稅所入之數自有不同不可以田之髙下而凖之也荆州之田下中而賦則上下田賦相較所差者亦五等田賦所以如是之遼絶者葢洪水既平之後民之蕩析離居未復其業必有偏聚之地闢地有先後人功有􅁱否不可得而均也是以賦之所入與田之等級有如此之懸絶也貢篚之制自兖州而下皆有之而冀州獨不言者葢畿内之地天子之封内無所事於貢也張氏曰冀州之水既治而土賦與田皆可辨其名色定其髙下也葢天下至大先王所以坐運於一堂其風俗所尚土地所宜無不周知其折則以有圖書為可按見也聖賢巧思於此可知在五帝則有九邱之書唐虞則有禹貢之篇在周則有職方之志在漢則有輿地之圖皆所以囊括四海幹運天下也其可忽哉土惟白壤賦惟第一田惟中中大數巳定不可改易使其當理則有萬世之安使其不當則有萬世無窮之禍是故非禹之聖賢其物土田定賦貢安知其不為害也唐明皇失徳自宇文融為括田始始以客戸為主戸以見賦為羡賦自此明皇侈心愈開而王鉷楊謹矜楊國忠輩皆祖述其意名色百出遂至於亂盧杞又祖述其意以奉徳宗亦有奉天之亂以是知物土色定田賦豈可忽哉吕氏曰賦上上田中中差四等冀堯之都事事皆出於此所以特重於他州然别有所利亦與他州一一般此州紀賦於土田之間見土田皆有賦也然賦出於田者多故餘州惟以賦次田冀田第五錯第二賦第一兖田第六錯無賦第九青田第三錯無賦第四徐田第二錯無賦第五揚田第九錯第六賦第七荆田第八錯無賦第三豫田第四錯第一賦第二梁田第七錯第九賦第八第七第九雍田第一錯無賦第六林氏之說曰九等之差不可易而又有錯出於他等之時者葢嵗有豐凶之不同不可取必於每嵗之常而時有所蠲放以利民故所入之總數自有增損多寡之不同此其為說甚善而愚竊有甚疑者二不可以不論也九州惟冀兖豫梁有錯而餘所無者五州豈水旱之災惟冀兖豫梁為有而餘則無之乎不然何厚於彼而簿於此也冀之賦第一而錯降之為二梁之賦第八而錯降之為九是優恤之例然也至於揚則自七而升六豫則自二而升一梁則又有自八而升七九之時凡水旱宜優恤而頋反增益何耶如其謂樂嵗粒米狼戾多取之不為虐則禹亦豈於定制之外横有所取於民者乎夫孟子之議貢葢其叔世之弊政而禹之定制雖校數嵗之中以為常其於凶荒之嵗則必有為之輕恤者矣其於上熟之嵗則必能藏富於民矣如其不然則豈有禹聖人而於政在養民之說能言而不能行耶竊嘗屏去諸家訓傳獨取經文端坐熟復意其錯之為言非雜也差也九州之賦有一州之内而可均齊者則無差等之例如其不可均齊則大概幾何而或升或降亦任土随宜可也故冀大概則上上而差等之例則有降而為上中揚州大概則下上而差等之處則有升而為中下皆其當時之則例如此要不可以指定言耳若如此說則庶乎經文前後可以通貫考古者更為我評恒衛既從恒水出今定州曲陽衛水出今真定之境大陸既作跨相趙深三州之境孔氏曰二水既治從其故道大陸之地巳可耕作班氏曰恒水出常山上曲陽縣恒山北谷東入滱滱水出代郡靈邱縣東至文安入大河按上曲陽後齊去上字隋開皇六年改為石邑七年改曰恒陽唐元和十五年更名曲陽靈邱屬唐蔚州今為化外文安漢渤海之縣也唐𨽻莫州今𨽻覇州按水經滱水東北至長城注於易水班氏謂入大河恐非文安去長城亦近衛水出常山靈夀縣東北東入虖池熈寧八年省靈夀為鎮入行唐按虖池出代州繁時縣東南阜山逕深州饒陽縣北至冀州信都縣東入海古信都界當東北至海大鹿澤在鉅鹿縣北按釋地十藪云晉有大陸孫炎等皆云今鉅鹿縣北廣河澤也通典邢州鉅鹿縣漢南蠻地漢鉅鹿縣今平鄉縣也按九域志平鄉今廢入鉅鹿為鎮鉅鹿𨽻相州是相州鉅鹿縣有大陸通典趙州昭慶縣漢河廣縣也隋為大鹿縣有大陸澤唐志云昭慶本大陸武徳四年曰象城天寶元年更名昭慶九域志云皇朝開寶五年改昭慶為隆平熈寧六年省隆平為鎮入臨城是趙州臨城縣有大陸通典深州陸澤縣禹貢大陸亦在此唐志云先天二年析深州饒陽鹿城置陸澤縣九域志云皇朝雍熈四年省陸澤入静安是深州静安縣有大陸曾氏曰恒衛二水在帝都之北而且逺大陸地㝡卑而河所經故其功成在禹貢田賦既平之後葉氏曰河流有歸二水不治而自從也二水從而大陸可作矣髙平曰陸大陸曰阜大陸以地形得名也大陸之地廣大跨相趙深三州俱有之不止於河所經也恒衛二水既入滱與虖池而滱虖池之治可知矣滱虖池治則大陸之可耕作必矣雖然禹迹既至衡漳則不随及恒衛而乃於田賦既定之後徐而治之葢大河既疏汾漳諸水既導冀州之患亦既平矣而恒衛非其所急故緩之唐孔氏曰禹之治水必每州巡行度其形𫝑計其人功設施規摹指授方畧令人分布並作此說甚當然緩急先後之宜禹亦不應無有也學者讀禹貢須察其先後緩急之宜則智識可以明而他日輔吾聖君以經綸天下之大務當與禹治水同學者其勉哉島夷皮服孔氏曰海曲謂之島居島之夷還服其皮明水害除唐孔氏曰島是海中之山九章算術所云海島絶邈不可踐量是也蘇氏曰東北海夷也水患除故復皮服林氏曰冀州之島夷青州之萊夷徐州之淮夷梁州之和夷與雍州之崐崘析支渠搜皆是逐州之間所近要荒之服也洪水既平之後任土作貢自綏服之内皆有每嵗之常貢至於要荒之服則不責其必貢也亦不責其重貨也間有欲効誠於上者則使之惟輸其所有之物如蠙珠織皮之𩔖是也島夷皮服者言水害既除海曲之夷獻其皮服也蘇氏以揚州島夷之卉服為厥篚至於此州之皮服則云水患既除得服皮服是以此二句分為兩說其自違戾如此夾右碣石入於河山在今平州盧龍縣孔氏曰碣石海畔山禹夾行此山之右而入河逆上班氏曰大碣石在右北平驪城縣西南顔氏曰碣音桀按後漢志碣石山在遼西臨渝縣南隋志北平盧龍縣有臨渝宫有碣石唐志盧龍𨽻平州唐孔氏曰下文導河入於海傳云入於渤海今滄州界渤海之郡當以此海為名計渤海北距碣石五百餘里河入海處逺在碣石之南禹行碣石不得入於河也葢逺行通水之處北盡冀州之境然行南迴入河而逆上也梁州傳云浮東渡河而還帝都白所治則入河逆上為還都白所治也司馬氏曰九河同為逆河入於渤海瓚釋其言曰河口之入海乃在碣石也武帝元光二年河徙東郡東注渤海禹時不注渤海也蘇氏曰夾挾也自海入河逆流而西右顧竭石如在挾掖也林氏曰冀州所都葢在東河之西南河之北西河之東三面距河是其建邦設都之意實有取於轉輸之利朝貢之便也禹貢所載上言賦貢篚之事而於下言其所以逹於帝都之道其始末曲折莫不盡備而皆以逹於河為至葢逹於河則逹於帝都故也此云夾右碣石入於河者葢在冀州之北者逺於帝都之地或有舟楫轉輸則必遵海道以入於河然後至於帝都瀕河之地則徑自河以逹於帝都矣張氏曰此又記山川形𫝑所在也此記島夷入貢之道耳餘不必專自碣石入河也觀西傾因桓是來可見不獨西傾雍之浮積石亦然記逺不記近此經文之妙濟河惟兖州孔氏曰東南據濟西北距河唐孔氏曰據謂跨之距至也濟河之間相去路近兖州之境跨濟而過東南越濟水西北至東河也李氏曰濟河間其氣專質體性信謙故云兖兖信也林氏曰葢以兖水為名又兖之為言端也信也端言陽精端端故其氣纎殺也林氏曰自兖州而下八州皆以髙山大川定逐州之界序所謂别九州而篇首所謂奠髙山大川也九州命名之意葢出於一時之偶然不可必求其義也鄭氏曰漁仲禹貢之書所以為萬代地理家成憲者以其地命州不以州命地也如兖州者當時所命之名後世安知其在南在北故曰濟河惟兖州以濟水河水之間為兖州也以荆山衡山之間為荆州故曰荆及衡陽惟荆州濟河者萬代不冺之川也荆衡者萬代不泯之山也使荆兖之名得附此山川雖後世更改移易為不没矣九河既道其地巳淪於海孔氏曰河水分為九道在此州界平原以北是今徳州有平原縣唐孔氏曰河從大陸東畔北行而東北入海冀州之東境至河之西畔水分大河東為九道故知在兖州界平原以北是也釋水載九河之名云徒駭太史馬頰覆釡胡蘇簡潔鉤盤鬲津漢成帝時河堤都尉許商上書曰古記九河之名有徒駭胡蘇鬲津今現在成平東光鬲縣界中自鬲津以北至徒駭其間相去三百餘里是知九河所在徒駭最北鬲津最南葢徒駭是河之本道東山出分為八枝也許商上言河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也爾雅九河之次從北而南既知三河之處則其餘六者太史馬頰覆釡在東光之北成平之南簡潔鉤盤在東光之南鬲縣之北也其河填塞時存故道成平晉猶存未詳其後廢於何時先在今滄州之境東光今𨽻永静軍通典徳州安徳縣有漢鬲縣故城在西北鄭元云周時齊桓公塞之同為一河今河間弓髙以東至平原鬲津往往有其遺處春秋緯寶乾圖云黄河為界在齊吕填閼八流以自廣鄭氏葢據此文為齊桓公塞之也言閼八流拓境則塞其東流八枝并使歸於徒駭也五代職方考云周顯徳二年廢弓髙入東光杜氏曰徒駭鬲津鉤盤胡蘇四河在今景城郡界滄州馬頰覆釡二河並在今平原郡界徳州其餘三河未詳按以下至九江孔殷孔氏傳刻本闕佚今從永樂大典増入程氏曰河患惟漢最甚其講求禹跡亦為最詳又與三代耳目略接其所得知僅如許商所言三河而亦不能真􅃀唐杜氏乃九得其六此殆難以輕信也鄭氏謂八河為威公所塞如其果然則鄰境對立隨受決灌其肯坐視不争與漢王氏曰昔天常連雨東北風海水溢西南出浸數百里九河之地巳為海水所漸林氏曰河自大陸而北分為九河以入於海九河之名爾雅所謂徒駭一太史二馬頰三覆釜四胡蘇五簡六潔七鉤盤八鬲津九是也曾氏曰徒駭至鬲津皆是複名先儒以簡潔為單名固不倫矣爾雅但載八名其一不名者河之經流也漢許商曰徒駭是河之本道東出分為八枝審如許商之言則河自徒駭乃分為八審如曾氏之言則是九河其一為經流而其八者皆支流也然據下文云又北播為九河同為逆河入於海九者並列支派則其𫝑均也安得以一為經流八為支派哉九河之地在漢平原郡以北雷夏在今濮州雷澤縣既澤灉沮會同孔氏曰雷夏澤名灉沮二水會同此澤班氏曰雷夏在濟隂城陽縣西北按通典濮州雷澤縣漢成陽縣也有雷夏澤隋志云雷澤舊曰城陽後齊廢開皇十六年復置曰雷澤唐孔氏曰洪水之時髙原亦水澤不為澤雷夏既澤髙地水盡此復為澤也於澤之下言灉沮會同謂二水會合而同入此澤也爾雅云河有灉又曰灉反入郭璞注云即河水决出復還入者今濮州有沮溝九域志以為禹貢沮水觀經會同之文安國謂會同此澤則灉沮二水皆當自濮州入雷夏而爾雅乃以灉為出於河而復入於河則二水葢不同矣二水所出所逕載籍别無所詳雖穎逹東坡亦闕而不言王氏曰既澤者水有所鍾而不溢也葉氏曰九河未道則水之汎溢者雷澤不能受故九河既道而後雷夏可澤雷夏既澤則灉沮亦會同於海矣林氏曰灉沮二水先儒並不著其水本末故孔氏曰二水會合同入此澤葢謂同注於雷澤也張氏曰九河雷夏灉沮皆在兖州禹先治河使九河復歸故道雷夏復為故澤而灉沮二水復會同於雷夏則兖州之水患除矣桑土既􅅙是降邱宅土孔氏曰地髙曰邱大水去民下邱居平土就桑􅅙鄭氏曰此州寡於山而夾川兩大流之間遭洪水其民尤困水害既除於是下邱居土以其免於厄尤喜故記之葉氏曰他州之水或限於山或決於川民皆失其居業惟下流為甚故降邱宅土獨於兖言之水患去而人有條桑育􅅙者矣是其降邱宅土為可知也是之一言其禹觀省斯民慰喜之辭與厥土黑墳馬氏曰墳有膏肥也韋氏曰墳音勃憤切起也厥草惟繇厥木惟條孔氏曰繇茂條長也唐孔氏曰繇是茂之貌條是長之體言草茂而木長也馬氏曰繇抽也吕氏曰繇始抽條始長水患最深如此與漸包喬大不同林氏曰九州惟此與揚徐之二州言草木者葢此三州比九州之𫝑最居下流其地卑濕沮洳遭洪水之患草木不得遂其性而生育其巳乆矣至是而或繇或條或夭或喬或漸包故於逐州言之以見水土既平草木得遂其性也厥田惟中下厥賦貞孔氏曰田第六貞正也州第九賦正與九相當唐孔氏曰周易􅂏象皆以貞為正也諸州賦無下下貞即下下為第九也此州治水最在後畢州為第九成功其賦亦為第九列賦於九州之差與第九州相當故變文為貞見此意也蘇氏曰貞正也賦當随田髙下此其正也其有不相當者葢必有故非其正也此州田中下賦亦中下皆第六故曰貞此二者不同當從先儒之説九州之賦相較而為上下之等雍州之賦出第六而兖州之賦不應又出於第六也先儒所以謂州第九賦正與九相當者葢參考九州獨無下下之賦故此州治水最在後畢州為第九成功其賦亦為第九此其說是葢洪水之害河為最甚而兖州又河之下流其被墊溺之患比於餘州最為慘酷故雖能𫉬播種之功而土曠人希又卑濕沮洳之患未盡去是以𣗳藝之利尚非所宜雖田在第六而其賦比於九州為最少也林氏曰厥田惟中下者田第六也厥賦貞先儒云貞正也州第九賦正與九相當冀賦第一豫第二荆第三青第四徐第五雍第六揚第七梁第八兖第九禹定九等之田九等之賦考於經明甚而不應於兖一州又附雍之第六而獨無下下一等也東坡之說似是而非二孔之見雖的而貞之一字訓釋不通林氏取舎雖甚當而論貞之為義猶孔氏也余不滿於是畫禹賦之次第而思之然後知經文之妙非後世史官所可跂而望者何者紀賦之次自冀之上上而至於梁之下中其為八等著矣兖不言其為九可知矣故變下下之文而言貞所以明其賦為什一之正輕重不容加損也以一州之斷義而上該八州之成則經文不亦煥然矣乎猶之行水載治修之三字舉於冀而八州惟言其效猶之二州之同役壺口梁岐著於冀而八州惟言境内之所治經文簡嚴大扺如此非深求其意莫能知也作十有三載乃同孔氏曰治水十三年乃有賦法與他州同唐孔氏曰作者役功作務謂治水也治水十三年乃有賦法始得貢賦與他州同也他州十二年此州十三年比於他州最在後也堯典言鯀治水九載績用不成然後堯命得舜舜乃舉禹治水三載功成堯即禪舜此言十三載者并鯀九載數之祭法云禹能修鯀之功明鯀巳加功而禹因之也此言十三載者紀其治水三年言其水害除耳非言十三年内皆是禹之治水施功也馬融曰禹治水三年八州平故堯以為功而禪舜是十二年而八州平十三年而兖州平兖州平在舜受終之年也張氏曰禹治水乃是厯試時厯試三年堯乃禪位以禹治水成功也舜受禪乃巡狩分九州為十二州使水未平豈能為此乎是禹貢之作乃堯在位舜厯試時也曾氏曰髙堂隆之言曰禹治洪水前後厯年二十二載林氏曰曾氏舉髙堂隆之言並以鯀之九載并此十三載而數之為二十二載也此說皆不然據此文承於厥賦貞之下而又曰作十有三載乃同則是專為兖州之賦而言也葢兖州之賦必待十有三載然後同於餘州非所謂此州治水指十有三載而後功成也孟子曰禹八年於外三過其門而不入而此言作十有三載何也葢八年而水患平十有三年而兖之田賦定兖雖河患最甚施功八年其患亦巳去矣而土田沮洳疆畎廢壊離散未集室廬未修故猶有待於五年之乆而田賦始定者葢可知矣經云厥賦貞作十有三載乃同作也者田里之役作也非指水患言也或曰子之說於禹貢為通於髙堂隆之見為合其如矛盾舜典何如孔張二公有據何曰予請明辨之自鯀績不成而舜厯試之初即舉禹以當治水之任逮舜攝位而施功巳二年矣舜巡狩何害乎正使水患未平舜亦豈憚一行為之觀省乎肇十有二州以洪水之際民多捨卑即髙冀青之北不勝其萃聚矣於是建官不多難以為治故禹創増三州曰營幽并者亦當時隨宜事耳其寔禹别九州在厯試時規畫已成凡山川之奠固已一遵堯舊及敷奏此篇時亦不必改但所異者九與十二之名耳豈若後世之人冀以要君之寵而必欲趨時以為便乎又况幽營之地禹跡鮮及惟常山碣石之役至其南耳并州之境亦太原一役而巳顧必欲變巳别之九為後來之十二何為乎大抵後世傳經之士多以私意窺億聖人故經意愈不明而說者愈紛紛也孟子生秦漢之前去古猶近凡有所言正當取信要不可泥孔張三載之說而廢孟子八年之計善稽古者其必有以辨之蘇氏曰兖州河患最甚故功後成至於作十有三載又前予乗四載傳云水行乗舟陸行乗車泥行乗楯山行桑樏秦漢以來師傳如此且孔氏之舊也故安國知之非諸儒之臆說四載之解雜出於尸子慎子而最可信者太史公也亦如六宗之說自秦漢以來尚矣豈可以私意曲學鐫鑿傳㑹為之哉而或以鯀治水九載兖州作十有三載乃同禹之代鯀葢四載而成功也世或喜其說然詳味本文予乗四載随山刋木則是駕此四物以行於山林川澤之間非以四因九通為十三載之辭也按書之文鯀九載績用弗成在堯未得舜之前而殛鯀在舜登庸厯試之後殛鯀而後禹興焉則禹治水之年不得與鯀之九載相接兖州之功安得通四與九為十三乎禹之言曰娶於塗山辛壬癸甲是娶在治水之中又曰啟􅈱􅈱而泣予弗子惟荒度土功是啟生在水患未平之前也禹服鯀三年之喪而至娶自娶而至於有子自有子而至於生泣亦巳乆矣安得在四載之中乎反覆考之皆與書文乖異書所云作十有三載乃同者指兖州之事非謂天下共作十三載也近世學者喜異而巧於鑿故詳辯之以解世之惑堯在位七十載鯀考績無成之年也時即求舜而女之舜升於朝葢七十一載矣治水之事不容緩舜舉禹當七十一載而東坡執洪範鯀則殛死禹乃嗣興之文葢言父以無功而死子以有徳而興非謂鯀死而後禹始用於堯也東坡考四載之說甚當而考經有未的則猶未能杜好竒者之口余故不得不辯程氏曰禹之自言予乗四載又曰娶於塗山辛壬癸甲以辛壬癸甲通鯀九載而得年正十有三也是禹獨任水事之日淺而鯀剏立規模之日長也故記禮者本其所自而言之禹能修鯀之功也孟子曰禹八年於外三過其門而不入當是并其佐鯀之年而計之與禹代鯀當堯之七十一載適為辛年則程氏之辭信矣而堯以甲辰即位七十一載乃是甲寅若以禹代鯀在位七十一載之前堯之六十八載固是辛亥而孟子言堯憂洪水舉舜敷治舜乃舉禹舜登庸在七十一載則辛亥禹固未用借使辛亥禹巳見用則七十一載正當甲寅辛壬癸甲禹之功至此成矣及舜登庸又何敷治之有而堯之憂猶在於此何耶古之人三十而娶禹娶在治水之中則堯之用禹亦早矣當鯀治水時禹年猶㓜佐鯀之說亦不可用也使其果佐鯀如益稷之佐巳當必自有職業而亦必有幾諫正救之功簡牘畧無傳何也今即禹貢觀之地平天成功績若此其大雖以神為之非三考責成不可也三考九年孟子止言八年於外者其一係成功之年禹巳還歸故也厥貢漆絲厥篚織文孔氏曰地宜漆林又宜桑蠶織文錦綺之屬盛之筐篚而貢焉鄭氏曰貢者百功之府受而藏之其實於篚者入於女功故以貢篚别之蘇氏曰幣帛盛於篚故書曰篚厥元黄林氏曰兖州之地宜漆林又宜桑蠶故貢此二物也有貢又有篚乃入貢之物盛於篚而貢焉古者幣帛之屬皆盛於篚蘇氏引篚厥元黄為證是也織文者錦繡之屬曾氏曰織文因織而有文者錦繡之屬不一故言織文以包之謂之織則繪畫組繡而有文者不與焉浮于濟漯漯水出今北京莘縣逹于河孔氏曰順流曰浮濟漯兩水名因水入水曰逹唐孔氏曰揚州之淞于江海逹于淮泗傳云淞江入海自海入淮自淮入泗是言水路相通得乗舟逕逹也按青州云浮于汶逹于濟經言濟會于汶浮汶得逹濟也此言浮于濟漯逹于河從漯入濟自濟入河徐州云浮于淮泗逹于河葢以徐州北接青州既浮淮泗當浮汶入濟以逹于河也班氏曰漯水出東郡東武陽至樂安千乗縣入海應劭平原郡漯隂縣注云漯水出東武陽東北入海桑欽云漯水出平原郡髙唐縣按東武陽其地屬今北京莘縣即今博州之縣漯隂當在今徳棣之境而千乗則唐屬青州以地望審之漯水葢出東武陽而過髙唐又東過漯隂至千桑而入海桑氏謂出髙唐誤矣林氏曰二水不必相通苟濟亦可以入河漯亦可以入河則亦可以謂之浮于濟漯逹于河逹者唐孔氏曰從水入水曰逹逹當從水入水不須舎舟而陸行也禹時濟漯皆受河貢賦之道或自濟或自漯各隨其便入河云耳非如穎逹謂從漯入濟自濟入河海岱惟青州孔氏曰東北據海西南距岱唐孔氏曰海非可越而言據者東萊秉境之縣浮海入海曲之間青州之境非止海畔而巳故言據也嵎夷當在今登宻之境既畧濰淄其道孔氏曰嵎夷地名用功少曰畧濰淄二水復其故道唐孔氏曰嵎夷地名即堯典宅嵎夷是也嵎夷萊夷和夷為地名淮夷為水名島夷為狄名皆觀文為說也畧是簡易之義故用功少為畧也班氏曰濰水出琅琊箕北至都昌入海顔氏云出箕屋山通典云宻州屬漢琅琊莒縣東北有濰山濰水所出濰山當即是箕屋山異世殊稱耳通典云青州臨朐縣有漢都昌城在東北今故城在濰州界見九域故迹淄水出泰山萊蕪縣原山東至博昌入泲通典云淄州淄川縣有淄水溪萊蕪故城在東南博昌唐𨽻青州林氏曰嵎夷則羲仲所治東方之極也島夷和夷皆在要服之外去中國之境宜逺故言其服與底績而巳嵎夷既羲仲所治則其地宜近而相及必有以限其内外而正之故特言既畧春秋傳所謂天子經畧諸侯正封是也嵎夷在其東濰淄在其西治水從東而西也嵎夷封畧昔巳有之特為洪水所壊今再修整而巳非禹創為之也厥土白墳海濵廣斥孔氏曰濵涯也言復其斥鹵唐孔氏曰濵涯常訓也說文云鹵鹹地也東方謂之斥西方謂之鹵海畔逈濶地皆斥鹵故云廣斥言水害除復舊性也厥田惟上下厥賦中上厥貢鹽絺海物惟錯張氏曰海物竒形異狀可食者衆非一色而巳故雜然並貢岱畎絲枲鈆松怪石鹽絺海物青州大率之貢也至於此五物或惟岱畎有之或他地有之而不足以貢故别言岱畎所謂任土作貢於此可見萊夷作牧今萊州之地厥篚檿絲孔氏曰萊夷地名可以放牧按通典萊州春秋萊子國也禹貢萊夷作牧是也蘇氏曰牧芻牧也傳曰牧隰臯井衍沃並海水患除始芻牧也檿絲惟出東萊以織繒堅韌異常萊人謂之山蠒萊夷作牧而後有此故書篚在作牧之後葉氏曰周官井牧之法以田萊為辨則地以萊名宜可耕作而畜牧也檿絲繼萊夷言其貢或出於萊夷也浮于汶出今兖州萊蕪縣原山至鄆州須城縣入濟逹于濟班氏曰汶水出泰山萊蕪縣原南西南入濟按通典兖州萊蕪漢舊縣地汶水所出而流入濟桑氏曰汶水西南過夀張縣北又西南至安民亭入于濟酈氏曰汶水出須昌入濟須昌今為須城鄆州所治夀張今𨽻鄆州在州西南六十里安民亭當在二縣之界程氏曰不書逹河因兖貢前文也林氏曰地里志云汶水出泰山萊山縣原山西南入濟即下文所謂導沇水東流為濟東至于河又東北會于汶是也謂此州將欲逹于帝都當浮于汶以逹于濟然後由于濟以逹于河也禹貢說斷卷一
