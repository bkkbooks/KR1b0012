body:
  text: 禹貢説斷書𩔖提要臣等謹案禹貢説斷宋處士金華傅寅撰朱彝尊經義考有寅所著禹貢詳解二卷通志堂嘗刋入九經解中而永樂大典載其書則題曰禹貢説斷並無詳解之名又經解所刋本稱原缺四十餘簡今檢永樂大典本不獨所缺咸在且其五服辨三千餘言九州辨千數百言校原缺目更多至數倍又喬行簡序稱寅著羣書百考事為之圖禹貢説特其一種是編當先以山川總㑹及九河三江九江四圖而次及諸家之説今經解四圗俱誤編入程大昌禹貢論中與其書絶不相比附而永樂大典獨系之説斷篇内葢當時所見實宋時原本足以依據而經解刋行之本則已為後人傳寫錯漏致併書名而竄易之非其舊矣書中博引衆説斷以己意具有特解不肯蹈襲前人其論孟子決汝漢推淮泗而注之江為古溝洫之法尤為諸儒所未及洵卓然能自抒所見者吕祖儉謂其集先儒之大成唐仲友謂職方輿地盡在腹中深為名流所推重信不虚也今取經解刋本謹依永樂大典本詳加校定譌者正之闕者補之析為四卷仍題説斷舊名而於補缺之起訖各加注語以别之庶幾承學之士得以復見完書焉乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9a7f99ddda4c917f60e8c29d784863e49120a6d38a87a65b7196956e16c4750f
